<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>MyList</title>
<meta name="theme-color" content="#0f0f12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyList">
<link rel="manifest" href="data:application/json,{%22name%22:%22MyList%22,%22short_name%22:%22MyList%22,%22display%22:%22standalone%22,%22id%22:%22https://anthonyn99.github.io/A1/mylist.html%22,%22start_url%22:%22https://anthonyn99.github.io/A1/mylist.html%22,%22scope%22:%22https://anthonyn99.github.io/A1/mylist.html%22,%22background_color%22:%22%230f0f12%22,%22theme_color%22:%22%23E0607A%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20viewBox%3D'0%200%2096%2096'%3E%3Crect%20width%3D'96'%20height%3D'96'%20rx%3D'22'%20fill%3D'%23E0607A'/%3E%3Ctext%20x%3D'50%25'%20y%3D'68%25'%20text-anchor%3D'middle'%20font-size%3D'52'%3E%F0%9F%9B%92%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22}]}">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;900&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
*{scrollbar-width:none;-ms-overflow-style:none;}
*::-webkit-scrollbar{display:none;width:0;height:0;}
a,button,label,select,input,textarea,[role=button],[onclick]{touch-action:manipulation;}

body{
  --bg:#0f0f12; --surface:#16161c; --surface2:#1d1d25; --border:#262630; --border2:#33333f;
  --text:#ececf0; --textdim:#9898a8; --textmute:#5b5b6c;
  --accent:#E0607A; --accent-ink:#0f0f12; --accent-soft:rgba(224,96,122,0.14);
  --good:#5fbf8f; --bad:#d47a6a;
  --font-body:'Nunito',sans-serif; --font-head:'Nunito',sans-serif; --font-btn:'Nunito',sans-serif;
  --head-weight:800; --head-spacing:0px; --head-transform:none;
  --radius:14px;
  background:var(--bg);color:var(--text);
  font-family:var(--font-body);-webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
body[data-profile=veda]{
  --bg:#1B1C1E; --surface:#232427; --surface2:#2b2c30; --border:#3a3b41; --border2:#4a4b51;
  --text:#e9e7ec; --textdim:#9b96a3; --textmute:#615f6a;
  --accent:#8D769A; --accent-ink:#1B1C1E; --accent-soft:rgba(141,118,154,0.16);
  --good:#8fae8a; --bad:#c98a7d;
  /* StudyOS-style elegance: Lora serif for text & headings, mono only for small labels/buttons */
  --font-body:'Lora',serif; --font-head:'Lora',serif; --font-btn:'IBM Plex Mono',monospace;
  --head-weight:700; --head-spacing:-0.2px; --head-transform:none;
  --radius:10px;
}
body[data-profile=veda] .item .nm,
body[data-profile=veda] .rec-row .rec-name,
body[data-profile=veda] .rec-detail-name,
body[data-profile=veda] .list-head .ttl{font-family:'Lora',serif;letter-spacing:-0.2px;}
body[data-profile=veda] .item .desc{font-style:italic;}
body[data-profile=veda] input,body[data-profile=veda] textarea{font-family:'Lora',serif;}
button,input,select,textarea{font-family:var(--font-body);color:var(--text);}
input,textarea,select{background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:11px 12px;font-size:15px;outline:none;width:100%;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
input::placeholder,textarea::placeholder{color:var(--textmute);}
select{appearance:none;-webkit-appearance:none;cursor:pointer;}
textarea{resize:none;line-height:1.45;overflow:hidden;}
.field{display:block;}
.field>.lbl{display:block;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--textmute);margin:0 0 5px 2px;font-family:var(--font-btn);}

.wordmark{font-family:var(--font-head);font-weight:var(--head-weight);letter-spacing:var(--head-spacing);text-transform:var(--head-transform);color:var(--accent);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--border2);background:transparent;color:var(--accent);border-radius:9px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font-btn);transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);}
.btn.solid{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}
.btn.ghost{color:var(--textdim);border-color:var(--border);}
.btn.danger{color:var(--bad);border-color:rgba(212,122,106,0.5);}
.btn.danger.solid{background:var(--bad);color:#fff;border-color:var(--bad);}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:8px;}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--accent);cursor:pointer;flex-shrink:0;transition:all .15s;}
.icon-btn:hover{border-color:var(--accent);}

/* ── Profile overlay ── */
#profile-overlay{position:fixed;inset:0;z-index:9000;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);padding:calc(env(safe-area-inset-top,0px) + 24px) 22px calc(env(safe-area-inset-bottom,0px) + 24px);}
#profile-overlay .pw-title{font-family:'Playfair Display',serif;font-weight:900;font-size:32px;letter-spacing:1px;color:#fff;margin-bottom:6px;text-align:center;}
#profile-overlay .pw-sub{color:#9898a8;font-family:'Nunito',sans-serif;font-size:14px;margin-bottom:34px;text-align:center;}
.profile-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;width:100%;max-width:400px;}
.profile-card{position:relative;flex:0 0 auto;width:clamp(130px,40vw,156px);aspect-ratio:1;background:#16161c;border:1.6px solid #2a2a34;border-radius:18px;padding:16px 12px;text-align:center;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.profile-card:hover{transform:translateY(-4px);}
.profile-card .emoji{font-size:40px;line-height:1;margin-bottom:10px;}
.profile-card .pname{font-family:'Nunito',sans-serif;font-weight:800;font-size:19px;color:#fff;}
.profile-card .plock{position:absolute;left:0;right:0;bottom:8px;font-family:'Nunito',sans-serif;font-size:10px;color:#9898a8;line-height:1.2;text-align:center;}
.profile-card .fav-star{position:absolute;top:7px;right:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  font-size:22px;color:#41414e;cursor:pointer;transition:all .15s;line-height:1;border-radius:50%;background:rgba(255,255,255,0.03);}
.profile-card .fav-star:hover{background:rgba(255,255,255,0.08);}
.profile-card .fav-star.on{color:#f5c451;text-shadow:0 0 12px rgba(245,196,81,.55);}
.profile-card.tony{border-color:rgba(224,96,122,0.45);} .profile-card.tony:hover{border-color:rgba(224,96,122,0.85);box-shadow:0 8px 24px rgba(224,96,122,0.22),0 0 12px rgba(224,96,122,0.16);}
.profile-card.tony .emoji,.profile-card.tony .pname{color:#E0607A;}
.profile-card.veda{border-color:rgba(141,118,154,0.5);} .profile-card.veda:hover{border-color:rgba(183,159,196,0.85);box-shadow:0 8px 24px rgba(141,118,154,0.24),0 0 12px rgba(141,118,154,0.18);}
.profile-card.veda .emoji,.profile-card.veda .pname{color:#b79fc4;font-family:'Playfair Display',serif;}

/* ── App shell ── */
#app{display:none;min-height:100%;flex-direction:column;}
#topbar{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:calc(env(safe-area-inset-top,0px) + 10px) clamp(12px,4vw,22px) 10px;}
#topbar-inner{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:10px;}
#topbar .tb-title{font-size:21px;flex-shrink:0;}
#topbar .tb-spacer{flex:1;}
.sync-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--textdim);font-family:var(--font-btn);padding:5px 9px;border-radius:20px;border:1px solid var(--border);white-space:nowrap;transition:opacity .45s;}
.sync-pill.idle{opacity:0;pointer-events:none;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--textmute);flex-shrink:0;}
.sync-pill.ok .sync-dot{background:var(--good);}
.sync-pill.busy .sync-dot{background:#e0b15f;animation:pulse 1s infinite;}
.sync-pill.err{color:var(--bad);border-color:rgba(212,122,106,0.5);} .sync-pill.err .sync-dot{background:var(--bad);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

#main{flex:1;max-width:760px;width:100%;margin:0 auto;padding:14px clamp(12px,4vw,22px) calc(env(safe-area-inset-bottom,0px) + 170px);}

#lists-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.list-chip{flex-shrink:0;display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--textdim);cursor:pointer;transition:all .15s;font-family:var(--font-btn);}
.list-chip:hover{border-color:var(--border2);}
.list-chip.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}
.list-chip .cnt{font-size:11px;opacity:.8;}
.list-chip.add{color:var(--accent);border-style:dashed;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.section-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--textmute);margin-bottom:10px;font-family:var(--font-btn);}

.list-head-card{padding:12px 14px;margin-bottom:12px;}
.list-head{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.list-head .ttl{font-family:var(--font-head);font-weight:var(--head-weight);font-size:18px;color:var(--text);letter-spacing:var(--head-spacing);flex:1;min-width:0;border:none;background:transparent;padding:1px 0;}
.list-head-card .btn.sm{padding:5px 10px;font-size:11px;}
.list-meta{font-size:11px;color:var(--textmute);margin-bottom:1px;}
.list-meta .lnk{cursor:pointer;text-decoration:underline;color:var(--textdim);}

/* ── Voice ── */
#voice-card{text-align:center;}
.voice-title{font-family:var(--font-head);font-weight:var(--head-weight);font-size:19px;letter-spacing:var(--head-spacing);text-transform:var(--head-transform);color:var(--accent);text-align:center;margin-bottom:14px;}
#voice-wrap{display:flex;flex-direction:column;align-items:center;gap:13px;padding:2px 0 2px;}
#mic-btn{width:104px;height:104px;border-radius:50%;border:none;cursor:pointer;background:var(--accent);color:var(--accent-ink);
  display:flex;align-items:center;justify-content:center;box-shadow:0 12px 34px var(--accent-soft);transition:transform .12s;}
#mic-btn:active{transform:scale(.94);}
#mic-btn.recording{background:var(--bad);color:#fff;animation:recpulse 1.3s infinite;}
#mic-btn.busy{opacity:.7;pointer-events:none;}
@keyframes recpulse{0%,100%{box-shadow:0 0 0 0 rgba(212,122,106,.5)}50%{box-shadow:0 0 0 18px rgba(212,122,106,0)}}
#mic-btn svg{width:42px;height:42px;}
#voice-status{font-size:13px;color:var(--textdim);font-weight:700;text-align:center;min-height:18px;display:flex;align-items:center;gap:7px;justify-content:center;}
.voice-help{font-size:12.5px;color:var(--textdim);text-align:center;line-height:1.5;max-width:480px;}
.voice-help b{color:var(--accent);font-weight:700;}
.voice-or{display:flex;align-items:center;gap:10px;color:var(--textmute);font-size:11px;font-weight:700;letter-spacing:1px;margin:2px 0;width:100%;max-width:460px;}
.voice-or::before,.voice-or::after{content:'';flex:1;height:1px;background:var(--border);}

/* live caption: fixed at top, concise, capped + scrollable (never full-screen) */
#top-caption{position:fixed;top:calc(env(safe-area-inset-top,0px) + 10px);left:50%;transform:translateX(-50%);z-index:9600;display:none;
  width:min(560px,92vw);max-height:30vh;overflow-y:auto;background:var(--surface2);border:1.5px solid var(--accent);border-radius:14px;
  padding:13px 16px;font-size:16px;color:var(--text);line-height:1.45;text-align:left;box-shadow:0 12px 40px rgba(0,0,0,.5);}
#top-caption.show{display:block;}
#top-caption .cap-h{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;font-family:var(--font-btn);display:flex;align-items:center;gap:6px;}
#top-caption .cap-h .rdot{width:8px;height:8px;border-radius:50%;background:var(--bad);animation:pulse 1s infinite;}
#top-caption .interim{color:var(--textmute);}

/* permanent floating voice+type bar at the bottom */
#float-voice{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom,0px) + 12px);z-index:55;display:none;
  align-items:flex-end;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:24px;padding:8px;
  width:min(580px,94vw);box-shadow:0 12px 40px rgba(0,0,0,.5);}
#float-voice.show{display:flex;}
#float-mic{width:46px;height:46px;border-radius:50%;border:none;background:var(--accent);color:var(--accent-ink);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;}
#float-mic.recording{background:var(--bad);color:#fff;animation:recpulse 1.3s infinite;}
#float-mic svg{width:22px;height:22px;}
#float-dev{width:40px;height:46px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--textdim);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;}
#float-dev:hover{border-color:var(--accent);color:var(--accent);}
#float-dev svg{width:18px;height:18px;}
.fv-input{flex:1;min-width:0;}
#float-text{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:12px 14px;font-size:14px;width:100%;max-height:120px;line-height:1.4;display:block;}
#float-voice .fgo{flex-shrink:0;height:46px;border-radius:18px;padding:0 16px;}
#float-rec-hint{display:none;flex:1;min-width:0;align-items:center;justify-content:center;color:var(--bad);font-weight:800;font-size:13px;font-family:var(--font-btn);text-align:center;padding:0 6px;min-height:46px;line-height:1.25;}

/* Manual: compact button just above the bottom bar + popup panel */
#manual-fab{position:fixed;left:calc(50% - min(290px,47vw));transform:none;bottom:calc(env(safe-area-inset-bottom,0px) + 84px);z-index:56;display:none;
  align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border2);color:var(--accent);font-family:var(--font-btn);
  font-weight:800;font-size:12px;letter-spacing:.4px;padding:7px 18px;border-radius:18px;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.4);}
#manual-fab.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent);}
#manual-pop{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom,0px) + 126px);z-index:56;display:none;
  width:min(580px,94vw);max-height:56vh;overflow-y:auto;background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:16px;box-shadow:0 16px 50px rgba(0,0,0,.6);}
#manual-pop.show{display:block;}
#float-voice.recording .fv-input,#float-voice.recording .fgo,#float-voice.recording #float-dev{display:none;}
#float-voice.recording #float-rec-hint{display:flex;}

/* device picker popover */
#dev-overlay{position:fixed;inset:0;z-index:9650;display:none;align-items:center;justify-content:center;background:rgba(8,8,11,.7);backdrop-filter:blur(4px);padding:22px;}
#dev-box{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:18px;}
#dev-box h3{font-family:var(--font-head);font-weight:var(--head-weight);font-size:17px;margin-bottom:4px;letter-spacing:var(--head-spacing);text-transform:var(--head-transform);}
#dev-box .dev-sub{font-size:12px;color:var(--textdim);margin-bottom:14px;}
.dev-item{display:flex;align-items:center;gap:10px;padding:11px 12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;font-size:14px;color:var(--text);}
.dev-item:hover{border-color:var(--accent);}
.dev-item.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);font-weight:700;}
.dev-item .tick{margin-left:auto;color:var(--accent);}

/* ── resizable textarea wrapper ── */
.ta-wrap{position:relative;width:100%;}
.ta-wrap textarea{padding-right:22px;padding-bottom:22px;}
.resize-grip{position:absolute;right:5px;bottom:4px;width:18px;height:18px;cursor:ns-resize;touch-action:none;display:flex;align-items:center;justify-content:center;
  color:var(--accent);opacity:.6;background:transparent;border:none;}
.resize-grip:hover{opacity:1;}
.resize-grip svg{width:15px;height:15px;}

/* ── Manual collapsible ── */
.manual-toggle{width:100%;display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;cursor:pointer;color:var(--text);font-weight:800;font-size:15px;font-family:var(--font-head);letter-spacing:var(--head-spacing);
  text-transform:var(--head-transform);transition:border-color .15s;}
.manual-toggle:hover{border-color:var(--border2);}
.manual-toggle .chev{margin-left:auto;transition:transform .2s;color:var(--textdim);display:flex;}
.manual-toggle.open{border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom-color:transparent;}
.manual-toggle.open .chev{transform:rotate(90deg);}
.manual-toggle .mt-sub{font-size:11px;font-weight:600;color:var(--textmute);font-family:var(--font-btn);text-transform:none;letter-spacing:0;}
#manual-body{display:none;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:16px;margin-bottom:14px;background:var(--surface);}
#manual-body.open{display:block;}
.manual-sub{font-size:16px;font-weight:800;letter-spacing:var(--head-spacing);text-transform:var(--head-transform);color:var(--text);margin:0 0 13px;font-family:var(--font-head);}
.manual-block + .manual-block{margin-top:20px;padding-top:18px;border-top:1px dashed var(--border2);}

/* stores */
.store-chips{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:11px;}
.store-chip{display:inline-flex;align-items:center;gap:7px;background:var(--accent-soft);border:1px solid var(--accent);color:var(--accent);border-radius:18px;padding:6px 8px 6px 13px;font-size:12.5px;font-weight:700;font-family:var(--font-btn);}
.store-chip .x{width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;opacity:.75;font-weight:900;font-size:13px;background:rgba(0,0,0,0.18);}
.store-chip .x:hover{opacity:1;background:var(--accent);color:var(--accent-ink);}
.store-empty{font-size:12.5px;color:var(--textmute);margin-bottom:11px;}
.store-add-row{display:flex;gap:8px;}

/* add item grid */
.add-grid{display:grid;grid-template-columns:1fr;gap:11px;}
.add-grid .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.add-grid .actions{display:flex;justify-content:flex-end;}

/* ── items ── */
.items-head{display:flex;align-items:center;gap:8px;margin:20px 2px 12px;}
.items-head .ih-title{font-family:var(--font-head);font-weight:var(--head-weight);font-size:19px;letter-spacing:var(--head-spacing);text-transform:var(--head-transform);color:var(--text);}
.items-head .sp{flex:1;}
.store-group{margin-top:14px;}
.store-group:first-child{margin-top:0;}
.store-group-h{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;letter-spacing:.5px;color:var(--accent);margin:0 2px 8px;font-family:var(--font-btn);text-transform:uppercase;}
.store-group-h .gline{flex:1;height:1px;background:var(--border);}
.item{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 12px;margin-bottom:8px;transition:all .15s;}
.item.done{opacity:.55;}
.item.sel{border-color:var(--accent);background:var(--accent-soft);}

#lock-title{font-family:var(--font-head);font-weight:var(--head-weight);font-size:22px;margin-bottom:6px;}

.rec-step .rec-step-acts .ib{width:28px;height:28px;border-radius:7px;border:1px solid transparent;background:transparent;color:var(--textmute);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.rec-step .rec-step-acts .ib:hover{color:var(--accent);border-color:var(--border);}
.rec-step .rec-step-acts .ib.del:hover{color:var(--bad);border-color:rgba(212,122,106,.4);}
.rec-step.editing{flex-direction:row;align-items:flex-start;gap:8px;}

.rec-ing-row{display:grid;grid-template-columns:1fr 92px 38px;gap:8px;margin-bottom:8px;}

<body data-profile="tony">

<!-- ══════════════ Biometric auth (WebAuthn / platform passkeys) ══════════════
     Shared, dependency-free helper. Primary auth = the device's own biometric
     (Face ID / Touch ID on iOS, fingerprint on Android/Samsung, Windows Hello on
     Windows) through the OS secure framework. The app NEVER sees or stores raw
     biometric data — WebAuthn returns only a public-key credential handle.
     Credentials are keyed per (app,id) so every profile keeps its own isolated
     credential: one profile's biometric can never satisfy another's unlock,
     because each unlock only allows its own stored credential id. -->
<script>
(function(){
  if (window.Bio) return;
  var NS = 'bio_cred_';
  function u8(buf){ return new Uint8Array(buf); }
  function b64u(buf){ var b=u8(buf),s=''; for(var i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
  function unb64u(str){ str=String(str).replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4) str+='='; var bin=atob(str),b=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i); return b.buffer; }
  function rand(n){ var a=new Uint8Array(n); crypto.getRandomValues(a); return a; }
  function keyOf(app,id){ return NS+app+'_'+id; }
  function supported(){ return !!(window.isSecureContext && window.PublicKeyCredential && navigator.credentials && navigator.credentials.create); }
  function available(){
    if(!supported()) return Promise.resolve(false);
    if(!PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable) return Promise.resolve(false);
    return PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(function(v){return !!v;}).catch(function(){return false;});
  }
  function stored(app,id){ try{ return JSON.parse(localStorage.getItem(keyOf(app,id))||'null'); }catch(e){ return null; } }
  function isRegistered(app,id){ var r=stored(app,id); return !!(r&&r.id); }
  function unregister(app,id){ try{ localStorage.removeItem(keyOf(app,id)); }catch(e){} }
  function label(){
    var ua=navigator.userAgent||'';
    if(/iPhone|iPad|iPod/.test(ua)) return 'Face ID';
    if(/Android/.test(ua)) return 'fingerprint';
    if(/Windows/.test(ua)) return 'Windows Hello';
    if(/Mac/.test(ua)) return (navigator.maxTouchPoints>1?'Touch ID':'Touch ID');
    return 'biometrics';
  }
  function register(app,id,opts){
    opts=opts||{};
    if(!supported()) return Promise.resolve({ok:false,error:'unsupported'});
    return navigator.credentials.create({publicKey:{
      challenge: rand(32),
      rp:{ name: opts.rpName||document.title||'App', id: location.hostname||undefined },
      user:{ id: rand(16), name: opts.userName||(app+':'+id), displayName: opts.displayName||opts.userName||id },
      pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
      authenticatorSelection:{ authenticatorAttachment:'platform', userVerification:'required', residentKey:'preferred' },
      timeout: 60000, attestation:'none'
    }}).then(function(cred){
      if(!cred) return {ok:false,error:'cancelled'};
      localStorage.setItem(keyOf(app,id), JSON.stringify({ id:b64u(cred.rawId), created:Date.now(), label:opts.displayName||opts.userName||id }));
      return {ok:true};
    }).catch(function(e){ return {ok:false, error:(e&&e.name)||'error', message:(e&&e.message)||'' }; });
  }
  function authenticate(app,id){
    if(!supported()) return Promise.resolve({ok:false,error:'unsupported'});
    var rec=stored(app,id);
    if(!rec||!rec.id) return Promise.resolve({ok:false,error:'notregistered'});
    return navigator.credentials.get({publicKey:{
      challenge: rand(32),
      allowCredentials:[{ type:'public-key', id: unb64u(rec.id) }],
      userVerification:'required', timeout:60000, rpId: location.hostname||undefined
    }}).then(function(asr){
      if(!asr) return {ok:false,error:'cancelled'};
      return {ok:true};
    }).catch(function(e){ return {ok:false, error:(e&&e.name)||'error', message:(e&&e.message)||'' }; });
  }
  window.Bio = { supported:supported, available:available, isRegistered:isRegistered, register:register, authenticate:authenticate, unregister:unregister, label:label };
})();
</script>

  } catch(e){ console.warn('AppCheck init', e); }
  const auth = getAuth(app);
  // Awaitable auth (mirrors tradehub.html / index.html) so the first read waits
  // for a valid token instead of racing it — avoids a slow first load on iOS
  // cold launches where the getDoc would otherwise queue behind pending auth.
  let _authResolve; const _fbAuthReady = new Promise(res => { _authResolve = res; });
  onAuthStateChanged(auth, (user) => { if (user) { try { _authResolve && _authResolve(); } catch(e){} } });
  signInAnonymously(auth).catch(e => console.warn("Anon auth failed:", e));
  const _whenAuthed = () => Promise.race([_fbAuthReady, new Promise(res => setTimeout(res, 3000))]);
  const db = initializeFirestore(app, { localCache: memoryLocalCache() });
  const ML_DOC = doc(db, "dashboards/mylist");

  let saveTimer = null;
  let lastOwnSaveAt = 0;

  window._mlLoad = async () => {
    try { await _whenAuthed(); const snap = await getDoc(ML_DOC); return snap.exists() ? snap.data() : null; }
    catch(e){ console.warn("MyList load failed:", e); return null; }
  };
  window._mlSave = (payload) => {
    lastOwnSaveAt = Date.now();
    window.dispatchEvent(new CustomEvent("ml-syncing"));
    if (saveTimer) clearTimeout(saveTimer);

      try {
        lastOwnSaveAt = Date.now();
        await setDoc(ML_DOC, payload);
        lastOwnSaveAt = Date.now();
        window.dispatchEvent(new CustomEvent("ml-saved"));
      } catch(e){
        console.warn("MyList save failed:", e);
        window.dispatchEvent(new CustomEvent("ml-error"));
      }
    }, 1200);
  };

    if (Date.now() - lastOwnSaveAt < 8000) return;
    if (snap.exists()) window.dispatchEvent(new CustomEvent("ml-remote-update", { detail: snap.data() }));
  }, (err) => { console.warn("MyList snapshot err", err); window.dispatchEvent(new CustomEvent("ml-error")); });

    catch(e){ console.warn("Recipes load failed:", e); return []; }

  window._mlSaveRecipes = (profile, recipes) => {
    const ref = REC_DOCS[profile]; if(!ref) return;

    if (recSaveTimers[profile]) clearTimeout(recSaveTimers[profile]);
    recSaveTimers[profile] = setTimeout(async () => {
      try {
        recLastOwnSaveAt[profile] = Date.now();
        await setDoc(ref, { recipes: recipes, savedAt: Date.now() });

        window.dispatchEvent(new CustomEvent("ml-saved"));
      } catch(e){ console.warn("Recipes save failed:", e); window.dispatchEvent(new CustomEvent("ml-error")); }
    }, 1200);

    }, (err) => { console.warn("Recipes snapshot err", err); });
  });

async function authFetch(path, body){ var r=await fetch(AUTH_WORKER+path,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }); return r.json(); }

// Shared password-reset flow (emailed 6-char code → verify → set new password).
// opts: { worker, reqBody:{journal,entryId}|{profile}, email, appName, label, onSuccess }
window._pwReset = window._pwReset || async function(opts){
  function post(path, obj){ return fetch(opts.worker+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(obj)}).then(function(r){return r.json();}); }
  var rq;
  try { rq = await post('/auth/reset/request', opts.reqBody); }
  catch(e){ alert('Network error while starting the reset. Check your connection and try again.'); return false; }
  if (rq && rq.noLock) { alert('There is no password set on the server for this item.'); return false; }
  if (!rq || !rq.ok || !rq.code) { alert('Could not start the reset. Please try again.'); return false; }
  // Email the code through the same Formspree form used for hints (proven, browser-origin).
  var emailed = false;
  try {
    var fp = await fetch(opts.form, { method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'},
      body: JSON.stringify({ email: opts.email, subject: opts.appName+' — Password Reset Code',
        message: 'Your password reset code for '+opts.label+' is:\n\n    '+rq.code+'\n\nEnter this code in '+opts.appName+' to set a new password. It expires in 15 minutes. If you did not request this, you can ignore this email.\n\n— '+opts.appName }) });
    emailed = fp.ok;
  } catch(e){ emailed = false; }
  if (!emailed) { alert('Could not send the reset email. Please try again in a moment.'); return false; }
  var vals = await window.uiForm({
    title:'Reset password',
    message:'A 6-character code was emailed to '+opts.email+'. Enter it below (check spam if you don\'t see it within a minute), then choose a new password.',
    okLabel:'Reset password',
    fields:[
      { name:'code', label:'Security code from email', placeholder:'6-character code', autocap:false, required:true },
      { name:'password', label:'New password', type:'password', required:true },
      { name:'hint', label:'New password hint (optional)' }
    ]
  });
  if (!vals) return false;
  var code = String(vals.code||'').trim();
  var np = String(vals.password||'').trim();
  var nh = vals.hint||'';
  if (!code) { await window.uiAlert('No code entered.'); return false; }
  if (!np) { await window.uiAlert('Password cannot be empty.'); return false; }
  var body = Object.assign({ code:code, password:np, hint:nh }, opts.reqBody);
  var cf;
  try { cf = await post('/auth/reset/confirm', body); }
  catch(e){ alert('Network error while confirming the reset. Please try again.'); return false; }
  if (cf && cf.ok) {
    if (opts.onSuccess) { try { opts.onSuccess(); } catch(e){} }
    alert('Password reset! It now syncs to all your devices. This device is unlocked; other devices will ask for the new password once.');
    return true;
  }
  if (cf && cf.error==='badcode') alert('That code is not correct.'+(cf.remaining!=null?(' '+cf.remaining+' attempt(s) left before it expires.'):''));
  else if (cf && cf.error==='expired') alert('That code has expired or was already used. Start the reset again to get a fresh code.');
  else if (cf && cf.error==='locked') alert('Too many incorrect attempts. Start the reset again to get a fresh code.');
  else alert('Reset failed. Please try again.');
  return false;
};

// Capture: ALWAYS getUserMedia → WAV (device-selectable, never stops on silence,
//          works on iOS). Live captions: SpeechRecognition in parallel, display-only.
var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
var voice = { active:false, busy:false,
              ctx:null, stream:null, proc:null, src:null, buffers:[], sampleRate:44100,
              recog:null, capSession:'', capCurrent:'', deviceId:'' };
try{ voice.deviceId = localStorage.getItem('ml_mic_device') || ''; }catch(e){}

function micTap(){ if(voice.busy) return; if(voice.active){ stopVoice(); } else { startVoice(); } }

function setMicUI(on){ ['mic-btn','float-mic'].forEach(function(id){ var b=$(id); if(b){ if(on) b.classList.add('recording'); else b.classList.remove('recording'); } }); }
function setBarRecording(on){ var fv=$('float-voice'); if(fv){ if(on) fv.classList.add('recording'); else fv.classList.remove('recording'); } }
function showCaption(html){ var c=$('top-caption'), b=$('top-caption-body'), h=c&&c.querySelector('.cap-h'); if(c&&b){ if(h)h.style.display=''; c.classList.add('show'); b.innerHTML=html; b.scrollTop=b.scrollHeight; } }
function showProcessing(){ var c=$('top-caption'), b=$('top-caption-body'), h=c&&c.querySelector('.cap-h'); if(c&&b){ if(h)h.style.display='none'; c.classList.add('show'); b.innerHTML='<div style="display:flex;align-items:center;gap:9px;font-weight:700"><span class="spin"></span> Processing…</div>'; } }
function hideCaption(){ var c=$('top-caption'); if(c){ c.classList.remove('show'); var b=$('top-caption-body'); if(b)b.innerHTML=''; } }
function joinT(a,b){ a=(a||'').trim(); b=(b||'').trim(); return (a+' '+b).trim(); }
function captionText(){ return joinT(voice.capSession, voice.capCurrent); }

async function getMic(){
  var base={ channelCount:1, echoCancellation:true, noiseSuppression:true };
  if(voice.deviceId){
    try{ return await navigator.mediaDevices.getUserMedia({ audio: Object.assign({ deviceId:{ exact:voice.deviceId } }, base) }); }
    catch(e){ voice.deviceId=''; try{ localStorage.removeItem('ml_mic_device'); }catch(_){} }
  }
  // default / current system input (fresh each time → picks up device changes like unplugged headphones)
  return await navigator.mediaDevices.getUserMedia({ audio: base });
}

async function startVoice(){
  var stream;
  try{ stream = await getMic(); }
  catch(e){ toast('No microphone available — check your input device', true); return; }
  voice.stream = stream;
  var AC = window.AudioContext || window.webkitAudioContext; voice.ctx = new AC();
  if(voice.ctx.state==='suspended'){ try{ await voice.ctx.resume(); }catch(e){} }
  voice.sampleRate = voice.ctx.sampleRate;
  voice.src = voice.ctx.createMediaStreamSource(stream);
  voice.proc = voice.ctx.createScriptProcessor(4096,1,1); voice.buffers=[];
  voice.proc.onaudioprocess=function(e){ voice.buffers.push(new Float32Array(e.inputBuffer.getChannelData(0))); };
  voice.src.connect(voice.proc); voice.proc.connect(voice.ctx.destination);
  voice.active=true; setMicUI(true); setBarRecording(true);
  startCaptions(); // best-effort live text
  showCaption('<span class="interim">Listening… tap the mic again to stop &amp; process.</span>');
}
// live captions only — rebuilds the current session each event (no duplication),
// accumulates across auto-restarts so pauses never lose text.
function startCaptions(){
  if(!SR){ return; }
  var r; try{ r=new SR(); }catch(e){ return; }
  r.continuous=true; r.interimResults=true; r.lang='en-US';
  voice.capSession=''; voice.capCurrent='';
  r.onresult=function(e){
    var fin='', interim='';
    for(var i=0;i<e.results.length;i++){ var res=e.results[i]; if(res.isFinal) fin+=res[0].transcript+' '; else interim+=res[0].transcript; }
    voice.capCurrent=fin.trim();
    var full=captionText();
    showCaption((full?esc(full):'')+(interim?(full?' ':'')+'<span class="interim">'+esc(interim)+'</span>':'') || '<span class="interim">Listening…</span>');
  };
  r.onerror=function(){};
  r.onend=function(){
    if(!voice.active) return;
    voice.capSession=joinT(voice.capSession, voice.capCurrent); voice.capCurrent='';
    try{ r.start(); }catch(e){ setTimeout(function(){ if(voice.active){ try{ r.start(); }catch(_){ } } },250); }
  };
  try{ r.start(); }catch(e){}
  voice.recog=r;
}
async function stopVoice(){
  voice.active=false; setMicUI(false); setBarRecording(false);
  // stop captions, capture final caption text
  if(voice.recog){ try{ voice.recog.onend=null; voice.recog.stop(); }catch(e){} }
  voice.capSession=joinT(voice.capSession, voice.capCurrent); voice.capCurrent='';
  var capText=captionText(); voice.recog=null;
  // stop recorder, build WAV
  try{ voice.proc && voice.proc.disconnect(); voice.src && voice.src.disconnect(); }catch(e){}
  try{ voice.stream && voice.stream.getTracks().forEach(function(t){ t.stop(); }); }catch(e){}
  var sr=voice.sampleRate, buffers=voice.buffers.slice();
  try{ voice.ctx && voice.ctx.close(); }catch(e){} voice.ctx=null; voice.buffers=[];
  // a spoken undo/redo command shouldn't go to the AI
  if(capText && isUndoCommand(capText)){ hideCaption(); doUndo(); return; }
  if(capText && isRedoCommand(capText)){ hideCaption(); doRedo(); return; }
  showProcessing(); voice.busy=true;
  try{
    var wav=encodeWav(buffers, sr, 16000);
    if(wav.byteLength>=1600){ var b64=await blobToB64(new Blob([wav])); await routeAI({ audio:b64, mimeType:'audio/wav' }); }
    else if(capText){ await routeAI({ transcript:capText }); }
    else { toast("Didn't catch that — try again", true); }
  }catch(err){
    if(capText){ try{ await routeAI({ transcript:capText }); }catch(e){ toast('Voice failed — try again', true); } }
    else toast('Voice failed — try again', true);
  }
  hideCaption(); voice.busy=false;
}

// text commands (floating box)
function sendText(){ doTypedSend($('voice-text')); }
function sendFloatText(){ doTypedSend($('float-text')); }
function doTypedSend(ta){
  if(!activeProfile){ return; }
  if(!ta) return; var t=(ta.value||'').trim(); if(!t) return;
  ta.value=''; if(ta.tagName==='TEXTAREA') autoGrow(ta);
  handleVoiceText(t);
}
function handleVoiceText(text){
  if(isUndoCommand(text)){ hideCaption(); doUndo(); return; }
  if(isRedoCommand(text)){ hideCaption(); doRedo(); return; }
  showProcessing(); voice.busy=true;
  routeAI({ transcript:text }).then(function(){ hideCaption(); voice.busy=false; });

// Voice/typed input and undo/redo route to the Recipes engine when the Recipes
// tab is open, and to the Lists engine otherwise — same bar, same commands.
function routeAI(p){ return view==='recipes' ? sendRecipeToAI(p) : sendToAI(p); }
function doUndo(){ return view==='recipes' ? recUndo() : undoLast(); }
function doRedo(){ return view==='recipes' ? recRedo() : redoLast(); }
function isUndoCommand(t){ return /^\s*(please\s+)?(undo( that| last| it)?|revert( that)?|go back|put (it|that|them) back|bring (it|that|them) back|never\s?mind|that was a mistake)\s*[.!?]?\s*$/i.test(t); }
function isRedoCommand(t){ return /^\s*(please\s+)?(redo( that| last| it)?|redo)\s*[.!?]?\s*$/i.test(t); }

async function sendToAI(payloadExtra){
  if(!activeProfile) return;
  var l=curList();
  try{
    var body=Object.assign({ profile:activeProfile, mode:'edit', items:(l&&l.items)||[], stores:(l&&l.stores)||[] }, payloadExtra);
    var r=await fetch(API+'/list/parse',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    var d=await r.json();
    if(d.ok && Array.isArray(d.items)){
      var lst=ensureList();
      if(d.listName) lst.name=String(d.listName);
      applyParsed(lst, d);
      if(d.newList) createListFromAI(d.newList);
      $('voice-status') && ($('voice-status').textContent=''); toast(d.note||'List updated');
    }
    else { toast(d.error||'Could not understand', true); }
  }catch(e){ toast('Network error', true); }

// create a list on the fly if there isn't one (lets you start by voice/text)
function ensureList(){
  var l=curList(); if(l) return l;
  l={ id:uid(), name:'My List', stores:[], items:[], createdAt:Date.now() };
  lists().push(l); activeListId=l.id; localStorage.setItem('ml_last_list_'+activeProfile,l.id);
  return l;
}
function applyParsed(l, d){
  pushUndo(l);
  var parsed=d.items||[];
  var byName={}, byId={}; (l.items||[]).forEach(function(it){ byName[it.name.toLowerCase()]=it; if(it.id) byId[it.id]=it; });

    var prev=(p.id&&byId[p.id])||byName[(p.name||'').toLowerCase()];

  // Worker output is authoritative for stores — replacing (not merging) lets

function encodeWav(buffers, inRate, outRate){
  var len=0; buffers.forEach(function(b){ len+=b.length; });
  var data=new Float32Array(len); var off=0; buffers.forEach(function(b){ data.set(b,off); off+=b.length; });
  var ratio=inRate/outRate; var outLen=Math.floor(data.length/ratio); var out=new Float32Array(outLen);
  for(var i=0;i<outLen;i++){ out[i]=data[Math.floor(i*ratio)]; }
  var buf=new ArrayBuffer(44+out.length*2); var view=new DataView(buf);
  function ws(o,s){ for(var i=0;i<s.length;i++) view.setUint8(o+i, s.charCodeAt(i)); }
  ws(0,'RIFF'); view.setUint32(4,36+out.length*2,true); ws(8,'WAVE'); ws(12,'fmt ');
  view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,1,true);
  view.setUint32(24,outRate,true); view.setUint32(28,outRate*2,true); view.setUint16(32,2,true); view.setUint16(34,16,true);
  ws(36,'data'); view.setUint32(40,out.length*2,true);
  var p=44; for(var j=0;j<out.length;j++){ var s=Math.max(-1,Math.min(1,out[j])); view.setInt16(p, s<0?s*0x8000:s*0x7FFF, true); p+=2; }
  return buf;
}

async function sendRecipeToAI(payloadExtra){
  if(!activeProfile) return;
  try{
    var openIndex = recDetailId ? (recipes.map(function(r){return r.id;}).indexOf(recDetailId)+1) : 0;
    var body=Object.assign({ profile:activeProfile, recipes:recipes.map(recForAI), openIndex:openIndex }, payloadExtra);
    var r=await fetch(API+'/recipe/parse',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    var d=await r.json();
    if(d.ok && Array.isArray(d.recipes)){
      if(d.ops>0){
        recPushUndo();
        setRecipes(d.recipes.map(normRecipeIn));
        if(recDetailId && !recipes.some(function(x){return x.id===recDetailId;})) recDetailId=null;
        recEditingStep=null; persistRecipes(); render();
      }
      toast(d.note || (d.ops>0?'Recipes updated':'No changes'));

// ════════ DRAG & DROP (floating ghost + insertion line, no reflow) ════════
// Hold ~180ms on a row to pick it up, then drag. The dragged row stays dimmed
// in place (zero layout shift = smooth); a glowing line shows where it'll drop.
// On release we mutate the data model once and re-render. Works for grocery
// items (incl. moving between store groups) and recipe reordering, mouse+touch.
var dndLastEnd = 0;
var dnd = null; // active drag state

function enableDrag(container, kind){
  if(!container || container._dndBound) return;
  container._dndBound = true;
  container.addEventListener('pointerdown', function(e){
    if(dnd) return;
    if(e.button && e.button!==0) return;
    if(e.target.closest('button, input, select, textarea, a, .chk')) return;
    var row = e.target.closest('[data-id]');
    if(!row || !container.contains(row)) return;
    var sx=e.clientX, sy=e.clientY, pid=e.pointerId, hold;
    function cancel(){ clearTimeout(hold); document.removeEventListener('pointermove',pm,true); document.removeEventListener('pointerup',pu,true); document.removeEventListener('pointercancel',pu,true); }
    function pm(ev){ if(Math.abs(ev.clientX-sx)>9 || Math.abs(ev.clientY-sy)>9){ cancel(); } }
    function pu(){ cancel(); }
    hold=setTimeout(function(){ cancel(); beginDrag(container, kind, row, sx, sy, pid); }, 180);
    document.addEventListener('pointermove', pm, true);
    document.addEventListener('pointerup', pu, true);
    document.addEventListener('pointercancel', pu, true);
  });
  // a real drag is followed by a click — swallow it
  container.addEventListener('click', function(e){ if(Date.now()-dndLastEnd<350){ e.stopPropagation(); e.preventDefault(); } }, true);
}

function beginDrag(container, kind, row, px, py, pid){
  var rect=row.getBoundingClientRect();
  var ghost=row.cloneNode(true);
  ghost.classList.add('dnd-ghost');
  ghost.style.width=rect.width+'px';
  document.body.appendChild(ghost);
  row.classList.add('dnd-src');
  var indicator=document.createElement('div'); indicator.className='dnd-indicator'; document.body.appendChild(indicator);
  // Block the page from scrolling/cancelling the gesture on touch — this is what
  // made mobile "drop immediately": the browser claimed the touch for scrolling.
  var blockScroll=function(e){ e.preventDefault(); };
  var blockCtx=function(e){ e.preventDefault(); };
  dnd={ container:container, kind:kind, row:row, id:row.dataset.id, ghost:ghost, indicator:indicator, pid:pid,
        ox:px-rect.left, oy:py-rect.top, px:px, py:py, target:null, raf:0, moved:false,
        blockScroll:blockScroll, blockCtx:blockCtx };
  document.body.classList.add('dnd-active');
  try{ row.setPointerCapture && row.setPointerCapture(pid); }catch(_){}
  try{ navigator.vibrate && navigator.vibrate(12); }catch(_){}
  document.addEventListener('touchmove', blockScroll, {passive:false});
  document.addEventListener('contextmenu', blockCtx);
  document.addEventListener('pointermove', dndMove, {passive:false});
  document.addEventListener('pointerup', dndEnd);
  document.addEventListener('pointercancel', dndEnd);
  dndLoop();
}
function dndMove(e){ if(!dnd) return; e.preventDefault(); dnd.px=e.clientX; dnd.py=e.clientY; dnd.moved=true; }
function dndLoop(){
  if(!dnd) return;
  var a=dnd;
  a.ghost.style.transform='translate('+(a.px-a.ox)+'px,'+(a.py-a.oy)+'px) rotate(1deg)';
  // edge auto-scroll
  var vh=window.innerHeight, edge=80;
  if(a.py<edge) window.scrollBy(0,-Math.ceil((edge-a.py)/6));
  else if(a.py>vh-edge) window.scrollBy(0,Math.ceil((a.py-(vh-edge))/6));
  a.target=computeTarget(a);
  paintIndicator(a);
  a.raf=requestAnimationFrame(dndLoop);
}
// Determine drop target: {store, beforeId, y}. store=null for recipes/flat lists.
function computeTarget(a){
  // horizontal reorder of the list tabs
  if(a.kind==='listtab'){
    var chips=Array.prototype.slice.call(a.container.querySelectorAll('[data-id]')).filter(function(el){return el!==a.row;});
    var px=a.px, bId=null, x, done=false;
    for(var c=0;c<chips.length;c++){ var cr2=chips[c].getBoundingClientRect(); if(px<cr2.left+cr2.width/2){ bId=chips[c].dataset.id; x=cr2.left-4; done=true; break; } }
    if(!done){ if(chips.length){ var lc=chips[chips.length-1].getBoundingClientRect(); x=lc.right+4; } else { x=a.container.getBoundingClientRect().left+4; } }
    return {axis:'x', beforeId:bId, x:x};
  }
  var headers=Array.prototype.slice.call(a.container.querySelectorAll('.store-group-h'));
  var py=a.py;
  function itemsUnder(){ return Array.prototype.slice.call(a.container.querySelectorAll('[data-id]')).filter(function(el){return el!==a.row;}); }
  if(headers.length){
    // grouped grocery list — build group spans
    var children=Array.prototype.slice.call(a.container.children);
    var groups=[];
    for(var i=0;i<children.length;i++){
      var ch=children[i];
      if(ch.classList.contains('store-group-h')){
        var hr=ch.getBoundingClientRect();
        groups.push({ store:ch.getAttribute('data-store')||'', top:hr.top, hbottom:hr.bottom, items:[] });
      } else if(ch.dataset && ch.dataset.id && ch!==a.row && groups.length){
        groups[groups.length-1].items.push(ch);
      }
    }
    if(!groups.length) return {store:'', beforeId:null, y:py};
    // bottom of each group = top of next group (or container bottom)
    var cbot=a.container.getBoundingClientRect().bottom;
    for(var g=0; g<groups.length; g++){ groups[g].bottom = (g+1<groups.length)? groups[g+1].top : cbot; }
    // pick group containing py (clamp)
    var grp=groups[0];
    if(py>=groups[groups.length-1].bottom) grp=groups[groups.length-1];
    else { for(var k=0;k<groups.length;k++){ if(py < groups[k].bottom){ grp=groups[k]; break; } } }
    // insertion index within group
    var beforeId=null, y;
    var placed=false;
    for(var m=0;m<grp.items.length;m++){
      var r=grp.items[m].getBoundingClientRect();
      if(py < r.top + r.height/2){ beforeId=grp.items[m].dataset.id; y=r.top-4; placed=true; break; }
    }
    if(!placed){
      if(grp.items.length){ var lr=grp.items[grp.items.length-1].getBoundingClientRect(); y=lr.bottom+4; }
      else { y=grp.hbottom + 7; } // empty group: just BELOW its header, never through it
    }
    return {store:grp.store, beforeId:beforeId, y:y};
  } else {
    // flat list / recipes
    var items=itemsUnder(); var beforeId2=null, y2;
    var placed2=false;
    for(var n=0;n<items.length;n++){ var rr=items[n].getBoundingClientRect(); if(py<rr.top+rr.height/2){ beforeId2=items[n].dataset.id; y2=rr.top-4; placed2=true; break; } }
    if(!placed2){ if(items.length){ var l2=items[items.length-1].getBoundingClientRect(); y2=l2.bottom+4; } else { y2=a.container.getBoundingClientRect().top+4; } }
    return {store:null, beforeId:beforeId2, y:y2};
  }
}
function paintIndicator(a){
  if(!a.target){ a.indicator.style.display='none'; return; }
  var cr=a.container.getBoundingClientRect();
  a.indicator.style.display='block';
  if(a.target.axis==='x'){
    a.indicator.style.left=(a.target.x)+'px';
    a.indicator.style.top=(cr.top+3)+'px';
    a.indicator.style.width='3px';
    a.indicator.style.height=(cr.height-6)+'px';
  } else {
    a.indicator.style.left=(cr.left+4)+'px';
    a.indicator.style.top=(a.target.y-1.5)+'px';
    a.indicator.style.width=(cr.width-8)+'px';
    a.indicator.style.height='3px';
  }
}
function dndEnd(){
  if(!dnd) return;
  var a=dnd;
  document.removeEventListener('pointermove', dndMove);
  document.removeEventListener('pointerup', dndEnd);
  document.removeEventListener('pointercancel', dndEnd);
  if(a.blockScroll) document.removeEventListener('touchmove', a.blockScroll, {passive:false});
  if(a.blockCtx) document.removeEventListener('contextmenu', a.blockCtx);
  try{ a.row && a.row.releasePointerCapture && a.row.releasePointerCapture(a.pid); }catch(_){}
  if(a.raf) cancelAnimationFrame(a.raf);
  if(a.ghost) a.ghost.remove();
  if(a.indicator) a.indicator.remove();
  if(a.row) a.row.classList.remove('dnd-src');
  document.body.classList.remove('dnd-active');
  var t=a.target, kind=a.kind, id=a.id, moved=a.moved;
  dnd=null;
  if(moved && t){ dndLastEnd=Date.now(); applyDrop(kind, id, t); }
}
function applyDrop(kind, id, t){
  if(kind==='listtab'){
    var arr=lists(); var src0=arr.filter(function(x){return x.id===id;})[0]; if(!src0) return;
    var rest0=arr.filter(function(x){return x.id!==id;});
    var i0 = t.beforeId ? rest0.findIndex(function(x){return x.id===t.beforeId;}) : rest0.length;
    if(i0<0) i0=rest0.length;
    rest0.splice(i0,0,src0); pData().lists=rest0; persist(); render(); return;
  }
  if(kind==='recipe'){
    var src=recipes.filter(function(x){return x.id===id;})[0]; if(!src) return;
    recPushUndo();
    var rest=recipes.filter(function(x){return x.id!==id;});
    var idx = t.beforeId ? rest.findIndex(function(x){return x.id===t.beforeId;}) : rest.length;
    if(idx<0) idx=rest.length;
    rest.splice(idx,0,src); setRecipes(rest); persistRecipes(); render(); return;
  }
  if(kind==='recstep'){
    // reorder instruction steps (data-id = step index); renumber + save immediately
    var rc=recCurrent(); if(!rc) return;
    var steps=recStepsOf(rc.instructions);
    var from=parseInt(id,10); if(isNaN(from)||from<0||from>=steps.length) return;
    var arr=steps.map(function(tx,ix){ return {ix:ix, t:tx}; });
    var rest3=arr.filter(function(x){ return x.ix!==from; });
    var sidx = (t.beforeId!=null && t.beforeId!=='') ? rest3.findIndex(function(x){ return x.ix===parseInt(t.beforeId,10); }) : rest3.length;
    if(sidx<0) sidx=rest3.length;
    recPushUndo();
    rest3.splice(sidx,0,{ix:from, t:steps[from]});
    rc.instructions=recRenumber(rest3.map(function(x){ return x.t; }));
    persistRecipes(); render(); return;
  }
  // list items
  var l=curList(); if(!l) return;
  var item=(l.items||[]).filter(function(x){return x.id===id;})[0]; if(!item) return;
  pushUndo(l);
  var stores=l.stores||[];
  var targetStore = (t.store===null||t.store===undefined) ? (item.store||'') : t.store;
  item.store = targetStore;
  var rest2=l.items.filter(function(x){return x.id!==id;});
  // rebuild in group order: each store, then Other; insert src into its group at beforeId
  var order = stores.concat(['']);
  var result=[];
  order.forEach(function(st){
    var g=rest2.filter(function(it){ return st==='' ? (!it.store||stores.indexOf(it.store)<0) : it.store===st; });
    var isTarget = (st===targetStore) || (st==='' && (targetStore===''|| stores.indexOf(targetStore)<0));
    if(isTarget){
      var idx = t.beforeId ? g.findIndex(function(x){return x.id===t.beforeId;}) : g.length;
      if(idx<0) idx=g.length;
      g.splice(idx,0,item);
    }
    result=result.concat(g);
  });
  if(result.indexOf(item)<0) result.push(item);
  l.items=result; persist(); render();
}

  L.forEach(function(l){

    h+='<div class="list-chip'+(l.id===activeListId?' active':'')+'" data-id="'+l.id+'" onclick="ML.openList(\''+l.id+'\')">'+esc(l.name)+' <span class="cnt">'+cnt+'</span></div>';
  });
  h+='<div class="list-chip add" onclick="ML.addList()">+ New list</div>';
  bar.innerHTML=h;

var GRIP='<div class="resize-grip"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M13 6 L6 13 M13 10 L10 13"/></svg></div>';
function render(){
  if(!activeProfile) return;
  updateLockBtn();
  renderViewSwitch();
  // ── Recipes view (both profiles) ──
  if(view==='recipes'){
    $('lists-bar').style.display='none';
    // same voice+type bar as Lists (no Manual button — that's a separate FAB, kept hidden here)
    $('float-voice').classList.add('show');
    $('sel-bar').classList.remove('show');
    var mf=$('manual-fab'); if(mf) mf.style.display='none'; var mp=$('manual-pop'); if(mp) mp.classList.remove('show');
    $('list-view').innerHTML = renderRecipesView();
    if(!recDetailId){ var rl=$('rec-list-rows'); if(rl && recFiltered().length===recipes.length) enableDrag(rl, 'recipe'); }
    else if(recEditingStep===null){ var rs=$('rec-steps-container'); if(rs) enableDrag(rs, 'recstep'); }
    return;
  }
  $('lists-bar').style.display='';
  renderListsBar();
  // voice/type bar is available within a profile, but hidden during Select mode
  $('float-voice').classList.toggle('show', !selectMode);
  var l=curList(); var v=$('list-view');
  if(!l){
    v.innerHTML='<div class="card"><div class="empty">No lists yet.<br><br>'
      +'Tap the <b>mic</b> or type in the bar below and just say what you need — the AI will create your list for you.<br><br>'
      +'<button class="btn solid" onclick="ML.addList()">+ Create a blank list</button></div></div>';
    updateSelBar(); return;
  }
  localStorage.setItem('ml_last_list_'+activeProfile,l.id);
  var stores=l.stores||[]; var items=l.items||[]; var doneCount=items.filter(function(x){return x.done;}).length;

  var h='';
  // header
  h+='<div class="card list-head-card">';
  h+='<div class="list-head"><input class="ttl" id="list-title" value="'+esc(l.name)+'" onchange="ML.renameList(\''+l.id+'\',this.value)">'
    +'<button class="btn danger sm" onclick="ML.deleteList(\''+l.id+'\')">Delete list</button></div>';
  h+='<div class="list-meta">'+items.length+' item'+(items.length!==1?'s':'')+' · '+doneCount+' done</div>';
  h+='</div>';

  // items header + undo/redo + clear + select toggle
  h+='<div class="items-head"><span class="ih-title">Items</span><span class="sp"></span>';
  if(undoAvailable()) h+='<button class="btn ghost sm" onclick="ML.undoLast()" title="Undo">↶ Undo</button>';
  if(redoAvailable()) h+='<button class="btn ghost sm" onclick="ML.redoLast()" title="Redo">↷ Redo</button>';
  if(doneCount) h+='<button class="btn ghost sm" onclick="ML.clearDone()">Clear done</button>';
  if(items.length) h+='<button class="btn ghost sm" onclick="ML.toggleSelectMode()">'+(selectMode?'Done':'Select')+'</button>';
  h+='</div>';
  h+='<div>'+renderItems(l)+'</div>';

  v.innerHTML=h;
  if(editingItemId) autoGrow($('edit-desc-'+editingItemId));
  updateSelBar();
  updateManualFab(); renderManualPop();
  // drag: items + list tabs (hold to drag; works on desktop & mobile)
  if(!selectMode && !editingItemId){ var ic=$('items-container'); if(ic) enableDrag(ic, 'list'); }
  enableDrag($('lists-bar'), 'listtab');
}

function manualVisible(){ return !!(activeProfile && view==='lists' && curList() && !selectMode); }
function updateManualFab(){ var fab=$('manual-fab'); if(fab) fab.style.display = manualVisible() ? 'inline-flex' : 'none'; }

// store field: type-to-create + dropdown of existing stores (datalist)
function storeFieldInner(id, sel){
  var l=curList(); var stores=(l&&l.stores)||[];
  var dl='ml-dl-'+id;
  return '<input id="'+id+'" list="'+dl+'" value="'+esc(sel||'')+'" placeholder="Type or pick a store…" autocomplete="off">'
    +'<datalist id="'+dl+'">'+stores.map(function(s){return '<option value="'+esc(s)+'"></option>';}).join('')+'</datalist>';
}
function storeHeaderHtml(s){ return '<div class="store-group-h" data-store="'+esc(s)+'">'+esc(s||'Other')+' <span class="gline"></span></div>'; }
function renderItems(l){
  var items=l.items||[]; var stores=l.stores||[];
  if(!items.length) return '<div class="card"><div class="empty">No items yet. Tap the mic or type in the bar at the bottom, or open <b>Manual</b> to add them by hand.</div></div>';
  // ONE flat container with interleaved store headers + item rows → enables
  // smooth cross-store drag (an item's store = the header above it on drop).
  var h='<div id="items-container">';
  if(stores.length){
    stores.forEach(function(s){
      h+=storeHeaderHtml(s);
      h+=sortItems(items.filter(function(x){return x.store===s;})).map(itemHtml).join('');
    });
    var other=items.filter(function(x){return !x.store || stores.indexOf(x.store)<0;});
    if(other.length){ h+=storeHeaderHtml(''); h+=sortItems(other).map(itemHtml).join(''); }
  } else {
    h+=sortItems(items).map(itemHtml).join('');
  }
  h+='</div>';
  return h;
}
function sortItems(arr){ return arr.slice().sort(function(a,b){ return (a.done?1:0)-(b.done?1:0); }); }

    +'<div class="acts">'
      +'<button class="ib" onclick="ML.startEdit(\''+it.id+'\')" title="Edit"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>'
      +'<button class="ib del" onclick="ML.delItem(\''+it.id+'\')" title="Delete"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>'
    +'</div></div>';
}
function itemSubHtml(it){
  var sub=''; if(it.qty) sub+='<span class="qty-tag">×'+esc(it.qty)+'</span>';
  var s = sub?'<div class="sub">'+sub+'</div>':'';
  if(it.desc) s+='<div class="desc">'+esc(it.desc)+'</div>';
  return s;
}
function toggleManual(){ if(!manualVisible()) return; manualOpen=!manualOpen; renderManualPop(); }

window.ML = {
  chooseProfile:chooseProfile, toggleFav:toggleFav, goProfileSelect:goProfileSelect,
  addList:addList, openList:openList, deleteList:deleteList, renameList:renameList,
  addStore:addStore, removeStore:removeStore, addItem:addItem, toggleDone:toggleDone,
  delItem:delItem, startEdit:startEdit, saveEdit:saveEdit, cancelEdit:cancelEdit, clearDone:clearDone,
  micTap:micTap, sendText:sendText, sendFloatText:sendFloatText, autoGrow:autoGrow, toggleManual:toggleManual,
  toggleSelectMode:toggleSelectMode, exitSelect:exitSelect, toggleSel:toggleSel, toggleSelectAll:toggleSelectAll, deleteSelected:deleteSelected,
  undoLast:undoLast, redoLast:redoLast,
  setView:setView, recRerender:recRerender, recOpenAdd:recOpenAdd, recOpenEdit:recOpenEdit, recOpenDetail:recOpenDetail,
  recBack:recBack, recAddIng:recAddIng, recAddTool:recAddTool, recSave:recSave, recCloseModal:recCloseModal, recDelete:recDelete,
  recUndo:recUndo, recRedo:recRedo,
  recEditStep:recEditStep, recAddStep:recAddStep, recSaveStep:recSaveStep, recCancelStep:recCancelStep, recDeleteStep:recDeleteStep,
  openDevicePicker:openDevicePicker, closeDevicePicker:closeDevicePicker, pickDevice:pickDevice,
  manageLock:manageLock, lockSubmit:lockSubmit, lockCancel:lockCancel, lockForgot:lockForgot, lockReset:lockReset
};

$('lock-pw').addEventListener('keydown', function(e){ if(e.key==='Enter') lockSubmit(); });
})();
</script>

<!-- ══ In-UI modal system (replaces native alert/confirm/prompt so dialogs live
        INSIDE the app and never vanish when the browser window loses focus) ══ -->
<script>
(function(){
  if (window.uiModal) return;
  var ACCENT = '#E0607A';
  var CSS =
    '#uim-overlay{position:fixed;inset:0;z-index:2147483000;display:none;align-items:center;justify-content:center;background:rgba(8,8,11,.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);padding:20px;box-sizing:border-box;}'
  + '#uim-overlay.show{display:flex;}'
  + '#uim-box{width:100%;max-width:370px;background:#17171c;border:1px solid #2c2c36;border-radius:16px;padding:22px 20px;box-shadow:0 20px 60px rgba(0,0,0,.55);box-sizing:border-box;font-family:\'Nunito\',system-ui,sans-serif;animation:uimIn .16s ease;}'
  + '@keyframes uimIn{from{transform:translateY(8px) scale(.98);opacity:0}to{transform:none;opacity:1}}'
  + '#uim-title{font-size:17px;font-weight:800;color:#f2f2f6;margin-bottom:8px;line-height:1.25;}'
  + '#uim-msg{font-size:14px;color:#c9c9d4;line-height:1.5;white-space:pre-wrap;margin-bottom:14px;}'
  + '.uim-field{display:block;margin-bottom:12px;}'
  + '.uim-label{display:block;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#8a8a99;margin:0 0 5px 2px;}'
  + '.uim-input{width:100%;box-sizing:border-box;background:#0f0f13;border:1px solid #33333f;border-radius:9px;color:#f2f2f6;font-size:15px;padding:11px 13px;outline:none;font-family:inherit;}'
  + '.uim-input:focus{border-color:#5a5a6a;}'
  + '#uim-err{font-size:12px;color:#e0607a;font-weight:700;min-height:15px;margin-bottom:4px;}'
  + '#uim-btns{display:flex;gap:9px;margin-top:6px;}'
  + '#uim-btns button{flex:1;border:none;border-radius:9px;padding:11px 0;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}'
  + '#uim-cancel{background:#26262e;color:#d4d4dd;}'
  + '#uim-ok{color:#fff;}';
  var queue=[], active=null;
  function el(id){ return document.getElementById(id); }
  function inject(){
    if (el('uim-overlay')) return;
    var st=document.createElement('style'); st.id='uim-style'; st.textContent=CSS; document.head.appendChild(st);
    var ov=document.createElement('div'); ov.id='uim-overlay';
    ov.innerHTML='<form id="uim-box" autocomplete="off">'
      +'<div id="uim-title"></div><div id="uim-msg"></div><div id="uim-fields"></div>'
      +'<div id="uim-err"></div>'
      +'<div id="uim-btns"><button type="button" id="uim-cancel"></button><button type="submit" id="uim-ok"></button></div></form>';
    document.body.appendChild(ov);
    el('uim-cancel').addEventListener('click', function(){ close(active&&active.kind==='confirm'?false:null); });
    el('uim-box').addEventListener('submit', function(e){ e.preventDefault(); submit(); });
    document.addEventListener('keydown', function(e){ if(active && e.key==='Escape'){ close(active.kind==='confirm'?false:null); } });
  }
  function render(cfg){
    inject(); active=cfg;
    el('uim-title').textContent=cfg.title||''; el('uim-title').style.display=cfg.title?'':'none';
    el('uim-msg').textContent=cfg.message||''; el('uim-msg').style.display=cfg.message?'':'none';
    var fw=el('uim-fields'); fw.innerHTML='';
    (cfg.fields||[]).forEach(function(f){
      var lab=document.createElement('label'); lab.className='uim-field';
      if(f.label){ var sp=document.createElement('span'); sp.className='uim-label'; sp.textContent=f.label; lab.appendChild(sp); }
      var inp=document.createElement('input'); inp.className='uim-input'; inp.type=f.type||'text';
      inp.value=(f.value!=null?f.value:''); if(f.placeholder) inp.placeholder=f.placeholder; inp.setAttribute('data-name',f.name);
      if(f.autocap===false){ inp.autocapitalize='off'; inp.setAttribute('autocorrect','off'); inp.spellcheck=false; }
      lab.appendChild(inp); fw.appendChild(lab);
    });
    el('uim-err').textContent='';
    var ok=el('uim-ok'), ca=el('uim-cancel');
    ok.textContent=cfg.okLabel||'OK'; ok.style.background=cfg.danger?'#d9534f':ACCENT;
    ca.textContent=cfg.cancelLabel||'Cancel'; ca.style.display=(cfg.kind==='alert')?'none':'';
    el('uim-overlay').classList.add('show');
    setTimeout(function(){ var fi=fw.querySelector('input'); if(fi){ fi.focus(); try{fi.select();}catch(e){} } else ok.focus(); }, 40);
  }
  function collect(){ var o={}; var ins=el('uim-fields').querySelectorAll('input'); Array.prototype.forEach.call(ins,function(i){ o[i.getAttribute('data-name')]=i.value; }); return o; }
  function submit(){
    if(!active) return; var cfg=active;
    if(cfg.fields && cfg.fields.length){
      var vals=collect(), ins=el('uim-fields').querySelectorAll('input');
      for(var i=0;i<cfg.fields.length;i++){ var f=cfg.fields[i];
        if(f.required && !String(vals[f.name]||'').trim()){ el('uim-err').textContent=(f.label||'This field')+' is required.'; if(ins[i]) ins[i].focus(); return; } }
      close(cfg.kind==='prompt' ? String(vals[cfg.fields[0].name]) : vals);
    } else { close(cfg.kind==='confirm'?true:undefined); }
  }
  function close(result){
    var cfg=active; active=null;
    var ov=el('uim-overlay'); if(ov) ov.classList.remove('show');
    if(cfg && cfg.resolve) cfg.resolve(result);
    if(queue.length){ render(queue.shift()); }
  }
  function open(cfg){ return new Promise(function(res){ cfg.resolve=res; if(active) queue.push(cfg); else render(cfg); }); }
  window.uiModal=open;
  window.uiAlert=function(m,o){ o=o||{}; return open({kind:'alert',message:String(m==null?'':m),title:o.title,okLabel:o.okLabel||'OK'}); };
  window.uiConfirm=function(m,o){ o=o||{}; return open({kind:'confirm',message:String(m==null?'':m),title:o.title,okLabel:o.okLabel||'OK',cancelLabel:o.cancelLabel||'Cancel',danger:o.danger}); };
  window.uiPrompt=function(m,o){ o=o||{}; return open({kind:'prompt',message:String(m==null?'':m),title:o.title,okLabel:o.okLabel||'OK',cancelLabel:o.cancelLabel||'Cancel',
    fields:[{name:'value',type:o.password?'password':'text',value:(o.default!=null?o.default:(o.value!=null?o.value:'')),placeholder:o.placeholder||'',autocap:o.autocap}]}); };
  window.uiForm=function(cfg){ cfg=cfg||{}; return open({kind:'form',title:cfg.title,message:cfg.message,okLabel:cfg.okLabel||'Save',cancelLabel:cfg.cancelLabel||'Cancel',danger:cfg.danger,fields:cfg.fields||[]}); };
  // Route native alert() through the in-UI modal (can't be dismissed by clicking
  // outside the app window). confirm/prompt are converted at their call sites.
  try { window.alert=function(m){ window.uiAlert(m==null?'':String(m)); }; } catch(e){}
})();
</script>
