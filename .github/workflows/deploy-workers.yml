name: Deploy Cloudflare Workers
on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-workers.yml'

jobs:
  deploy-taskhub-reminders:
    name: Deploy taskhub-reminders
    runs-on: ubuntu-latest
    if: >
      contains(github.event.head_commit.message, '[all]') ||
      contains(github.event.head_commit.message, '[taskhub]')
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/taskhub-reminders

  deploy-tradeboard-api:
    name: Deploy tradeboard-api
    runs-on: ubuntu-latest
    if: >
      contains(github.event.head_commit.message, '[all]') ||
      contains(github.event.head_commit.message, '[tradeboard]')
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/tradeboard-api

  deploy-newshub-api:
    name: Deploy newshub-api
    runs-on: ubuntu-latest
    if: >
      contains(github.event.head_commit.message, '[all]') ||
      contains(github.event.head_commit.message, '[newshub]')
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/newshub-api

  deploy-warroom-api:
    name: Deploy warroom-api
    runs-on: ubuntu-latest
    if: >
      contains(github.event.head_commit.message, '[all]') ||
      contains(github.event.head_commit.message, '[warroom]')
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/warroom-api/warroom-api
