name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-workers.yml'
  # Lets you trigger a manual run from the Actions tab if needed
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------
  # Detect which worker folder(s) changed in this push.
  # Each output is "true" only if files in that folder were touched.
  # ---------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      taskhub: ${{ steps.filter.outputs.taskhub }}
      tradeboard: ${{ steps.filter.outputs.tradeboard }}
      newshub: ${{ steps.filter.outputs.newshub }}
      warroom: ${{ steps.filter.outputs.warroom }}
      tradedashboard: ${{ steps.filter.outputs.tradedashboard }}
      personalai: ${{ steps.filter.outputs.personalai }}
      studyosfiles: ${{ steps.filter.outputs.studyosfiles }}
      vaultfiles: ${{ steps.filter.outputs.vaultfiles }}
      proview: ${{ steps.filter.outputs.proview }}
      keychainsync: ${{ steps.filter.outputs.keychainsync }}
      vaultpwsync: ${{ steps.filter.outputs.vaultpwsync }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            taskhub:
              - 'workers/taskhub-reminders/**'
            tradeboard:
              - 'workers/tradeboard-api/**'
            newshub:
              - 'workers/newshub-api/**'
            warroom:
              - 'workers/warroom-api/**'
            tradedashboard:
              - 'workers/trade-dashboard/**'
            personalai:
              - 'workers/personal-ai/**'
            studyosfiles:
              - 'workers/studyos-files/**'
            vaultfiles:
              - 'workers/vault-files/**'
            proview:
              - 'workers/proview-api/**'
            keychainsync:
              - 'workers/keychain-sync/**'
            vaultpwsync:
              - 'workers/vault-pw-sync/**'

  # ---------------------------------------------------------------
  # One deploy job per worker. Each runs ONLY if its folder changed.
  # If you ever want to force-deploy everything, run the workflow
  # manually from the Actions tab (workflow_dispatch) — see notes.
  # ---------------------------------------------------------------
  deploy-taskhub-reminders:
    needs: changes
    if: ${{ needs.changes.outputs.taskhub == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/taskhub-reminders

  deploy-tradeboard-api:
    needs: changes
    if: ${{ needs.changes.outputs.tradeboard == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/tradeboard-api

  deploy-newshub-api:
    needs: changes
    if: ${{ needs.changes.outputs.newshub == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/newshub-api

  deploy-warroom-api:
    needs: changes
    if: ${{ needs.changes.outputs.warroom == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          # Note the double-nested path — this matches your repo layout
          workingDirectory: workers/warroom-api/warroom-api

  deploy-trade-dashboard:
    needs: changes
    if: ${{ needs.changes.outputs.tradedashboard == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/trade-dashboard

  # Consolidated personal AI worker — replaces mylist-api + taskhub-voice + journal-ai.
  # One worker, one Gemini key per person (TONY_GEMINI_KEY / VEDA_GEMINI_KEY secrets).
  deploy-personal-ai:
    needs: changes
    if: ${{ needs.changes.outputs.personalai == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/personal-ai

  deploy-studyos-files:
    needs: changes
    if: ${{ needs.changes.outputs.studyosfiles == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/studyos-files

  deploy-vault-files:
    needs: changes
    if: ${{ needs.changes.outputs.vaultfiles == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/vault-files

  # Recovered 2026-07-03 from the live Cloudflare deployment — this worker had
  # no source in git before (deployed outside this repo). Now backed up + auto-deploys.
  deploy-proview-api:
    needs: changes
    if: ${{ needs.changes.outputs.proview == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/proview-api

  # Firestore proxy for the Vault browser extension (bypasses App Check via
  # the Firebase service account). Secrets required on first deploy:
  #   FIREBASE_PROJECT_ID, FIREBASE_CLIENT_EMAIL, FIREBASE_PRIVATE_KEY, VAULT_KEY
  deploy-keychain-sync:
    needs: changes
    if: ${{ needs.changes.outputs.keychainsync == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/keychain-sync

  deploy-vault-pw-sync:
    needs: changes
    if: ${{ needs.changes.outputs.vaultpwsync == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/vault-pw-sync
