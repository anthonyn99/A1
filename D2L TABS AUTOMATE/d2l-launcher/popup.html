<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D2L Launcher</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #161619;
      --surface-hover: #1d1d21;
      --border: #26262b;
      --text: #ededf0;
      --text-dim: #8a8a93;
      --accent: #e94560;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: 16px 16px 14px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: var(--text);
    }

    .gear {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 15px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      line-height: 1;
      transition: background 0.15s, color 0.15s;
    }

    .gear:hover {
      background: var(--surface);
      color: var(--text);
    }

    .course-list {
      max-height: 326px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 14px;
    }

    .course-list::-webkit-scrollbar {
      width: 5px;
    }

    .course-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .course-list::-webkit-scrollbar-thumb:hover {
      background: #34343a;
    }

    .course-card {
      background: var(--surface);
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 11px 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .course-card:hover {
      background: var(--surface-hover);
      border-color: var(--border);
    }

    .course-meta {
      min-width: 0;
    }

    .course-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .course-count {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 3px;
    }

    .open-one {
      flex-shrink: 0;
      background: transparent;
      color: var(--text-dim);
      border: none;
      border-radius: 7px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.15s, color 0.15s;
    }

    .course-card:hover .open-one {
      background: var(--accent);
      color: #fff;
    }

    .open-one:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .course-card:hover .open-one:disabled {
      background: transparent;
      color: var(--text-dim);
    }

    .placeholder {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 22px 16px;
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.6;
    }

    .open-all {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: filter 0.15s, transform 0.05s;
    }

    .open-all:hover {
      filter: brightness(1.1);
    }

    .open-all:active {
      transform: scale(0.99);
    }

    .open-all:disabled {
      background: var(--surface);
      color: var(--text-dim);
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header>
    <h1>D2L Launcher</h1>
    <button class="gear" id="gear" title="Manage courses">⚙</button>
  </header>

  <div class="course-list" id="courseList"></div>

  <button class="open-all" id="openAll">Open All Courses</button>

  <script src="popup.js"></script>
</body>
</html>
