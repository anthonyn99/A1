<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D2L Launcher — Manage Courses</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #161619;
      --surface-2: #1d1d21;
      --border: #26262b;
      --border-strong: #34343a;
      --text: #ededf0;
      --text-dim: #8a8a93;
      --accent: #e94560;
      --ok: #4ade80;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding: 48px 20px;
    }

    .wrap {
      max-width: 580px;
      margin: 0 auto;
    }

    h1 {
      font-size: 19px;
      font-weight: 600;
      letter-spacing: 0.2px;
      margin-bottom: 28px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      margin-bottom: 18px;
    }

    .card h2 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 16px;
      color: var(--text-dim);
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .field {
      margin-bottom: 14px;
    }

    input[type="text"],
    input[type="url"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    input::placeholder {
      color: #54545c;
    }

    input:focus {
      outline: none;
      border-color: var(--border-strong);
    }

    .error {
      color: var(--accent);
      font-size: 12px;
      margin-top: 6px;
      min-height: 16px;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      border-radius: 9px;
      font-weight: 500;
    }

    .btn-add {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 9px 16px;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-add:hover {
      background: #26262b;
      border-color: var(--border-strong);
    }

    /* ---- Course block ---- */
    .course-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .course-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .course-title {
      flex: 1;
      min-width: 0;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .icon-btn {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      width: 28px;
      height: 28px;
      font-size: 13px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s, opacity 0.15s;
    }

    .icon-btn:hover {
      background: var(--surface-2);
      color: var(--text);
      border-color: var(--border-strong);
    }

    .icon-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .icon-btn.delete:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ---- Link rows inside a course ---- */
    .link-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 11px;
      margin: 6px 0 6px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
    }

    .link-info {
      flex: 1;
      min-width: 0;
    }

    .link-label {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-url {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .add-link {
      display: flex;
      gap: 6px;
      margin: 10px 0 0 16px;
      flex-wrap: wrap;
    }

    .add-link input {
      flex: 1;
      min-width: 120px;
      padding: 8px 11px;
      font-size: 12px;
    }

    .add-link button {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 13px;
      font-size: 12px;
      transition: background 0.15s, border-color 0.15s;
    }

    .add-link button:hover {
      background: #26262b;
      border-color: var(--border-strong);
    }

    .link-error {
      color: var(--accent);
      font-size: 11px;
      margin: 5px 0 0 16px;
      min-height: 14px;
    }

    .empty {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      padding: 16px;
    }

    .save-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 4px;
    }

    .btn-save {
      background: var(--accent);
      color: #fff;
      padding: 11px 22px;
      font-size: 14px;
      font-weight: 600;
      transition: filter 0.15s, transform 0.05s;
    }

    .btn-save:hover {
      filter: brightness(1.1);
    }

    .btn-save:active {
      transform: scale(0.99);
    }

    .saved-msg {
      color: var(--ok);
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .saved-msg.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>D2L Launcher — Manage Courses</h1>

    <div class="card">
      <h2>Add a new course</h2>
      <div class="field">
        <label for="courseName">Course Name</label>
        <input type="text" id="courseName" placeholder="e.g. Calculus II" />
      </div>
      <div class="error" id="courseError"></div>
      <button class="btn-add" id="addCourseBtn">Add Course</button>
    </div>

    <div class="card">
      <h2>Saved courses &amp; links</h2>
      <div id="list"></div>
    </div>

    <div class="save-bar">
      <button class="btn-save" id="saveBtn">Save Changes</button>
      <span class="saved-msg" id="savedMsg">✅ Saved!</span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
