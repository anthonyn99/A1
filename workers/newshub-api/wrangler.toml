name = "newshub-api"
main = "worker.js"
compatibility_date = "2025-06-01"

[[kv_namespaces]]
binding = "NEWSHUB_CACHE"
id = "dc67fb750dcc4858a8fcff9367b549e9"

# Cron does a full AI build only 3x/day at 14:00, 17:00, 20:00 UTC
# (~10am, 1pm, 4pm ET) — Mon-Fri. This pre-warms the cache without burning
# AI quota on every tick. On-demand Refresh in the app covers everything else.
[triggers]
crons = ["0 14,17,20 * * 1-5"]

[vars]
# Staged build self-invokes the worker at this origin during cron (cron has no
# inbound request to derive it from). Must match the deployed worker URL.
WORKER_ORIGIN = "https://newshub-api.av1.workers.dev"

# STAGE_SECRET gates the internal /_stage endpoint so it can't be driven from
# outside. Set it as a SECRET (not here in plaintext):
#   wrangler secret put STAGE_SECRET
# Use any long random string, e.g. output of: openssl rand -hex 24
