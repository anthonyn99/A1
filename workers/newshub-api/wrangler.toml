name = "newshub-api"
main = "worker.js"
compatibility_date = "2025-06-01"

# Pre-warm so data is built for the user opening TradeHub on any device. ONE daily cron
# at 12:00 UTC = builds BEGIN at 06:00 MDT (summer) / 05:00 MST (winter) Mountain time.
# A single UTC cron can't track DST to keep the same local time both seasons, and the
# account is capped at 5 cron triggers total, so two-per-worker (one per offset) isn't
# an option.
# Fires every day; the scheduled() handler branches on the day itself: News pre-warm
# runs EVERY day (Mon-Sun); Sun + Wed additionally pre-warm Catalysts. News is not
# holiday-gated (world/company news doesn't stop on market holidays).
[triggers]
crons = ["0 12 * * *"]

[[kv_namespaces]]
binding = "NEWSHUB_CACHE"
id = "dc67fb750dcc4858a8fcff9367b549e9"

[vars]
WORKER_ORIGIN = "https://newshub-api.av1.workers.dev"

# Secrets: GEMINI_KEY, NVIDIA_API_KEY, FINNHUB_KEY, MARKETAUX_KEY,
# STOCKDATA_KEY, ALPHAVANTAGE_KEY, POLYGON_KEY, TIINGO_KEY, STAGE_SECRET.
