name = "newshub-api"
main = "worker.js"
compatibility_date = "2025-06-01"

# Pre-warm so data is built before the user opens TradeHub on any device — ready by
# 6am MOUNTAIN time (kicks off 5:30 MT, finishes in a few min). Cloudflare crons are
# UTC-only and the MT offset shifts with DST, so we register BOTH offsets:
#   11:30 UTC = 05:30 MDT (summer, UTC-6)   |   12:30 UTC = 05:30 MST (winter, UTC-7)
# scheduled() runs only when it's hour 5 in America/Denver, so the off-DST fire is a
# no-op → exactly one build/day at 5:30 MT year-round.
# Days 0-5 = Sun-Fri: Mon-Fri -> News pre-warm; Sun + Wed -> Catalysts (Wed -> both).
# Saturday omitted. Market holidays are skipped inside scheduled().
[triggers]
crons = ["30 11 * * 0-5", "30 12 * * 0-5"]

[[kv_namespaces]]
binding = "NEWSHUB_CACHE"
id = "dc67fb750dcc4858a8fcff9367b549e9"

[vars]
WORKER_ORIGIN = "https://newshub-api.av1.workers.dev"

# Secrets: GEMINI_KEY, NVIDIA_API_KEY, FINNHUB_KEY, MARKETAUX_KEY,
# STOCKDATA_KEY, ALPHAVANTAGE_KEY, POLYGON_KEY, TIINGO_KEY, STAGE_SECRET.
