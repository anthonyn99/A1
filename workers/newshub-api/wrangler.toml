name = "newshub-api"
main = "worker.js"
compatibility_date = "2025-06-01"

[[kv_namespaces]]
binding = "NEWSHUB_CACHE"
id = "dc67fb750dcc4858a8fcff9367b549e9"

# 6:00 AM MT summer / 5:00 AM MT winter.
# News: Mon-Fri. Catalysts: Sun + Wed. CF cron uses Sunday=7 (not 0).
# Wednesday fires both; worker branches by day-of-week.
[triggers]
crons = ["0 12 * * 1-5", "0 12 * * 7", "0 12 * * 3"]

[vars]
WORKER_ORIGIN = "https://newshub-api.av1.workers.dev"

# Secrets: GEMINI_KEY, NVIDIA_API_KEY, FINNHUB_KEY, MARKETAUX_KEY,
# STOCKDATA_KEY, ALPHAVANTAGE_KEY, POLYGON_KEY, TIINGO_KEY, STAGE_SECRET.
