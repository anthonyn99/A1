name = "insight-api"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
# "sandbox" | "production" — which Plaid environment the worker talks to.
# Moved to production 2026-07-21, after: the Sandbox pipeline was proven
# end-to-end (token → Link → sync → Firestore), the app-lock gate was wired
# and enforced server-side on the connect endpoints, and all sandbox test
# data was purged from KV + Firestore. /sandbox/* endpoints and the
# /transactions debug read-back are inert in this mode (see sandboxOnly).
PLAID_ENV = "production"

# Daily incremental sync (plan §3): the account's 5-cron free-plan limit is
# full, so there is NO cron trigger here. taskhub-reminders' every-minute cron
# POSTs to this worker's /sync at 11:00 UTC instead (see its scheduled()).
# The scheduled() handler below stays ready — if a cron slot ever frees up,
# restore:  [triggers] crons = ["0 11 * * *"]

[observability]
enabled = false

[observability.logs]
enabled = false
invocation_logs = true

# Server-side storage for Plaid access tokens + sync cursors.
# Tokens live ONLY here — never in Firestore, never client-side.
[[kv_namespaces]]
binding = "INSIGHT_KV"
id = "dbfdf972572440bcaea7b53a34253921"

# Same namespace taskhub-reminders uses for the suite's app-lock/profile
# passwords (PBKDF2 records). Insight's lock lives at jlock:applock:tony_insight
# — set/verified through taskhub-reminders' /auth endpoints, read here so the
# Plaid Link endpoints can enforce the lock SERVER-SIDE (plan §3 security).
[[kv_namespaces]]
binding = "AUTH_KV"
id = "b51e916cf3bf4f37ad146af5ca031575"

# Secrets (set via `wrangler secret put <NAME> --name insight-api` — never commit values):
#   PLAID_CLIENT_ID          — Plaid client_id (same for sandbox + production)
#   PLAID_SECRET_SANDBOX     — Plaid Sandbox secret
#   PLAID_SECRET_PRODUCTION  — Plaid Production secret (unused until PLAID_ENV flips)
#   FIREBASE_PROJECT_ID      — task-dashboard-d2b53 (same values as taskhub-reminders)
#   FIREBASE_CLIENT_EMAIL    — service account email
#   FIREBASE_PRIVATE_KEY     — service account private key (PEM)
