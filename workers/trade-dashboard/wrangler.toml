name = "trade-dashboard"
main = "worker.js"
compatibility_date = "2026-01-01"

# MacroBoard pre-build, ready BEFORE the user opens at 6am Mountain. ONE daily cron at
# 11:30 UTC = 05:30 MDT (summer) / 04:30 MST (winter) — always before 6am MT. A single
# UTC cron can't track DST to hit exactly 6am both seasons, but the account is capped
# at 5 cron triggers total, so two-per-worker isn't an option. Days 1-5 = Mon-Fri.
# Market holidays are skipped inside scheduled() (US_MARKET_HOLIDAYS).
[triggers]
crons = ["30 11 * * 1-5"]

[[kv_namespaces]]
binding = "TD_KV"
id = "897dc1bcd93d4a55ab67836639d3866b"

[[services]]
binding = "SELF"
service = "trade-dashboard"

[vars]
WORKER_ORIGIN = "https://trade-dashboard.av1.workers.dev"

# Secrets: MACRO_GEMINI_KEY, GEMINI_KEY, NVIDIA_KEY, GROQ_KEY,
# FINNHUB_KEY, FRED_KEY, STAGE_SECRET.
