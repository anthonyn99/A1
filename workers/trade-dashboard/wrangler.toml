name = "trade-dashboard"
main = "worker.js"
compatibility_date = "2026-01-01"

# KV namespace — create with:  wrangler kv namespace create TD_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "TD_KV"
id = "897dc1bcd93d4a55ab67836639d3866b"

# Staged builds: the worker invokes ITSELF (one chunk per invocation) so each
# gets a fresh CPU/time budget. SELF binding lets it call itself without an
# external HTTP loopback.
[[services]]
binding = "SELF"
service = "trade-dashboard"

[vars]
WORKER_ORIGIN = "https://trade-dashboard.av1.workers.dev"
NEWSHUB_URL   = "https://newshub-api.av1.workers.dev/news"

# Secrets (DO NOT put values here). Set them with:
#   wrangler secret put GEMINI_KEY
#   wrangler secret put NVIDIA_KEY
#   wrangler secret put GROQ_KEY
#   wrangler secret put STAGE_SECRET    (any long random string; gates /_stage)
#   wrangler secret put FINNHUB_KEY     (real quotes + earnings + econ calendar)
