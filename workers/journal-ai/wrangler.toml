name = "journal-ai"
main = "worker.js"
compatibility_date = "2025-06-01"

[vars]
WORKER_ORIGIN = "https://journal-ai.av1.workers.dev"

# Per-journal Gemini keys are stored as Cloudflare SECRETS (never committed):
#   TONY_GEMINI_KEY   → MyJournal (Tony) AI Format key
#   VEDA_GEMINI_KEY   → Brainstorm Journal (Veda) AI Format key
# Set them once with:
#   wrangler secret put TONY_GEMINI_KEY
#   wrangler secret put VEDA_GEMINI_KEY
# Secrets persist across deploys, so CI auto-deploy keeps working without them in git.
