        <thead><tr>{['Symbol','Market Val','Unreal P&L','% P&L','Day %','Qty'].map(h=><th key={h} style={{padding:'9px 14px',fontSize:10,fontWeight:800,color:'var(--txm)',textTransform:'uppercase',letterSpacing:1.5,textAlign:'right',background:'var(--s2)',borderBottom:'1px solid var(--bd)',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
        <tbody>{positions.map((p,i)=>(<tr key={i} style={{borderBottom:'1px solid var(--bd)'}} onMouseEnter={e=>e.currentTarget.style.background='var(--s2)'} onMouseLeave={e=>e.currentTarget.style.background=''}>
          <td style={{padding:'11px 14px',fontFamily:'IBM Plex Mono,monospace',fontWeight:700,fontSize:15,color:'var(--tx)'}}>{p.symbol||p.ticker}</td>
          <td style={{padding:'11px 14px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:14,color:'var(--txd)'}}>{tbFmt$(p.marketValue)}</td>
          <td style={{padding:'11px 14px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:14,color:tbPnlCol(p.unrealizedPnL),fontWeight:700}}>{tbFmt$(p.unrealizedPnL)}</td>
          <td style={{padding:'11px 14px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:14,color:tbPnlCol(p.unrealizedPct)}}>{tbFmtPct(p.unrealizedPct)}</td>
          <td style={{padding:'11px 14px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:14,color:tbPnlCol(p.lastChangePct)}}>{tbFmtPct(p.lastChangePct)}</td>
          <td style={{padding:'11px 14px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:14,color:'var(--txd)'}}>{tbFmtNum(p.shares)}</td>
        </tr>))}</tbody>
      </table></div>}
    </div>}
    {tab==='orders'&&<div className="tb-card" style={{padding:0,overflow:'hidden'}}>
      {!orders.length?<div style={{padding:'40px',textAlign:'center',color:'var(--txm)',fontStyle:'italic',fontSize:13}}>No open orders.</div>:
      <div style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr>{['Symbol','Action','Qty','Filled','Price','Type','Status','Date'].map(h=><th key={h} style={{padding:'9px 12px',fontSize:10,fontWeight:800,color:'var(--txm)',textTransform:'uppercase',letterSpacing:1.5,textAlign:'left',background:'var(--s2)',borderBottom:'1px solid var(--bd)',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
        <tbody>{orders.map((o,i)=>(<tr key={i} style={{borderBottom:'1px solid var(--bd)'}} onMouseEnter={e=>e.currentTarget.style.background='var(--s2)'} onMouseLeave={e=>e.currentTarget.style.background=''}>
          <td style={{padding:'9px 12px',fontFamily:'IBM Plex Mono,monospace',fontWeight:700,fontSize:15,color:'var(--tx)'}}>{o.symbol}</td>
          <td style={{padding:'9px 12px',fontSize:12,fontWeight:700,color:o.action==='BUY'?'var(--tbb)':'var(--tbr)'}}>{o.action}</td>
          <td style={{padding:'9px 12px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',color:'var(--txd)',fontSize:12}}>{tbFmtNum(o.qty)}</td>
          <td style={{padding:'9px 12px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',color:'var(--txd)',fontSize:12}}>{tbFmtNum(o.filled)||'—'}</td>
          <td style={{padding:'9px 12px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',color:'var(--txd)',fontSize:12}}>{o.limitPrice?tbFmt$(o.limitPrice):'MKT'}</td>
          <td style={{padding:'9px 12px',fontSize:13,color:'var(--txd)'}}>{o.orderType}</td>
          <td style={{padding:'9px 12px',fontSize:13,color:'var(--tbw)'}}>{o.status}</td>
          <td style={{padding:'9px 12px',fontSize:13,color:'var(--txm)',whiteSpace:'nowrap'}}>{tbFmtDate(o.filledAt||o.createdAt)}</td>
        </tr>))}</tbody>
      </table></div>}
    </div>}
    {tab==='history'&&<div className="tb-card" style={{padding:0,overflow:'hidden'}}>
      {!history.length?<div style={{padding:'40px',textAlign:'center',color:'var(--txm)',fontStyle:'italic',fontSize:13}}>No trade history available. Sync Webull to populate.</div>:
      <div style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr>{['Date','Symbol','Action','Qty','Avg Price','Total','Fees','Status'].map(h=><th key={h} style={{padding:'9px 12px',fontSize:10,fontWeight:800,color:'var(--txm)',textTransform:'uppercase',letterSpacing:1.5,textAlign:h==='Symbol'||h==='Action'||h==='Status'?'left':'right',background:'var(--s2)',borderBottom:'1px solid var(--bd)',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
        <tbody>{history.map((h,i)=>{
          const isBuy=(h.action||h.side||'').toUpperCase()==='BUY';
          const qty=h.filledQty??h.filled??h.qty??0;
          const price=h.avgFilledPrice??h.avgFill??h.avgPrice??h.price??0;
          const total=(parseFloat(qty)||0)*(parseFloat(price)||0);
          const fee=h.totalCommission??h.commission??h.fee??0;
          const dt=h.filledAt||h.filledTime||h.tradeTime||h.orderTime||h.datetime||h.date;
          return(<tr key={i} style={{borderBottom:'1px solid var(--bd)'}} onMouseEnter={e=>e.currentTarget.style.background='var(--s2)'} onMouseLeave={e=>e.currentTarget.style.background=''}>
            <td style={{padding:'9px 12px',fontSize:12,color:'var(--txm)',whiteSpace:'nowrap'}}>{dt?tbFmtDate(dt):'—'}</td>
            <td style={{padding:'9px 12px',fontFamily:'IBM Plex Mono,monospace',fontWeight:700,fontSize:14,color:'var(--tx)'}}>{h.symbol||h.ticker||'—'}</td>
            <td style={{padding:'9px 12px',fontSize:12,fontWeight:700,color:isBuy?'var(--tbb)':'var(--tbr)'}}>{(h.action||h.side||'—').toUpperCase()}</td>
            <td style={{padding:'9px 12px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',color:'var(--txd)',fontSize:12}}>{tbFmtNum(qty)||'—'}</td>
            <td style={{padding:'9px 12px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',color:'var(--txd)',fontSize:12}}>{price?tbFmt$(price):'—'}</td>
            <td style={{padding:'9px 12px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',color:'var(--txd)',fontSize:13,fontWeight:600}}>{total?tbFmt$(total):'—'}</td>
            <td style={{padding:'9px 12px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',color:'var(--txm)',fontSize:12}}>{fee!=null&&fee!==''?tbFmt$(fee):'—'}</td>
            <td style={{padding:'9px 12px',fontSize:12,color:'var(--txw)'}}>{h.status||'—'}</td>
          </tr>);
        })}</tbody>
      </table></div>}
    </div>}
    {tab==='activity'&&<div className="tb-card" style={{padding:0,overflow:'hidden'}}>
      {!activities.length?<div style={{padding:'40px',textAlign:'center',color:'var(--txm)',fontStyle:'italic',fontSize:13}}>No activity available.</div>:
      <div style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr>{['Date','Type','Symbol','Amount','Description'].map(h=><th key={h} style={{padding:'9px 12px',fontSize:10,fontWeight:800,color:'var(--txm)',textTransform:'uppercase',letterSpacing:1.5,textAlign:'left',background:'var(--s2)',borderBottom:'1px solid var(--bd)',whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
        <tbody>{activities.map((a,i)=>{
          const dt=a.date||a.datetime||a.createdAt;
          return(<tr key={i} style={{borderBottom:'1px solid var(--bd)'}} onMouseEnter={e=>e.currentTarget.style.background='var(--s2)'} onMouseLeave={e=>e.currentTarget.style.background=''}>
            <td style={{padding:'9px 12px',fontSize:12,color:'var(--txm)',whiteSpace:'nowrap'}}>{dt?tbFmtDate(dt):'—'}</td>
            <td style={{padding:'9px 12px',fontSize:12,fontWeight:700,color:'var(--ac)'}}>{a.type||a.activityType||'—'}</td>
            <td style={{padding:'9px 12px',fontFamily:'IBM Plex Mono,monospace',fontWeight:700,fontSize:13,color:'var(--tx)'}}>{a.symbol||a.ticker||'—'}</td>
            <td style={{padding:'9px 12px',fontFamily:'IBM Plex Mono,monospace',fontSize:13,color:a.amount>=0?'var(--tbb)':'var(--tbr)',fontWeight:600}}>{a.amount!=null?tbFmt$(a.amount):'—'}</td>
            <td style={{padding:'9px 12px',fontSize:13,color:'var(--txd)'}}>{a.description||a.desc||'—'}</td>
          </tr>);
        })}</tbody>
      </table></div>}
    </div>}
  </div>);
}

/* ── Watchlist Editor ── (Control tab) — single shared ticker list that drives
   News fetch, report parsing, sector inference, and the catalysts calendar.
   Same UX the News settings panel used to have; now the one source of truth. */
function TBWatchlistEditor({watchlist=[],onChange}){
  const [tickerInput,setTickerInput]=React.useState('');
  const sectors=React.useMemo(()=>{const s=new Set();watchlist.forEach(t=>s.add(tbInferSector(t)));return [...s].sort();},[watchlist]);
  const normTicker=(raw)=>(raw||'').trim().toUpperCase().replace(/[^A-Z0-9.\-]/g,'').slice(0,6);
  /* Accepts one OR many tickers — split on commas/whitespace/brackets so a
     pasted list like "DRAM, SNDK, MU" or "[NVDA AMD]" all add at once. */
  const addTicker=(raw)=>{
    const parts=(raw||'').split(/[,\s\[\]]+/).map(normTicker).filter(Boolean);
    if(!parts.length)return;
    const next=[...watchlist];
    parts.forEach(t=>{if(!next.includes(t))next.push(t);});
    onChange(next.slice(0,40));
    setTickerInput('');
  };
  const removeTicker=(t)=>onChange(watchlist.filter(x=>x!==t));
  const resetTickers=()=>onChange([...TB_WATCHLIST]);
  const canAdd=(tickerInput||'').split(/[,\s\[\]]+/).map(normTicker).filter(Boolean).length>0;

  return(<div className="tb-card tb-wl-card" style={{padding:'clamp(16px,4vw,24px)',marginBottom:18,maxWidth:900,margin:'0 auto 18px',width:'100%',boxSizing:'border-box'}}>
    {/* Header — matches the Prompts header (big, white) */}
    <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:18,flexWrap:'wrap'}}>
      <div style={{flex:1,minWidth:180}}>
        <div style={{fontSize:20,fontWeight:800,color:'var(--tx)'}}>Watchlist</div>
        <div style={{fontSize:13,color:'var(--txm)',marginTop:2,lineHeight:1.5}}>{watchlist.length} ticker{watchlist.length!==1?'s':''} · drives News, Catalysts, MacroBoard &amp; report parsing</div>
      </div>
      <button onClick={resetTickers} title="Reset to default watchlist"
        style={{flexShrink:0,padding:'7px 14px',borderRadius:100,border:'1px solid var(--bd)',background:'transparent',color:'var(--txd)',fontSize:12,fontWeight:700,cursor:'pointer',transition:'all .15s'}}
        onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--ac)';e.currentTarget.style.color='var(--ac)';}}
        onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--bd)';e.currentTarget.style.color='var(--txd)';}}>↺ Reset to default</button>
    </div>

    {/* Add row — stacks on mobile, inline on desktop */}
    <div style={{display:'flex',gap:8,marginBottom:18,flexWrap:'wrap'}}>
      <input value={tickerInput}
        onChange={e=>setTickerInput(e.target.value.toUpperCase())}
        onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addTicker(tickerInput);}}}
        placeholder="Add tickers — comma or space separated (e.g. NVDA, MU, AMD)"
        style={{flex:'1 1 240px',minWidth:0,fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:700,letterSpacing:0.5,padding:'11px 14px',background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:10,color:'var(--tx)',outline:'none'}}/>
      <button className="tb-btn-primary" onClick={()=>addTicker(tickerInput)} disabled={!canAdd} style={{flex:'0 0 auto',fontSize:13,padding:'11px 20px',opacity:canAdd?1:0.4}}>+ Add</button>
    </div>

    {/* Ticker chips — bigger, more legible */}
    <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:22}}>
      {watchlist.length===0&&<span style={{fontSize:13,color:'var(--txm)',fontStyle:'italic'}}>No tickers — add some above or reset to default.</span>}
      {[...watchlist].sort().map(t=>(
        <span key={t} style={{display:'inline-flex',alignItems:'center',gap:8,padding:'7px 8px 7px 13px',borderRadius:10,border:'1px solid var(--bd)',background:'var(--s1)'}}>
          <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:800,letterSpacing:0.5,color:'var(--tx)'}}>{t}</span>
          <span title="Sector" style={{fontSize:10,fontWeight:600,color:'var(--txm)',padding:'2px 7px',borderRadius:100,background:'var(--s2)',whiteSpace:'nowrap'}}>{tbInferSector(t)}</span>
          <span onClick={()=>removeTicker(t)} title={'Remove '+t} role="button" style={{cursor:'pointer',color:'var(--txm)',fontSize:16,lineHeight:1,padding:'0 4px',fontWeight:700,transition:'color .15s'}}
            onMouseEnter={ev=>ev.currentTarget.style.color='var(--tbr)'}
            onMouseLeave={ev=>ev.currentTarget.style.color='var(--txm)'}>×</span>
        </span>
      ))}
    </div>

    {/* Derived sectors */}
    <div style={{fontSize:11,fontWeight:800,textTransform:'uppercase',letterSpacing:1.5,color:'var(--txm)',marginBottom:10}}>Auto-derived sectors</div>
    <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
      {sectors.length===0&&<span style={{fontSize:13,color:'var(--txm)',fontStyle:'italic'}}>—</span>}
      {sectors.map(s=>(
        <span key={s} style={{fontSize:12,fontWeight:600,padding:'5px 12px',borderRadius:100,background:'var(--acg)',border:'1px solid var(--bd)',color:'var(--txd)'}}>{s}</span>
      ))}
    </div>
  </div>);
}

/* ── Control Page ── watchlist editor + prompt manager in one place. */
function TBControlPage({prompts,onSavePrompts,onToast,watchlist,onSaveWatchlist}){
  return(<div style={{width:'100%'}}>
    <TBWatchlistEditor watchlist={watchlist} onChange={onSaveWatchlist}/>
    <TBPromptPage prompts={prompts} onSave={onSavePrompts} onToast={onToast}/>
  </div>);
}

/* ── Prompt Page ── */
function TBPromptPage({prompts,onSave,onToast}){
  const [selected,setSelected]=useState(0);
  const [editing,setEditing]=useState(false);
  const [editText,setEditText]=useState('');
  const [editName,setEditName]=useState('');
  const [newName,setNewName]=useState('');
  const [copied,setCopied]=useState(false);
  const [fbSaving,setFbSaving]=useState(false);

  const cur=prompts[selected]||prompts[0];
  useEffect(()=>{if(cur){setEditText(cur.text);setEditName(cur.name);}},[selected,cur]);

  const copy=()=>{navigator.clipboard.writeText(cur.text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1500);});};

  const saveEdit=()=>{
    const updated=prompts.map((p,i)=>i===selected?{...p,text:editText,name:editName}:p);
    onSave(updated);
    if(window._fbSaveTBPrompts){setFbSaving(true);window._fbSaveTBPrompts(updated);setTimeout(()=>setFbSaving(false),1600);}
    setEditing(false);onToast('Prompt saved','✓');
  };

  const [addingNew,setAddingNew]=useState(false);
  const addPrompt=()=>{
    const name=(newName.trim()||'New Prompt');
    const updated=[...prompts,{id:'p_'+Date.now(),name,text:''}];
    onSave(updated);if(window._fbSaveTBPrompts)window._fbSaveTBPrompts(updated);
    setSelected(updated.length-1);setNewName('');setAddingNew(false);setEditing(true);
  };

  const [delConfirm,setDelConfirm]=useState(false);
  const deletePrompt=()=>{
    if(prompts.length<=1){onToast('Cannot delete last prompt','⚠');return;}
    setDelConfirm(true);
  };
  const confirmDelete=()=>{
    const updated=prompts.filter((_,i)=>i!==selected);
    onSave(updated);if(window._fbSaveTBPrompts)window._fbSaveTBPrompts(updated);
    setSelected(Math.max(0,selected-1));
    setDelConfirm(false);
  };

  const promptAreaH=useRef(null);
  const resize=useRef(null);
  /* Resize targets the inner textarea or pre element — allows both expand AND compress */
  useEffect(()=>{
    const handle=resize.current;if(!handle)return;
    let startY=0,startH=0,dragging=false;
    const getInner=()=>promptAreaH.current?.querySelector('textarea,pre');
    const down=e=>{
      const inner=getInner();if(!inner)return;
      e.preventDefault();dragging=true;
      startY=(e.touches?e.touches[0].clientY:e.clientY)||0;
      startH=inner.offsetHeight;
      document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
      document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',up);
    };
    const move=e=>{
      if(!dragging)return;
      if(e.cancelable)e.preventDefault();
      const inner=getInner();if(!inner)return;
      const y=(e.touches?e.touches[0].clientY:e.clientY)||0;
      const newH=Math.max(80,startH+(y-startY));
      inner.style.minHeight=newH+'px';inner.style.height=newH+'px';
    };
    const up=()=>{dragging=false;document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);document.removeEventListener('touchmove',move);document.removeEventListener('touchend',up);};
    handle.addEventListener('mousedown',down);handle.addEventListener('touchstart',down,{passive:false});
    return()=>{handle.removeEventListener('mousedown',down);handle.removeEventListener('touchstart',down);};
  },[]);

  /* ── Drag-to-reorder prompt chips (pointer events → works mouse + touch) ── */
  const arrMove=(arr,from,to)=>{const a=arr.slice();const [x]=a.splice(from,1);a.splice(to,0,x);return a;};
  const dragState=useRef(null);
  const chipRefs=useRef([]);
  const [dragIdx,setDragIdx]=useState(-1);
  const [overIdx,setOverIdx]=useState(-1);
  const onChipDown=(i,e)=>{
    dragState.current={from:i,pointerId:e.pointerId,startX:e.clientX,startY:e.clientY,moved:false};
    try{e.currentTarget.setPointerCapture(e.pointerId);}catch(_){}
  };
  const onChipMove=(e)=>{
    const ds=dragState.current;if(!ds)return;
    const dx=e.clientX-ds.startX,dy=e.clientY-ds.startY;
    if(!ds.moved&&(dx*dx+dy*dy)<49)return; // ~7px threshold before it's a drag
    ds.moved=true;if(dragIdx!==ds.from)setDragIdx(ds.from);
    let target=ds.from;
    for(let j=0;j<chipRefs.current.length;j++){
      const el=chipRefs.current[j];if(!el)continue;
      const r=el.getBoundingClientRect();
      if(e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom){target=j;break;}
    }
    if(target!==overIdx)setOverIdx(target);
  };
  const onChipUp=(e)=>{
    const ds=dragState.current;dragState.current=null;
    try{e.currentTarget.releasePointerCapture(ds&&ds.pointerId);}catch(_){}
    if(ds&&ds.moved){
      const from=ds.from,to=(overIdx>=0?overIdx:from);
      if(from!==to){
        const curId=(prompts[selected]||{}).id;
        const next=arrMove(prompts,from,to);
        onSave(next);if(window._fbSaveTBPrompts)window._fbSaveTBPrompts(next);
        const ni=next.findIndex(p=>p.id===curId);setSelected(ni>=0?ni:to);
      }
    }else if(ds){ setSelected(ds.from);setEditing(false);setAddingNew(false); }
    setDragIdx(-1);setOverIdx(-1);
  };
  const onChipCancel=()=>{dragState.current=null;setDragIdx(-1);setOverIdx(-1);};

  return(<div className="tb-fade-in tb-prompt-wrap tb-card" style={{display:'flex',flexDirection:'column',gap:16,padding:'clamp(16px,4vw,24px)',maxWidth:900,margin:'0 auto',width:'100%',boxSizing:'border-box'}}>
    <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
      <div style={{flex:1}}><div style={{fontSize:20,fontWeight:800,color:'var(--tx)'}}>Prompts</div><div style={{fontSize:13,color:'var(--txm)'}}>{prompts.length} prompt{prompts.length!==1?'s':''} · used by Analysis &amp; TradeBoard</div></div>
      {fbSaving&&<span style={{fontSize:13,color:'var(--txm)'}}>⟳ Saving…</span>}
    </div>
    {/* Chips row: drag to reorder (mouse + touch), tap to select */}
    <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
      {prompts.map((p,i)=>{
        const isSel=i===selected,isDrag=i===dragIdx,isOver=i===overIdx&&dragIdx!==-1&&overIdx!==dragIdx;
        return(<button key={p.id||i}
          ref={el=>chipRefs.current[i]=el}
          onPointerDown={e=>onChipDown(i,e)} onPointerMove={onChipMove} onPointerUp={onChipUp} onPointerCancel={onChipCancel}
          style={{display:'inline-flex',alignItems:'center',gap:7,padding:'7px 16px',borderRadius:100,
            border:`1.5px solid ${isOver?'var(--ac)':isSel?'var(--ac)':'var(--bd)'}`,
            background:isSel?'rgba(224,96,122,0.12)':isOver?'rgba(224,96,122,0.06)':'transparent',
            color:isSel?'var(--ac)':'var(--tx)',fontSize:14,fontWeight:700,cursor:'grab',
            opacity:isDrag?0.45:1,transition:'opacity .12s,background .15s,border-color .15s,box-shadow .15s',
            boxShadow:isOver?'0 0 0 3px rgba(224,96,122,0.18)':'none',touchAction:'none',userSelect:'none'}}>
          <span style={{fontSize:12,color:'var(--txm)',lineHeight:1,letterSpacing:-1}}>⠿</span>
          {p.name}
        </button>);
      })}
    </div>
    {/* New prompt — always on its own stable row */}
    {addingNew
      ?<div style={{display:'flex',gap:6,alignItems:'center'}}>
          <input autoFocus value={newName} onChange={e=>setNewName(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter')addPrompt();if(e.key==='Escape'){setAddingNew(false);setNewName('');}}}
            placeholder="Prompt name…"
            style={{background:'var(--s2)',border:'1.5px solid var(--ac)',borderRadius:8,color:'var(--tx)',fontSize:14,padding:'7px 12px',outline:'none',width:180}}/>
          <button className="tb-btn-primary" onClick={addPrompt} style={{fontSize:13,padding:'7px 14px'}}>Add</button>
          <button className="tb-btn-ghost" onClick={()=>{setAddingNew(false);setNewName('');}} style={{fontSize:13,padding:'7px 14px'}}>✕</button>
        </div>
      :<button onClick={()=>setAddingNew(true)} style={{padding:'7px 18px',borderRadius:100,border:'1.5px solid var(--ac)',background:'transparent',color:'var(--ac)',fontSize:13,fontWeight:700,cursor:'pointer',transition:'all .15s',width:'fit-content'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(224,96,122,0.1)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>＋ New Prompt</button>
    }
    <div className="tb-card" style={{padding:0,overflow:'hidden'}}>

/* ════════════════════════════════════════════════════════════════════════════
   TRADEBOARD — AI dashboard that runs a prompt and renders structured blocks.
   Talks to trade-dashboard Cloudflare Worker. Firebase-synced across devices.
   ════════════════════════════════════════════════════════════════════════════ */
const TD_WORKER_URL = "https://trade-dashboard.av1.workers.dev";
const TD_POLL_MS    = 5000;
const TD_DAILY_LIMIT= 6;

const DEFAULT_PROMPT = `# Daily Macro & Long-Only Trading Report
Be concise. Rank everything. 1-line per item. Institutional-flow focus.
Produce: Executive Summary (bias/regime/GO-NO-GO/confidence, top 3 drivers, macro scoreboard, key risk, key opportunity), Market Dashboard (SPX/NDX/QQQ/SOXX/10Y/VIX/DXY/WTI/Brent: direction+why+stock impact), Catalyst Calendar next 10 trading days by S/A/B/C tier, Themes (S/A/B tier, bull+bear), Flows + Leadership, Positioning + Sentiment, AI Infrastructure & Semi Tracker (drivers, what moved, next catalysts, AI spending status, memory/semi cycle, per-ticker scoreboard for NVDA AMD CRDO MU SNDK WDC INTC, bottom line), Sector Strength (top/bottom 3), Watchlist ratings, What Matters Next, Final Market Read with tier list.`;

const TDB_TONE = {
  good:   {c:"var(--tbb)", bg:"rgba(74,222,128,0.12)"},
  warn:   {c:"var(--tbw)", bg:"rgba(251,191,36,0.12)"},
  bad:    {c:"var(--tbr)", bg:"rgba(248,113,113,0.12)"},
  neutral:{c:"var(--txd)", bg:"var(--s2)"},
};
const tdbTone = t => TDB_TONE[t] || TDB_TONE.neutral;
const tdbDot  = t => ({good:"🟢",warn:"🟡",bad:"🔴",neutral:"⚪"}[t]||"⚪");
function tdbIsPlaceholder(v){const s=String(v||"").trim();return !s||/^\[.*\]$/.test(s);}
function tdbFmtTime(sec){if(sec<=0)return"now";if(sec<60)return sec+"s";return Math.ceil(sec/60)+"m";}
function tdbTimeAgo(ts){if(!ts)return"";const s=(Date.now()-ts)/1000;if(s<60)return"just now";if(s<3600)return Math.round(s/60)+"m ago";if(s<86400)return Math.round(s/3600)+"h ago";return Math.round(s/86400)+"d ago";}

function TDBCallout({block}){

function TDBBlock({block}){

/* ── Shared prompt picker ──────────────────────────────────────────────────
   Prompts are now owned solely by the Prompts tab. Analysis + TradeBoard just
   PICK which one to use. This chip row renders the Prompts-tab list and reports
   the chosen prompt id back up. No CRUD here — edit prompts in the Prompts tab. */
function TBPromptSelect({prompts,value,onChange,onGoToPrompts}){
  if(!prompts||prompts.length===0){
    return <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:9,border:"1px dashed var(--bd)",background:"var(--bgc)",color:"var(--txm)",fontSize:13}}>

      {onGoToPrompts&&<button onClick={onGoToPrompts} style={{padding:"5px 12px",borderRadius:100,border:"1px solid var(--ac)",background:"transparent",color:"var(--ac)",fontSize:12,fontWeight:700,cursor:"pointer"}}>Open Prompts tab →</button>}
    </div>;
  }
  const effective=prompts.some(p=>p.id===value)?value:prompts[0]?.id;
  return <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
    {prompts.map(p=>{const on=p.id===effective;return(
      <button key={p.id} onClick={()=>onChange(p.id)} title={p.name}
        style={{padding:"6px 16px",borderRadius:100,border:`1.5px solid ${on?"var(--ac)":"var(--bd)"}`,background:on?"rgba(224,96,122,0.12)":"transparent",color:on?"var(--ac)":"var(--txd)",fontSize:13,fontWeight:700,cursor:"pointer",transition:"all .15s",maxWidth:220,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</button>);})}
    {onGoToPrompts&&<button onClick={onGoToPrompts} title="Manage prompts" style={{padding:"6px 12px",borderRadius:100,border:"1px solid var(--bd)",background:"transparent",color:"var(--txm)",fontSize:12,fontWeight:700,cursor:"pointer"}}>✎ Edit in Prompts</button>}
  </div>;
}

/* Worker single-slot id — the worker keeps ONE prompt that mirrors whatever
   Prompts-tab prompt is currently selected for TradeBoard. We overwrite this
   slot on every run, so the worker always builds with the chosen prompt.
   No worker-side changes needed. */
const TD_SLOT_KEY="tb_tradeboard_worker_pid";

function TBDashboardBoard({prompts,boardPromptId,onSelectBoardPrompt,onGoToPrompts}){
  const [report,setReport]=useState(null);
  const [generatedAt,setGeneratedAt]=useState(null);
  const [model,setModel]=useState(null);
  const [building,setBuilding]=useState(false);
  const [loading,setLoading]=useState(false);
  const [degraded,setDegraded]=useState(false);
  const [notice,setNotice]=useState("");
  const [rlUsed,setRlUsed]=useState(0);
  const [rlCooldown,setRlCooldown]=useState(0);
  const isMobile=useIsMobile();
  const pollTimer=useRef(null);
  const cdTimer=useRef(null);
  const hydrated=useRef(false);
  const lastSavedSig=useRef(null);

  // Effective selected prompt (falls back to first prompt).
  const selPrompt=(prompts&&(prompts.find(p=>p.id===boardPromptId)||prompts[0]))||null;

  useEffect(()=>{
    if(cdTimer.current)clearInterval(cdTimer.current);
    if(rlCooldown>0)cdTimer.current=setInterval(()=>setRlCooldown(p=>{if(p<=1){clearInterval(cdTimer.current);return 0;}return p-1;}),1000);
    return()=>clearInterval(cdTimer.current);
  },[rlCooldown]);

  const fetchRate=useCallback(async()=>{
    try{const r=await fetch(TD_WORKER_URL+"/rate-status");if(!r.ok)return;const j=await r.json();
      setRlUsed(j.usedToday||0);setRlCooldown(Math.max(0,j.cooldownSec||0));}catch(e){}
  },[]);

  /* Push the selected Prompts-tab prompt into the worker's single slot and make
     it active. Returns true on success. Reuses the stored slot id so we update
     in place rather than piling up worker prompts. */
  const pushPromptToWorker=useCallback(async(p)=>{
    if(!p)return false;
    try{
      let pid=null; try{pid=localStorage.getItem(TD_SLOT_KEY)||null;}catch{}
      // Snapshot existing ids so a freshly-created slot is detectable.
      let beforeIds=new Set();
      try{const lr=await fetch(TD_WORKER_URL+"/prompts");if(lr.ok){const lj=await lr.json();(lj.prompts||[]).forEach(x=>beforeIds.add(x.id));}}catch{}
      // Upsert: existing pid → update in place; else create new.
      const r=await fetch(TD_WORKER_URL+"/prompts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:pid||null,name:p.name||"Prompt",text:p.text||""})});
      const j=await r.json();
      if(!j||!j.ok)return false;
      // Determine our slot id.
      let slot=pid;
      if(!slot){ const fresh=(j.prompts||[]).find(x=>!beforeIds.has(x.id)); slot=fresh?fresh.id:(j.activeId||null); }
      if(!slot)return false;
      try{localStorage.setItem(TD_SLOT_KEY,slot);}catch{}
      // Ensure it's the active prompt the worker builds with.
      await fetch(TD_WORKER_URL+"/prompts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({activeId:slot})}).catch(()=>{});
      return true;
    }catch(e){return false;}
  },[]);

  useEffect(()=>{
    const boot=async()=>{
      try{
        if(window._fbLoadTBDash){
          const d=await window._fbLoadTBDash();
          if(d){lastSavedSig.current=JSON.stringify({r:d.report,g:d.generatedAt,m:d.model}); if(d.report)setReport(d.report);if(d.generatedAt)setGeneratedAt(d.generatedAt);if(d.model)setModel(d.model);}
        }
      }catch(e){}
      // also pull latest ready report straight from worker
      try{
        const r=await fetch(TD_WORKER_URL+"/poll");const j=await r.json();
        if(j&&j.status==="ready"&&j.report){
          setReport(prev=>{ if(prev&&generatedAt&&j.generatedAt&&generatedAt>=j.generatedAt)return prev;
            // worker report is newer → adopt it; this DID come from the server so
            // mark it as already-synced (don't echo back to FB unless it differs).
            lastSavedSig.current=JSON.stringify({r:j.report,g:j.generatedAt,m:j.model});
            setGeneratedAt(j.generatedAt);setModel(j.model);return j.report;});
        }
      }catch(e){}
      hydrated.current=true;
      fetchRate();
    };
    if(window._fbReady)boot();
    else{const h=()=>boot();window.addEventListener("fb-ready",h,{once:true});return()=>window.removeEventListener("fb-ready",h);}
  },[]);

  // live cross-device sync
  useEffect(()=>{
    const onRemote=e=>{const d=e.detail;if(d){lastSavedSig.current=JSON.stringify({r:d.report,g:d.generatedAt,m:d.model}); if(d.report)setReport(d.report);if(d.generatedAt)setGeneratedAt(d.generatedAt);if(d.model)setModel(d.model);}};
    window.addEventListener("fb-tb-dash-remote",onRemote);
    return()=>{window.removeEventListener("fb-tb-dash-remote",onRemote);};
  },[]);

  // save to Firebase ONLY when the report truly changed (not on load/remote echo)
  useEffect(()=>{
    if(!hydrated.current||!report)return;
    const sig=JSON.stringify({r:report,g:generatedAt||null,m:model||null});
    if(sig===lastSavedSig.current)return;     // unchanged or just-loaded → skip
    lastSavedSig.current=sig;
    if(window._fbSaveTBDash)window._fbSaveTBDash({report,generatedAt:generatedAt||Date.now(),model:model||null});
  },[report,generatedAt,model]);

  const stopPoll=()=>{if(pollTimer.current){clearInterval(pollTimer.current);pollTimer.current=null;}window._tbBuildUntil=0;};
  const startPoll=()=>{
    stopPoll();
    window._tbBuildUntil=Date.now()+180000; // keep Firestore alive through the build
    pollTimer.current=setInterval(async()=>{
      try{
        const r=await fetch(TD_WORKER_URL+"/poll");const j=await r.json();
        if(j.status==="ready"){
          stopPoll();setBuilding(false);setLoading(false);setDegraded(false);
          setReport(j.report);setGeneratedAt(j.generatedAt);setModel(j.model);fetchRate();
        }else if(j.status==="degraded"){
          stopPoll();setBuilding(false);setLoading(false);setDegraded(true);
          setNotice(j.error||"All AI tiers failed. Try again later.");fetchRate();
        }
      }catch(e){}
    },TD_POLL_MS);
  };

  const run=async(force)=>{
    if(building||loading)return;
    // MacroBoard is a FIXED pipeline (FRED + Yahoo + GDELT + grounded Gemini →
    // render). No prompt to pick — just build.
    setLoading(true);setNotice("");setDegraded(false);
    window._tbBuildUntil=Date.now()+180000; // hold teardown off during /build too
    try{
      const r=await fetch(TD_WORKER_URL+"/build",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({force:!!force})});
      const j=await r.json();
      if(r.status===429){setLoading(false);window._tbBuildUntil=0;setNotice(j.error||"Rate limited.");setRlUsed(j.usedToday||rlUsed);setRlCooldown(j.cooldownSec||0);return;}
      if(!r.ok){setLoading(false);window._tbBuildUntil=0;setNotice(j.error||"Build failed.");return;}
      setLoading(false);setBuilding(true);startPoll();
    }catch(e){setLoading(false);window._tbBuildUntil=0;setNotice("Network error.");}
  };

  const canRun=rlUsed<TD_DAILY_LIMIT&&rlCooldown<=0&&!loading&&!building;

  return <div className="tb-fade-in" style={{maxWidth:1100,margin:"0 auto",color:"var(--tx)"}}>
    <div style={{display:"flex",alignItems:isMobile?"stretch":"center",gap:isMobile?10:12,flexWrap:"wrap",marginBottom:16,flexDirection:isMobile?"column":"row"}}>
      <div style={{flex:1,minWidth:160}}>
        <div style={{fontSize:20,fontWeight:800,color:"var(--tx)"}}>MacroBoard</div>
        {generatedAt&&<div style={{fontSize:12,color:"var(--txm)",marginTop:2}}>Updated {tdbTimeAgo(generatedAt)}{model?` · ${model}`:""}</div>}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",justifyContent:isMobile?"flex-start":"flex-end"}}>
        <span style={{fontSize:12,color:"var(--txm)"}}>{rlUsed}/{TD_DAILY_LIMIT} today</span>
        {rlCooldown>0&&<span style={{fontSize:12,color:"var(--tbw)"}}>⏱ {tdbFmtTime(rlCooldown)}</span>}
        <button onClick={()=>run(false)} disabled={!canRun} title={!canRun?(rlUsed>=TD_DAILY_LIMIT?"Daily limit reached":rlCooldown>0?`Wait ${tdbFmtTime(rlCooldown)}`:"Working…"):"Build today's macro read"}
          style={{padding:"8px 18px",borderRadius:100,border:"none",background:"var(--ac)",color:"#fff",fontSize:13,fontWeight:800,cursor:canRun?"pointer":"not-allowed",opacity:canRun?1:.5}}>
          {building||loading?<span><span style={{display:"inline-block",animation:"tb-spin 1s linear infinite"}}>⟳</span> Building…</span>:"⚡ Build"}
        </button>
      </div>
    </div>

    {notice&&<div className="tb-card tb-fade-in" style={{marginBottom:14,borderColor:degraded?"var(--tbr)":"var(--bd)",color:degraded?"var(--tbr)":"var(--txd)"}}>{notice}</div>}

    {building&&!report&&<div className="tb-card tb-fade-in" style={{textAlign:"center",padding:"40px 20px"}}>
      <div style={{fontSize:28,animation:"tb-spin 1.2s linear infinite",display:"inline-block"}}>⟳</div>
      <div style={{marginTop:10,fontWeight:700,color:"var(--tx)"}}>Building today's macro read…</div>
      <div style={{fontSize:12,color:"var(--txm)",marginTop:4}}>Live data (FRED · Yahoo · GDELT) → grounded Gemini → render. ~30–90s.</div>
    </div>}

    {!report&&!building&&<div className="tb-card tb-fade-in" style={{textAlign:"center",padding:"40px 20px",color:"var(--txm)"}}>
      <div style={{fontSize:32,marginBottom:8}}>📊</div>
      <div style={{fontWeight:700,color:"var(--txd)"}}>No board yet.</div>
      <div style={{fontSize:13,marginTop:4}}>Auto-builds 3× on weekdays — or hit ⚡ Build now.</div>
    </div>}

    {report&&<TDBReportView report={report}/>}
  </div>;
}


/* ════════════════════════════════════════════════════════════════════════════
   PER-TAB LOCK — React layer. Gates an individual tab's content behind the same
   password system (worker KV + Firebase + localStorage) used for the whole app.
   window._tbTabLock (defined in the applock script) does the actual work.
   ════════════════════════════════════════════════════════════════════════════ */
function useTabLockVersion(){
  const [,setV]=useState(0);
  useEffect(()=>{
    if(!window._tbTabLock) return;
    const off=window._tbTabLock.onChange(()=>setV(v=>v+1));
    return off;
  },[]);
}

/* Clean per-tab lock icons — shield-with-keyhole, distinct from the app padlock.
   Locked = filled shield + keyhole; Unlocked = outline shield with a tiny dash. */
function TBTabLockIcon({locked,size=15}){
  if(locked){
    return <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="none">
      <path d="M12 2l7 3v6c0 4.4-3 8.3-7 9.5C8 19.3 5 15.4 5 11V5l7-3z"/>
      <circle cx="12" cy="11" r="1.7" fill="var(--bg)"/>
      <rect x="11.2" y="11.6" width="1.6" height="3.4" rx="0.8" fill="var(--bg)"/>
    </svg>;
  }
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
    <path d="M12 2l7 3v6c0 4.4-3 8.3-7 9.5C8 19.3 5 15.4 5 11V5l7-3z"/>
    <path d="M9.5 11.5h5"/>
  </svg>;
}

function TBTabLockPrompt({tabId,tabLabel,onUnlocked}){
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const [hintMsg,setHintMsg]=useState('');
  const submit=async()=>{
    const p=pw.trim(); if(!p){setErr('Password required.');return;}
    setBusy(true);setErr('');
    try{
      const d=await window._tbTabLock.verify(tabId,p);
      console.log('[TabLock] verify response for', tabId, ':', JSON.stringify(d));
      const ok = d && (d.ok===true || d.valid===true || d.success===true || d.match===true);
      console.log('[TabLock] verify ok?', ok);
      if(ok){
        window._tbTabLock.markUnlocked(tabId);
        console.log('[TabLock] after markUnlocked → mustBlock?', window._tbTabLock.mustBlock(tabId), '| isUnlocked?', window._tbTabLock.isUnlocked(tabId));
        onUnlocked();
      }
      else setErr(d&&d.error?('Error: '+d.error):'Wrong password.');
    }catch(e){ console.error('[TabLock] verify threw', e); setErr('Network error.'); }
    setBusy(false);
  };
  const forgot=async()=>{
    setHintMsg('Sending…');
    try{ const r=await window._tbTabLock.sendHint(tabId,tabLabel);
      setHintMsg(r.noLock?'No lock on server.':r.sent?'Hint sent to your email!':'Failed — try again.');
    }catch(e){ setHintMsg('Failed — try again.'); }
  };
  return <div className="tb-fade-in" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:18,padding:'60px 20px',maxWidth:380,margin:'0 auto',textAlign:'center'}}>
    <div style={{fontSize:40}}>🔒</div>
    <div>
      <div style={{fontFamily:"'Lora',serif",fontSize:22,fontWeight:700,color:'var(--tx)'}}>{tabLabel} is locked</div>
      <div style={{fontSize:13,color:'var(--txm)',marginTop:4,fontStyle:'italic'}}>Enter the password to open this tab.</div>
    </div>
    <input type="password" value={pw} autoFocus onChange={e=>{setPw(e.target.value);setErr('');}} onKeyDown={e=>{if(e.key==='Enter')submit();}}
      placeholder="Password" style={{width:'100%',background:'var(--s2)',border:`1px solid ${err?'var(--tbr)':'var(--bd)'}`,borderRadius:8,color:'var(--tx)',fontSize:16,fontWeight:600,padding:'12px 16px',textAlign:'center',letterSpacing:4,outline:'none',boxSizing:'border-box'}}/>
    {err&&<div style={{fontSize:12,color:'var(--tbr)',fontWeight:700,minHeight:14}}>{err}</div>}
    <button onClick={submit} disabled={busy} style={{width:'100%',background:'var(--ac)',color:'#fff',border:'none',borderRadius:8,padding:'12px 0',fontSize:14,fontWeight:700,cursor:busy?'default':'pointer',opacity:busy?0.6:1}}>{busy?'Checking…':'Unlock'}</button>
    <button onClick={forgot} style={{background:'transparent',border:'none',color:'var(--txm)',fontSize:12,cursor:'pointer',textDecoration:'underline'}}>{hintMsg||'Forgot password?'}</button>
  </div>;
}

function TBTabGate({tabId,tabLabel,children}){
  useTabLockVersion();
  const [,force]=useState(0);
  const blocked = window._tbTabLock ? window._tbTabLock.mustBlock(tabId) : false;
  if(blocked){
    return <TBTabLockPrompt tabId={tabId} tabLabel={tabLabel} onUnlocked={()=>force(v=>v+1)}/>;
  }
  return children;
}

function TBTabLockManager({tabId,tabLabel,onClose}){
  useTabLockVersion();
  const isLocked = window._tbTabLock && window._tbTabLock.isLocked(tabId);
  const [mode,setMode]=useState(isLocked?'menu':'setpw');
  const [pw,setPw]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const act=async()=>{
    const p=pw.trim(); if(!p){setErr('Password required.');return;}
    setBusy(true);setErr('');
    try{
      if(mode==='setpw'){
        const hint=window.prompt('Optional: password hint for recovery email. Blank to skip.')||'';
        const d=await window._tbTabLock.setPw(tabId,p,hint);
        console.log('[TabLock] set-lock response for', tabId, ':', JSON.stringify(d));
        const ok = d && (d.ok===true || d.success===true || d.set===true);
        if(ok){ window._tbTabLock.setLock(tabId); window._tbTabLock.markUnlocked(tabId); onClose(); }
        else setErr(d&&d.error?('Error: '+d.error):'Failed to set lock.');
      } else if(mode==='remove'){
        const d=await window._tbTabLock.removePw(tabId,p);
        if(d.ok){ window._tbTabLock.removeLock(tabId); window._tbTabLock.markLocked(tabId); onClose(); }
        else setErr('Wrong password.');
      } else if(mode==='changepw'){
        const d=await window._tbTabLock.verify(tabId,p);
        if(d.ok){
          const np=window.prompt('Verified! Enter NEW password:');
          if(np&&np.trim()){
            const nh=window.prompt('Optional hint for new password. Blank to skip.')||'';
            const rem=await window._tbTabLock.removePw(tabId,p);
            if(rem.ok){ const set=await window._tbTabLock.setPw(tabId,np.trim(),nh);
              if(set.ok){ window._tbTabLock.setLock(tabId); window._tbTabLock.markUnlocked(tabId); onClose(); }
              else setErr('Failed to set new password.'); }
            else setErr('Error removing old lock.');
          } else setErr('New password empty — not changed.');
        } else setErr('Wrong password.');
      }
    }catch(e){ setErr('Network error.'); }
    setBusy(false);
  };
  const titleByMode={setpw:'Lock '+tabLabel,remove:'Remove lock',changepw:'Change password',menu:tabLabel+' lock'};
  const subByMode={setpw:'Choose a password to lock this tab. Unlock once per device.',remove:'Enter password to remove the lock.',changepw:'Enter current password first.',menu:'This tab is locked. Choose an action.'};
  const iconByMode={setpw:'🔐',remove:'🔓',changepw:'🔑',menu:'🔒'};
  return <div onClick={onClose} style={{position:'fixed',inset:0,zIndex:100000,background:'rgba(0,0,0,0.82)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
    <div onClick={e=>e.stopPropagation()} style={{background:'var(--s1,#141418)',border:'1px solid var(--bd)',borderRadius:20,padding:'32px 26px',width:340,maxWidth:'90vw',display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
      <div style={{fontSize:34}}>{iconByMode[mode]}</div>
      <div style={{textAlign:'center'}}>
        <div style={{fontFamily:"'Lora',serif",fontSize:20,fontWeight:700,color:'var(--tx)'}}>{titleByMode[mode]}</div>
        <div style={{fontSize:12.5,color:'var(--txm)',marginTop:3,fontStyle:'italic'}}>{subByMode[mode]}</div>
      </div>
      {mode==='menu'?(
        <div style={{display:'flex',flexDirection:'column',gap:8,width:'100%'}}>
          <button onClick={()=>{setMode('changepw');setPw('');setErr('');}} style={{background:'var(--s2)',color:'var(--tx)',border:'1px solid var(--bd)',borderRadius:8,padding:'11px 0',fontSize:13,fontWeight:700,cursor:'pointer'}}>🔑  Change password</button>
          <button onClick={()=>{setMode('remove');setPw('');setErr('');}} style={{background:'transparent',color:'var(--tbr)',border:'1px solid var(--tbr)',borderRadius:8,padding:'11px 0',fontSize:13,fontWeight:700,cursor:'pointer'}}>🗑  Remove lock</button>
          <button onClick={onClose} style={{background:'transparent',color:'var(--txm)',border:'none',fontSize:13,cursor:'pointer',textDecoration:'underline',marginTop:2}}>Cancel</button>
        </div>
      ):(
        <div style={{width:'100%',display:'flex',flexDirection:'column',gap:10}}>
          <input type="password" value={pw} autoFocus onChange={e=>{setPw(e.target.value);setErr('');}} onKeyDown={e=>{if(e.key==='Enter')act();}}
            placeholder="Password" style={{width:'100%',background:'var(--s2)',border:`1px solid ${err?'var(--tbr)':'var(--bd)'}`,borderRadius:8,color:'var(--tx)',fontSize:16,fontWeight:600,padding:'12px 16px',textAlign:'center',letterSpacing:4,outline:'none',boxSizing:'border-box'}}/>
          {err&&<div style={{fontSize:12,color:'var(--tbr)',fontWeight:700,textAlign:'center'}}>{err}</div>}
          <button onClick={act} disabled={busy} style={{background:'var(--ac)',color:'#fff',border:'none',borderRadius:8,padding:'12px 0',fontSize:14,fontWeight:700,cursor:busy?'default':'pointer',opacity:busy?0.6:1}}>{busy?'Working…':(mode==='setpw'?'Set Password':mode==='remove'?'Remove Lock':'Verify & Continue')}</button>
          <button onClick={onClose} style={{background:'transparent',color:'var(--txm)',border:'none',fontSize:13,cursor:'pointer',textDecoration:'underline'}}>Cancel</button>
        </div>
      )}
    </div>
  </div>;
}

function tbLoadAnalysisCfg(){

/* Shared watchlist — single ticker list driving News, parsing, sectors, catalysts. */
const TB_WATCHLIST_KEY = 'td6_watchlist';
/* Bump this when TB_WATCHLIST default changes and you want every device's
   saved list force-reset to the new canonical default exactly once. */
const TB_WATCHLIST_SEED = 2;
const TB_WATCHLIST_SEED_KEY = 'td6_watchlist_seed';
function tbLoadWatchlistLocal(){
  try{const a=JSON.parse(localStorage.getItem(TB_WATCHLIST_KEY)||'null');return (Array.isArray(a)&&a.length)?a:[...TB_WATCHLIST];}catch{return [...TB_WATCHLIST];}
}
function tbSaveWatchlistLocal(arr){try{localStorage.setItem(TB_WATCHLIST_KEY,JSON.stringify(arr));}catch{}}
tbSetWatchlist(tbLoadWatchlistLocal()); // prime parser's active list before first parse
function TBAnalysisPage({cfg={},onSave,prompts=[],onGoToPrompts}){
  const [editing,setEditing]=React.useState(false);
  const [results,setResults]=React.useState([]);/* [{icon,label,ok}] */

  const saveCfg=(c)=>{if(onSave)onSave(c);};

  // Normalize searches to an array. Migrates legacy searchQuery1/2 shape.
  const getSearches=(c)=>{
    if(Array.isArray(c.searches))return c.searches;
    const legacy=[c.searchQuery1,c.searchQuery2].filter(v=>v!=null);
    return legacy.length?legacy:[''];
  };
  const searches=getSearches(cfg);
  const [draft,setDraft]=React.useState(searches);
  React.useEffect(()=>{if(!editing)setDraft(getSearches(cfg));},[cfg,editing]);

  // Selected Prompts-tab prompt (falls back to first). Its text is what gets copied.
  const selPrompt=(prompts.find(p=>p.id===cfg.analysisPromptId)||prompts[0])||null;
  const selPromptText=selPrompt?selPrompt.text:'';

  const numIcon=(i)=>{const n=i+1;return (n>=1&&n<=20)?String.fromCharCode(0x2460+(n-1)):('#'+n);};

  /* Resolve query to URL — full URL passthrough, www. auto-scheme, else Google search */
  const resolveUrl=(query)=>{
    const t=(query||'').trim();
    if(/^https?:\/\//i.test(t)) return t;
    if(/^www\./i.test(t)) return 'https://'+t;
    if(t.includes('.')&&!t.includes(' ')&&!t.includes('?')) return 'https://'+t;
    return 'https://www.google.com/search?q='+encodeURIComponent(t);
  };

  /* Warm up clipboard permission on mount so it's pre-granted before launch */
  React.useEffect(()=>{
    if(navigator.permissions) navigator.permissions.query({name:'clipboard-write'}).catch(()=>{});
  },[]);

  const activeSearches=searches.map(s=>(s||'').trim()).filter(Boolean);

  const handleLaunch=()=>{
    const res=[];
    /* ── Clipboard first, synchronously via execCommand (no permission prompt) ── */
    if(selPromptText){
      let ok=false;
      try{
        const ta=document.createElement('textarea');
        ta.value=selPromptText;ta.setAttribute('readonly','');
        ta.style.cssText='position:absolute;left:-9999px;top:0;opacity:0;';
        document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,99999);
        ok=document.execCommand('copy');document.body.removeChild(ta);
      }catch(e){}
      if(navigator.clipboard) navigator.clipboard.writeText(selPromptText).catch(()=>{});
      res.push(ok?{ok:true,icon:'⌘',label:`Prompt copied — ${selPrompt.name}`}:{ok:false,icon:'⌘',label:'Copy failed — try the Prompts copy button'});
    }
    /* ── Open each search in its own new tab ── */
    searches.forEach((q,i)=>{
      const t=(q||'').trim();if(!t)return;
      window.open(resolveUrl(t),'_blank','noopener');
      res.push({ok:true,icon:numIcon(i),label:`Search ${i+1} opened`});
    });
    setResults(res);
  };

  const isEmpty=!selPromptText&&activeSearches.length===0;

  // Edit-panel helpers (operate on draft array)
  const setSearchAt=(i,v)=>setDraft(d=>d.map((x,j)=>j===i?v:x));
  const addSearch=()=>setDraft(d=>[...d,'']);
  const removeSearch=(i)=>setDraft(d=>d.length<=1?['']:d.filter((_,j)=>j!==i));
  const saveSearches=()=>{
    const cleaned=draft.map(s=>(s||'').trim()).filter(Boolean);
    const next={...cfg,searches:cleaned};
    delete next.searchQuery1;delete next.searchQuery2; // drop legacy fields
    saveCfg(next);setEditing(false);setResults([]);
  };

  return(<div className="tb-fade-in" style={{display:'flex',flexDirection:'column',gap:0,padding:'32px clamp(12px,4vw,28px) 40px',maxWidth:680,margin:'0 auto',width:'100%'}}>
    {/* Header — white, consistent with other sections */}
    <div style={{fontSize:20,fontWeight:800,color:'var(--tx)'}}>Analysis</div>
    <div style={{fontSize:13,color:'var(--txm)',marginTop:2,marginBottom:24}}>Copies your chosen prompt and opens every search at once.</div>

    {/* Prompt picker */}
    <div style={{marginBottom:20}}>
      <div style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:1.5,color:'var(--txm)',marginBottom:8}}>⌘ Clipboard prompts</div>
      <TBPromptSelect prompts={prompts} value={cfg.analysisPromptId} onChange={id=>saveCfg({...cfg,analysisPromptId:id})} onGoToPrompts={onGoToPrompts}/>
    </div>

    {/* Config summary (read-only) */}
    <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:24}}>
      <div style={{display:'flex',alignItems:'flex-start',gap:12,padding:'13px 16px',borderRadius:8,border:'1px solid var(--bd)',background:'var(--bgc)'}}>
        <span style={{fontSize:15,marginTop:1,color:selPromptText?'var(--ac)':'var(--txd)',flexShrink:0,width:18,textAlign:'center'}}>⌘</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:1.5,color:'var(--txm)',marginBottom:2}}>Prompt to copy</div>
          {selPromptText
            ?<div style={{fontSize:13,color:'var(--tx)',wordBreak:'break-word',lineHeight:1.4}}>{selPromptText.length>120?selPromptText.slice(0,120)+'…':selPromptText}<span style={{marginLeft:6,fontSize:11,color:'var(--txd)',fontStyle:'italic'}}>({selPrompt.name} · {selPromptText.length} chars)</span></div>
            :<div style={{fontSize:13,color:'var(--txd)',fontStyle:'italic'}}>No prompt selected</div>}
        </div>
      </div>
      {searches.map((val,i)=>(
        <div key={i} style={{display:'flex',alignItems:'flex-start',gap:12,padding:'13px 16px',borderRadius:8,border:'1px solid var(--bd)',background:'var(--bgc)'}}>
          <span style={{fontSize:15,marginTop:1,color:(val||'').trim()?'var(--ac)':'var(--txd)',flexShrink:0,width:18,textAlign:'center'}}>{numIcon(i)}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:1.5,color:'var(--txm)',marginBottom:2}}>Search / URL {i+1}</div>
            {(val||'').trim()
              ?<div style={{fontSize:13,color:'var(--tx)',wordBreak:'break-all',lineHeight:1.4}}>{val}</div>
              :<div style={{fontSize:13,color:'var(--txd)',fontStyle:'italic'}}>Not set</div>}
          </div>
        </div>
      ))}
    </div>

    {/* Edit panel — add/remove any number of searches */}
    {editing&&(
      <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:24,padding:'20px',borderRadius:10,border:'1px solid var(--ac)',background:'var(--bgc)'}}>
        {draft.map((val,i)=>(
          <div key={i}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
              <div style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:1.5,color:'var(--txm)'}}>{numIcon(i)} Search / URL {i+1}</div>
              <span style={{flex:1}}/>
              {draft.length>1&&<button onClick={()=>removeSearch(i)} title="Remove this search" style={{border:'none',background:'transparent',color:'var(--txm)',cursor:'pointer',fontSize:16,lineHeight:1,fontWeight:700,padding:'0 4px'}}
                onMouseEnter={e=>e.currentTarget.style.color='var(--tbr)'} onMouseLeave={e=>e.currentTarget.style.color='var(--txm)'}>×</button>}
            </div>
            <input value={val} onChange={e=>setSearchAt(i,e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addSearch();}}}
              placeholder="e.g.  SPY premarket analysis  or  https://finviz.com/map.ashx"
              style={{width:'100%',background:'var(--bg)',border:'1px solid var(--bd)',borderRadius:6,color:'var(--tx)',fontSize:13,padding:'10px',boxSizing:'border-box',fontFamily:'inherit'}}/>
          </div>
        ))}
        <div style={{fontSize:11,color:'var(--txd)'}}>Plain text → Google search. Full URL → opens directly. Each opens in its own tab.</div>
        <button onClick={addSearch} style={{alignSelf:'flex-start',padding:'7px 14px',borderRadius:8,border:'1px dashed var(--bd)',background:'transparent',color:'var(--txd)',fontSize:12,fontWeight:700,cursor:'pointer'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--ac)';e.currentTarget.style.color='var(--ac)';}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--bd)';e.currentTarget.style.color='var(--txd)';}}>+ Add search</button>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
          <button className="tb-btn-ghost" onClick={()=>{setEditing(false);setDraft(getSearches(cfg));}}>Cancel</button>
          <button className="tb-btn-primary" onClick={saveSearches}>Save Settings</button>
        </div>
      </div>
    )}

    {/* Action row */}
    <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',marginBottom:results.length?16:0}}>
      <button onMouseDown={handleLaunch} disabled={isEmpty}
        style={{display:'inline-flex',alignItems:'center',gap:8,background:isEmpty?'transparent':'var(--ac)',color:isEmpty?'var(--txd)':'#000',border:isEmpty?'1.5px solid var(--bd)':'none',borderRadius:8,padding:'12px 28px',fontSize:15,fontWeight:800,cursor:isEmpty?'not-allowed':'pointer',transition:'all .15s',opacity:isEmpty?.5:1}}>
        ⚡ Launch Analysis
      </button>
      <button className="tb-btn-ghost" onClick={()=>{setEditing(e=>!e);setDraft(getSearches(cfg));setResults([]);}}>
        {editing?'✕ Cancel':'✎ Edit Searches'}
      </button>
    </div>

    {/* Per-action result pills */}
    {results.length>0&&(
      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {results.map((r,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'9px 14px',borderRadius:6,
            border:r.ok?'1px solid rgba(74,222,128,0.3)':'1px solid rgba(248,113,113,0.3)',
            background:r.ok?'rgba(74,222,128,0.07)':'rgba(248,113,113,0.07)'}}>
            <span style={{fontSize:13,color:r.ok?'var(--tbb)':'var(--tbr)',flexShrink:0}}>{r.ok?'✓':'⚠'} {r.icon}</span>
            <span style={{fontSize:13,color:r.ok?'var(--tbb)':'var(--tbr)',fontWeight:600}}>{r.label}</span>
          </div>
        ))}
      </div>
    )}
  </div>);
}

/* ════════════════════════════════════════════════════════════════════════
   NEWSHUB — AI-curated watchlist news. Fetches from newshub-api Cloudflare
   Worker (async build + KV cache), syncs across devices via Firebase.
   ════════════════════════════════════════════════════════════════════════ */
const NH_WORKER_URL = 'https://newshub-api.av1.workers.dev';
// Default news watchlist — used until the user customizes it in News → Settings.
// Mirrors TB_WATCHLIST so first-run news matches the trade watchlist.
const NH_DEFAULT_TICKERS = [...TB_WATCHLIST];
const NH_DAILY_LIMIT = 12;     // must match worker DAILY_FRESH_LIMIT
const NH_MIN_INTERVAL = 5*60;  // must match worker MIN_FRESH_INTERVAL (seconds)
const NH_POLL_INTERVAL = 15000; // ms between polls while building

const NH_TIER_META = {
  critical:  {label:'Critical',  c:'var(--tbr)'},
  major:     {label:'Major',     c:'var(--ac)'},
  important: {label:'Important', c:'var(--tbw)'},
  notable:   {label:'Notable',   c:'var(--txd)'},
  minor:     {label:'Minor',     c:'var(--txm)'},
};
const NH_SLABEL={bull:'Bullish',bear:'Bearish',neutral:'Neutral'};

function nhTimeAgo(ts){
  if(!ts)return '';
  const s=(Date.now()-ts)/1000;
  if(s<60)return 'now';
  if(s<3600)return Math.max(1,Math.round(s/60))+'m ago';
  if(s<86400)return Math.round(s/3600)+'h ago';
  return Math.round(s/86400)+'d ago';
}
function nhFmtScore(s){if(s==null||s===0)return '';return (s>0?'+':'')+(+s).toFixed(2);}
function nhFmtTime(sec){if(sec<=0)return 'now';if(sec<60)return sec+'s';return Math.ceil(sec/60)+'m';}

function TBNewsPage({watchlist:sharedWatchlist=NH_DEFAULT_TICKERS}){
  const [events,setEvents]=useState([]);
  const [generatedAt,setGeneratedAt]=useState(null);
  const [loading,setLoading]=useState(false);
  const [building,setBuilding]=useState(false); // pipeline running in background
  const [degraded,setDegraded]=useState(false); // all AI down, showing raw headlines
  const [notice,setNotice]=useState('');
  const [hours,setHours]=useState(72);
  const [sentFilter,setSentFilter]=useState('all');
  const [impFilter,setImpFilter]=useState('all');
  const [selTickers,setSelTickers]=useState([]);
  const [selSectors,setSelSectors]=useState([]);
  const [sortBy,setSortBy]=useState('impact');
  // Watchlist now comes from the shared Control-tab list (prop). Read-only here.
  const newsTickers=sharedWatchlist;
  // Rate limit state (fetched from /rate-status)
  const [rlUsed,setRlUsed]=useState(0);
  const [rlCooldown,setRlCooldown]=useState(0); // seconds remaining in cooldown
  const pollTimer=useRef(null);
  const pollCount=useRef(0);
  const cooldownTimer=useRef(null);
  const hydrated=useRef(false);

  /* ── Fetch rate status from worker (cheap KV reads) ── */
  const fetchRateStatus=useCallback(async()=>{
    try{
      const r=await fetch(NH_WORKER_URL+'/rate-status');
      if(!r.ok)return;
      const j=await r.json();
      setRlUsed(j.usedToday||0);
      setRlCooldown(Math.max(0,j.cooldownSec||0));
    }catch(e){}
  },[]);

  /* Cooldown countdown ticker */
  useEffect(()=>{
    if(cooldownTimer.current)clearInterval(cooldownTimer.current);
    if(rlCooldown>0){
      cooldownTimer.current=setInterval(()=>{
        setRlCooldown(p=>{if(p<=1){clearInterval(cooldownTimer.current);return 0;}return p-1;});
      },1000);
    }
    return()=>clearInterval(cooldownTimer.current);
  },[rlCooldown]);

  /* ── Load from Firebase on mount ── */
  useEffect(()=>{
    const doLoad=async()=>{
      if(window._fbLoadTBNews){
        const d=await window._fbLoadTBNews();
        if(d){
          if(Array.isArray(d.events)&&d.events.length>0){setEvents(d.events);}
          if(d.generatedAt&&(!d.events||d.events.length>0))setGeneratedAt(d.generatedAt);
          if(d.settings){
            const s=d.settings;
            if(s.hours)setHours(s.hours);
            if(s.sentFilter)setSentFilter(s.sentFilter);
            if(s.impFilter)setImpFilter(s.impFilter);
            if(Array.isArray(s.selTickers))setSelTickers(s.selTickers);
            if(Array.isArray(s.selSectors))setSelSectors(s.selSectors);
            if(s.sortBy)setSortBy(s.sortBy);
          }
        }
      }
      hydrated.current=true;
      // Always fetch rate status on mount
      fetchRateStatus();
    };
    if(window._fbReady)doLoad();
    else{const h=()=>doLoad();window.addEventListener('fb-ready',h,{once:true});return()=>window.removeEventListener('fb-ready',h);}
  },[]);

  /* ── Live sync from other devices ── */
  useEffect(()=>{
    const onRemote=(e)=>{
      const d=e.detail;if(!d)return;
      if(Array.isArray(d.events)&&d.events.length>0){
        setEvents(d.events);
        setDegraded(d.events.every(e=>e.aiAnalyzed===false));
        setBuilding(false);
      }
      if(d.generatedAt&&(!d.events||d.events.length>0))setGeneratedAt(d.generatedAt);
      if(d.settings){
        const s=d.settings;
        if(s.hours)setHours(s.hours);
        if(s.sentFilter)setSentFilter(s.sentFilter);
        if(s.impFilter)setImpFilter(s.impFilter);
        if(Array.isArray(s.selTickers))setSelTickers(s.selTickers);
        if(Array.isArray(s.selSectors))setSelSectors(s.selSectors);
        if(s.sortBy)setSortBy(s.sortBy);
      }
    };
    window.addEventListener('fb-tb-news-remote',onRemote);
    return()=>window.removeEventListener('fb-tb-news-remote',onRemote);
  },[]);

  /* ── Persist settings when they change ── */
  useEffect(()=>{
    if(!hydrated.current)return;
    if(!window._fbSaveTBNews)return;
    const settings={hours,sentFilter,impFilter,selTickers,selSectors,sortBy};
    window._fbSaveTBNews({events,generatedAt,settings});
  },[hours,sentFilter,impFilter,selTickers,selSectors,sortBy,newsTickers]);

  /* ── Poll worker while pipeline is building ── */
  const stopPolling=()=>{if(pollTimer.current){clearTimeout(pollTimer.current);pollTimer.current=null;}pollCount.current=0;};

  // Max poll attempts before giving up (so a build that never writes can't spin
  // the UI forever). 16 × 15s = ~4 min — longer than any healthy build.
  const NH_MAX_POLLS=16;
  const pollForEvents=useCallback(async()=>{
    try{
      // IMPORTANT: poll with cacheOnly=1 so polling NEVER kicks a new build. It
      // only PEEKS the cache. Without this, once the build's lock expired a poll
      // would re-kick another build → infinite re-kill loop on a failing build.
      const tq='?cacheOnly=1&tickers='+encodeURIComponent(newsTickers.join(','));
      const r=await fetch(NH_WORKER_URL+'/news'+tq);
      if(!r.ok){stopPolling();setBuilding(false);setLoading(false);return;}
      const j=await r.json().catch(()=>({}));
      const evs=j.events||[];
      const gotResult = (r.headers.get('X-Cache')==='HIT') && !j._cacheMiss;
      if(gotResult){
        // Build finished and wrote a result (even if 0 events).
        setEvents(evs);
        setGeneratedAt(j.generatedAt||Date.now());
        setDegraded(!!j.degraded||(evs.length>0&&evs.every(e=>e.aiAnalyzed===false)));
        setBuilding(false);
        setLoading(false);
        stopPolling();
        fetchRateStatus();
        if(!evs.length)setNotice('Worker returned 0 events. Quotas may be exhausted — try again later.');
        if(window._fbSaveTBNews){
          const settings={hours,sentFilter,impFilter,selTickers,selSectors,sortBy};
          window._fbSaveTBNews({events:evs,generatedAt:j.generatedAt||Date.now(),settings});
        }
        return;
      }
      // Still no cache → build in progress. Keep polling until the cap.
      pollCount.current++;
      if(pollCount.current>=NH_MAX_POLLS){
        stopPolling();setBuilding(false);setLoading(false);
        setNotice('Build is taking too long — quota may be exhausted, or sources are slow. Try Force fresh again in a bit.');
        fetchRateStatus();
        return;
      }
      pollTimer.current=setTimeout(pollForEvents, NH_POLL_INTERVAL);
    }catch(e){
      stopPolling();setBuilding(false);setLoading(false);
      setNotice('Network error: '+e.message);
    }
  },[hours,sentFilter,impFilter,selTickers,selSectors,sortBy,newsTickers,fetchRateStatus]);

  /* ── Refresh: kick worker build, start polling ── */
  const refresh=useCallback(async(forceFresh)=>{
    stopPolling();
    setLoading(true);setBuilding(false);setNotice('');
    try{
      const tq='tickers='+encodeURIComponent(newsTickers.join(','));
      const url=NH_WORKER_URL+'/news?'+tq+(forceFresh?'&fresh=1':'');
      const r=await fetch(url);

      // Rate limited
      if(r.status===429){
        const j=await r.json().catch(()=>({}));
        setNotice(j.reason||'Rate limit reached. Try again later.');
        setLoading(false);
        fetchRateStatus();
        return;
      }

      const j=await r.json();

      // Rate limited but returned cached data
      if(j._rateLimited){
        setNotice(j._rateLimitReason||'Rate limited — showing cached data.');
        if(Array.isArray(j.events)&&j.events.length>0){
          setEvents(j.events);
          setGeneratedAt(j.generatedAt||Date.now());
        }
        setLoading(false);
        fetchRateStatus();
        return;
      }

      // Building in background
      if(r.status===202||j.status==='building'){
        setLoading(false);setBuilding(true);
        // If we got stale events, show them while building
        if(Array.isArray(j.events)&&j.events.length>0){
          setEvents(j.events);
          setGeneratedAt(j.generatedAt||Date.now());
        }
        pollCount.current=0;
        pollTimer.current=setTimeout(pollForEvents, NH_POLL_INTERVAL);
        fetchRateStatus();
        return;
      }

      // Got immediate result (cache hit)
      const evs=j.events||[];
      setEvents(evs);
      setGeneratedAt(j.generatedAt||Date.now());
      setDegraded(!!j.degraded||(evs.length>0&&evs.every(e=>e.aiAnalyzed===false)));
      setLoading(false);
      fetchRateStatus();
      if(!evs.length)setNotice('No events in cache. Use Force fresh to trigger a new build.');
      if(window._fbSaveTBNews){
        const settings={hours,sentFilter,impFilter,selTickers,selSectors,sortBy};
        window._fbSaveTBNews({events:evs,generatedAt:j.generatedAt||Date.now(),settings});
      }
    }catch(e){
      setNotice('Fetch error: '+e.message);
      setLoading(false);
    }
  },[pollForEvents,hours,sentFilter,impFilter,selTickers,selSectors,sortBy,newsTickers,fetchRateStatus]);

  useEffect(()=>()=>stopPolling(),[]);

  /* ── Derived ── */
  const watchlist=useMemo(()=>{
    const s=new Set();
    events.forEach(e=>{if(e.primaryTicker)s.add(e.primaryTicker);(e.additionalTickers||[]).forEach(t=>s.add(t));});
    return [...s].sort();
  },[events]);
  const sectorList=useMemo(()=>{
    const s=new Set();
    events.forEach(e=>(e.sectors||[]).forEach(x=>s.add(x)));
    return [...s].sort();
  },[events]);

  const windowed=useMemo(()=>{
    const cutoff=Date.now()-hours*3600*1000;
    return events.filter(e=>(e.ts||0)>=cutoff);
  },[events,hours]);

  const visible=useMemo(()=>{
    let arr=windowed.filter(e=>{
      if(selTickers.length){const m=selTickers.includes(e.primaryTicker)||(e.additionalTickers||[]).some(t=>selTickers.includes(t));if(!m)return false;}
      if(selSectors.length){const m=(e.sectors||[]).some(s=>selSectors.includes(s));if(!m)return false;}
      if(sentFilter!=='all'&&(e.sentiment?.label||'neutral')!==sentFilter)return false;
      const tier=e.impact?.tier||'minor';
      if(impFilter==='critical'&&tier!=='critical')return false;
      if(impFilter==='major'&&!['critical','major'].includes(tier))return false;
      if(impFilter==='important'&&!['critical','major','important'].includes(tier))return false;
      if(impFilter==='notable'&&tier==='minor')return false;
      return true;
    });
    if(sortBy==='time')arr=[...arr].sort((a,b)=>(b.ts||0)-(a.ts||0));
    else arr=[...arr].sort((a,b)=>(b.impact?.score||0)-(a.impact?.score||0)||(b.ts||0)-(a.ts||0));
    return arr;
  },[windowed,selTickers,selSectors,sentFilter,impFilter,sortBy]);

  const counts=useMemo(()=>({
    total:windowed.length,
    critical:windowed.filter(e=>e.impact?.tier==='critical').length,
    major:windowed.filter(e=>e.impact?.tier==='major').length,
    bull:windowed.filter(e=>e.sentiment?.label==='bull').length,
    bear:windowed.filter(e=>e.sentiment?.label==='bear').length,
  }),[windowed]);

  const tickerCounts=useMemo(()=>{const m=new Map();windowed.forEach(e=>{if(e.primaryTicker)m.set(e.primaryTicker,(m.get(e.primaryTicker)||0)+1);(e.additionalTickers||[]).forEach(t=>m.set(t,(m.get(t)||0)+1));});return m;},[windowed]);
  const sectorCounts=useMemo(()=>{const m=new Map();windowed.forEach(e=>(e.sectors||[]).forEach(s=>m.set(s,(m.get(s)||0)+1)));return m;},[windowed]);

  const toggleTicker=(t)=>setSelTickers(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);
  const toggleSector=(s)=>setSelSectors(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);
  const clearAll=()=>{setSelTickers([]);setSelSectors([]);setSentFilter('all');setImpFilter('all');};
  const hasFilter=sentFilter!=='all'||impFilter!=='all'||selTickers.length||selSectors.length;

  /* Sectors auto-derived from the shared watchlist — used to prune stale filters. */
  const newsSectors=useMemo(()=>{
    const s=new Set();
    newsTickers.forEach(t=>s.add(tbInferSector(t)));
    return [...s].sort();
  },[newsTickers]);

  /* When the watchlist changes (after hydration), drop events that no
     longer match and pull a fresh cache for the new list. Worker keys cache per
     list, so this is a cheap cache GET unless that list was never built. */
  const tickersKey=newsTickers.join(',');
  const lastTickersKey=useRef(null);
  useEffect(()=>{
    if(!hydrated.current)return;
    if(lastTickersKey.current===null){lastTickersKey.current=tickersKey;return;}
    if(lastTickersKey.current===tickersKey)return;
    lastTickersKey.current=tickersKey;
    // Prune stale events + stale ticker/sector filters so the UI matches.
    const tset=new Set(newsTickers);
    setEvents(prev=>prev.filter(e=>tset_has(tset,e)));
    setSelTickers(p=>p.filter(t=>tset.has(t)));
    setSelSectors(p=>p.filter(s=>newsSectors.includes(s)));
    // Pull the new list's cache (non-fresh = free, no rate-limit burn).
    refresh(false);
  },[tickersKey]);
  function tset_has(set,e){
    if(set.has(e.primaryTicker))return true;
    return (e.additionalTickers||[]).some(t=>set.has(t));
  }

  const canRefresh=rlUsed<NH_DAILY_LIMIT&&rlCooldown<=0&&!loading&&!building;
  const rlRemaining=NH_DAILY_LIMIT-rlUsed;

  /* ── Styles (TB tokens) ── */
  const segWrap={display:'flex',flexWrap:'wrap',background:'var(--s2)',border:'1px solid var(--bd)',borderRadius:8,padding:3,gap:2};
  const segBtn=(on,col)=>({fontFamily:'inherit',fontSize:11,fontWeight:on?800:600,border:'none',background:on?'var(--s1)':'transparent',color:on?(col||'var(--tx)'):'var(--txd)',padding:'6px 10px',borderRadius:6,cursor:'pointer',transition:'all .15s',display:'inline-flex',alignItems:'center',whiteSpace:'nowrap',boxShadow:on?'0 1px 3px var(--shadow)':'none'});
  const chip=(on,faded)=>({fontFamily:"'IBM Plex Mono',monospace",fontSize:11,fontWeight:700,padding:'5px 10px',borderRadius:100,cursor:'pointer',border:'1px solid '+(on?'var(--ac)':'var(--bd)'),background:on?'var(--ac)':'var(--s1)',color:on?'#fff':'var(--txd)',transition:'all .15s',userSelect:'none',display:'inline-flex',alignItems:'center',gap:4,opacity:faded?0.4:1,letterSpacing:0.3});
  const lbl={fontSize:10,fontWeight:900,textTransform:'uppercase',letterSpacing:1.5,color:'var(--txm)',flexShrink:0,whiteSpace:'nowrap'};

  return(<div className="tb-fade-in tb-page-content nh-page" style={{maxWidth:1100,margin:'0 auto'}}>

    {/* Header */}
    <div className="nh-header" style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:16}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:20,fontWeight:800,color:'var(--tx)'}}>News</div>
        <div style={{fontSize:13,color:'var(--txm)',display:'flex',flexWrap:'wrap',alignItems:'center',gap:6}}>
          {building?(
            <span style={{color:'var(--tbw)',fontWeight:600}}>⟳ Building… polling in {Math.round(NH_POLL_INTERVAL/1000)}s</span>
          ):generatedAt&&events.length>0?(
            <span>Updated {nhTimeAgo(generatedAt)} · {events.length} events</span>
          ):(
            <span>No events loaded — hit Refresh</span>
          )}
          <span style={{fontSize:11,background:'var(--s2)',border:'1px solid var(--bd)',padding:'2px 8px',borderRadius:4,fontFamily:"'IBM Plex Mono',monospace",whiteSpace:'nowrap'}}>
            {rlRemaining}/{NH_DAILY_LIMIT} left today
          </span>
          {rlCooldown>0&&<span style={{fontSize:11,color:'var(--tbw)',whiteSpace:'nowrap'}}>⏱ {nhFmtTime(rlCooldown)}</span>}
        </div>
      </div>
      <div className="nh-header-btns" style={{display:'flex',gap:6,flexShrink:0,flexWrap:'wrap'}}>
        <button className="tb-btn-ghost" onClick={()=>refresh(true)} disabled={!canRefresh}
          style={{fontSize:11,opacity:canRefresh?1:0.45}}
          title={!canRefresh?(!rlRemaining?'Daily limit reached':`Wait ${nhFmtTime(rlCooldown)}`):'Force full re-fetch'}>
          ↻ Force fresh
        </button>
        <button className="tb-btn-primary" onClick={()=>refresh(false)} disabled={loading||building} style={{fontSize:12}}>
          {loading?'Loading…':building?'Building…':'⟳ Refresh'}
        </button>
      </div>
    </div>

    {notice&&<div className="tb-card" style={{padding:'12px 16px',marginBottom:16,borderLeft:'3px solid var(--ac)',fontSize:13,color:'var(--txd)'}}>{notice}</div>}

    {/* Watchlist is edited in the Control tab now — News just consumes it. */}

    {/* Building indicator */}
    {building&&(
      <div className="tb-card" style={{padding:'14px 18px',marginBottom:16,borderLeft:'3px solid var(--tbw)',display:'flex',alignItems:'center',gap:12}}>
        <span style={{fontSize:18}}>⟳</span>
        <div>
          <div style={{fontWeight:700,color:'var(--tx)',fontSize:13}}>AI pipeline running in background</div>
          <div style={{fontSize:12,color:'var(--txm)',marginTop:2}}>Fetching news from 4 sources + running Gemini analysis. Auto-refreshing every {Math.round(NH_POLL_INTERVAL/1000)}s — takes 30–90s total.</div>
        </div>
      </div>
    )}

    {/* Degraded mode banner — all AI quota exhausted, showing raw headlines */}
    {!building&&degraded&&events.length>0&&(

          );})}
        </div>
      )}
    </div>

    {/* Loading spinner */}
    {loading&&!building&&(
      <div style={{textAlign:'center',padding:'60px 20px',color:'var(--txm)'}}>
        <div style={{fontSize:13,fontWeight:700}}>Checking cache…</div>
      </div>
    )}

    {/* Empty */}
    {!loading&&visible.length===0&&!building&&(
      <div style={{textAlign:'center',padding:'70px 20px'}}>
        <div style={{fontSize:42,marginBottom:14,opacity:0.35}}>⊹</div>
        <div style={{fontFamily:"'Lora',serif",fontSize:20,fontWeight:700,color:'var(--tx)',marginBottom:8}}>

        </div>

        </div>

    )}

    {/* Event list */}
    {!loading&&visible.length>0&&(
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {visible.map(e=>{
          const tier=e.impact?.tier||'minor';
          const tm=NH_TIER_META[tier]||NH_TIER_META.minor;
          const sLabel=e.sentiment?.label||'neutral';
          const score=e.sentiment?.score||0;
          const sources=e.sources||[];
          const shown=sources.slice(0,3);
          const extra=sources.length-shown.length;
          const sentCls=sLabel==='bull'?'tb-badge-bull':sLabel==='bear'?'tb-badge-bear':'tb-badge-neutral';
          return(
            <div key={e.id} className="tb-card" style={{padding:'16px 18px',borderLeft:'3px solid '+tm.c}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:9,flexWrap:'wrap'}}>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:800,fontSize:13,color:'var(--ac)'}}>{e.primaryTicker}</span>
                {e.additionalTickers?.length>0&&<span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:'var(--txm)',fontWeight:600}}>+ {e.additionalTickers.join(' · ')}</span>}
                {e.sectors?.length>0&&<span style={{fontSize:11,color:'var(--txm)',paddingLeft:8,borderLeft:'1px solid var(--bd)'}}>{e.sectors[0]}</span>}
                {tier!=='minor'&&<span style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:0.6,padding:'3px 9px',borderRadius:100,background:(tier==='critical'||tier==='major')?tm.c:'transparent',color:(tier==='critical'||tier==='major')?'#fff':tm.c,border:(tier==='critical'||tier==='major')?'none':'1px solid '+tm.c,display:'inline-flex',alignItems:'center',gap:4}}>
                  {tm.label}<span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:9,opacity:0.8,marginLeft:2}}>{e.impact?.score}</span>
                </span>}
                <span className={sentCls} style={{fontSize:10}}>
                  {NH_SLABEL[sLabel]}{score!==0&&<span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:9,opacity:0.75,marginLeft:3}}>{nhFmtScore(score)}</span>}
                </span>
                {e.eventType&&e.eventType!=='other'&&<span style={{fontSize:10,fontWeight:600,color:'var(--txm)',padding:'2px 8px',border:'1px solid var(--bd)',borderRadius:100,textTransform:'uppercase',letterSpacing:0.5}}>{e.eventType}</span>}
                {e.aiAnalyzed===false&&<span style={{fontSize:9,fontWeight:800,color:'var(--tbw)',padding:'2px 6px',border:'1px solid var(--tbw)',borderRadius:100,letterSpacing:0.5,opacity:0.7}}>RAW</span>}
                <span style={{marginLeft:'auto',fontSize:11,color:'var(--txm)',fontFamily:"'IBM Plex Mono',monospace"}}>{nhTimeAgo(e.ts)}</span>
              </div>
              <div style={{fontSize:15,lineHeight:1.55,color:'var(--tx)',fontWeight:500,fontFamily:"'Lora',serif",marginBottom:11}}>{e.summary}</div>
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',paddingTop:10,borderTop:'1px dashed var(--bd)',fontSize:11.5,color:'var(--txm)'}}>
                <span style={{fontWeight:800,textTransform:'uppercase',letterSpacing:0.6,fontSize:10}}>Sources</span>
                {shown.map((s,i)=>(<React.Fragment key={i}>
                  {i>0&&<span style={{opacity:0.4}}>·</span>}
                  <a href={s.url} target="_blank" rel="noopener noreferrer" style={{color:'var(--txd)',textDecoration:'none',fontWeight:600}}
                    onMouseEnter={ev=>ev.currentTarget.style.color='var(--ac)'}
                    onMouseLeave={ev=>ev.currentTarget.style.color='var(--txd)'}>{s.name}</a>
                </React.Fragment>))}
                {extra>0&&<span>+ {extra} more</span>}
                <span style={{marginLeft:'auto',fontFamily:"'IBM Plex Mono',monospace",fontSize:10,background:'var(--s2)',padding:'2px 7px',borderRadius:4}}>{sources.length} src</span>
              </div>
            </div>
          );
        })}
      </div>
    )}
  </div>);
}
