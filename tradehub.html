<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>TradeHub</title>
<meta name="theme-color" content="#0f0f12" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#F2EEF0" media="(prefers-color-scheme: light)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Nunito:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#0f0f12;}
  body{font-family:'Nunito',sans-serif;-webkit-font-smoothing:antialiased;}
  button{touch-action:manipulation;}
  /* TradeHub is the whole page here — root fills the viewport and is always shown */
  #tradeboard-root{position:fixed;inset:0;height:100dvh;overflow:hidden;display:flex;flex-direction:column;background:#0f0f12;}
  ::-webkit-scrollbar{display:none;width:0;height:0;}

  /* ── App Lock overlay (mirrors index.html applock) ── */
  #applock-overlay{position:fixed;inset:0;z-index:2147483000;background:rgba(0,0,0,0.88);display:none;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;}
  #applock-box{display:flex;flex-direction:column;align-items:center;gap:20px;padding:40px 32px;background:#141418;border:1px solid #252530;border-radius:24px;width:340px;max-width:90vw;box-shadow:0 32px 80px rgba(0,0,0,0.7);position:relative;}
  @keyframes applock-shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
  #applock-box.shake{animation:applock-shake 0.4s ease;}
  #applock-icon{font-size:36px;line-height:1;}
  #applock-title{font-family:'Lora',serif;font-size:22px;font-weight:700;color:#ececf0;margin-bottom:2px;}
  #applock-sub{font-family:'Lora',serif;font-size:13px;color:#58586a;font-style:italic;text-align:center;}
  #applock-pw{background:#0f0f12;border:1px solid #323240;border-radius:4px;color:#ececf0;font-size:16px;font-weight:600;padding:12px 16px;font-family:'Nunito',sans-serif;outline:none;width:100%;text-align:center;letter-spacing:4px;box-sizing:border-box;}
  #applock-pw.error{border-color:#d47a6a;}
  #applock-err{font-size:12px;color:#d47a6a;font-weight:700;text-align:center;min-height:16px;}
  #applock-submit{background:#E0607A;color:#fff;border:none;border-radius:4px;padding:12px 0;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;width:100%;transition:opacity .15s;}
  #applock-submit:disabled{opacity:0.55;cursor:default;}
  #applock-cancel{background:transparent;border:none;color:#58586a;font-size:13px;cursor:pointer;font-family:'Nunito',sans-serif;padding:0;text-decoration:underline;}
  #applock-forgot{background:transparent;border:none;color:#58586a;font-size:12px;cursor:pointer;font-family:'Nunito',sans-serif;padding:0;text-decoration:underline;}
</style>

<!-- React / ReactDOM / Babel (same CDN builds as the main suite) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>

<div id="tradeboard-root" style="display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;font-family:'Nunito',sans-serif;"></div>

<!-- ══ App Lock overlay (same SHA-256 + Worker KV system as index.html) ══ -->
<div id="applock-overlay">
  <div id="applock-box">
    <div id="applock-icon">🔒</div>
    <div style="text-align:center;">
      <div id="applock-title">Locked</div>
      <div id="applock-sub">Enter your password to open TradeHub.</div>
    </div>
    <div style="width:100%;display:flex;flex-direction:column;gap:10px;">
      <input id="applock-pw" type="password" placeholder="Password" autocomplete="off" />
      <div id="applock-err"></div>
      <button id="applock-submit">Unlock</button>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <button id="applock-forgot">Forgot password?</button>
        <button id="applock-cancel">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script>
  /* SECURITY GATE — runs BEFORE React mounts. If TradeHub is locked (per the
     localStorage lock cache shared with index.html) and this device hasn't
     unlocked it, hide the root so contents NEVER flash before the password. */
  (function(){
    var APPID = 'tony_tradehub_standalone';
    var locks = {};
    try { locks = JSON.parse(localStorage.getItem('al_locks') || '{}'); } catch(e) {}
    var entry = locks[APPID];
    var isLocked = !!entry;
    var v = (entry && entry.v) || 0;
    var gotV = parseInt(localStorage.getItem('al_unlockedv_' + APPID) || '0', 10);
    var isUnlocked = v === 0
      ? (localStorage.getItem('al_unlocked_' + APPID) === '1' || gotV > 0)
      : (gotV === v);
    if (isLocked && !isUnlocked) {
      var r = document.getElementById('tradeboard-root');
      if (r) r.style.display = 'none';
    }
  })();
</script>

<!-- ══════════════════════════════════════════════════════════════
     Firebase — scoped to TradeHub only.
     Same project / same paths / same origin as the main suite, so
     localStorage (td6_theme, td6_mainDash, tb_api_base…), anon-auth
     and Firestore docs are all shared with index.html.
     ══════════════════════════════════════════════════════════════ -->
<script>
  /* Theme shim — mirrors index.html _syncAllThemes just enough that the
     TradeHub light/dark toggle persists across reloads on this origin. */
  window._syncAllThemes = function(isDark){
    try{ localStorage.setItem("td6_theme", JSON.stringify(isDark)); }catch{}
    var bg = isDark ? "#0f0f12" : "#EAE3E7";
    document.body.style.background = bg;
    document.documentElement.style.background = bg;
    var r = document.getElementById('tradeboard-root');
    if(r) r.classList.toggle('tb-light', !isDark);
    if(window._tbSyncTheme) window._tbSyncTheme(isDark);
  };
  // Apply persisted theme immediately (before React mounts)
  try{
    var _dark = JSON.parse(localStorage.getItem('td6_theme')||'true');
    document.documentElement.style.background = _dark ? "#0f0f12" : "#EAE3E7";
    document.body.style.background = _dark ? "#0f0f12" : "#EAE3E7";
    var _r = document.getElementById('tradeboard-root');
    if(_r) _r.classList.toggle('tb-light', !_dark);
  }catch{}
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
  import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app-check.js";
  import { initializeFirestore, memoryLocalCache, terminate, doc, setDoc, updateDoc, onSnapshot, getDoc, getDocFromServer, deleteDoc, deleteField } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC2aKunOKj5WS8NpgZhpyMzOYecBr5t2_4",
    authDomain: "task-dashboard-d2b53.firebaseapp.com",
    projectId: "task-dashboard-d2b53",
    storageBucket: "task-dashboard-d2b53.firebasestorage.app",
    messagingSenderId: "982539604706",
    appId: "1:982539604706:web:e93da1aef499fcee2044bb"
  };

  const app = initializeApp(firebaseConfig);
  // App Check — same reCAPTCHA v3 site key as the main suite
  initializeAppCheck(app, {
    provider: new ReCaptchaV3Provider('6LeUyAstAAAAAEciRypd1i4Akq6ueFUYfXLaLaUX'),
    isTokenAutoRefreshEnabled: true
  });
  // Anon auth — gates Firestore rules without a login screen.
  // Expose an awaitable promise so writes can wait for auth instead of racing it.
  const auth = getAuth(app);
  let _authResolve; window._fbAuthReady = new Promise(res => { _authResolve = res; });
  onAuthStateChanged(auth, (user) => { if (user) { try{ _authResolve && _authResolve(); }catch(e){} } });
  signInAnonymously(auth).catch(e => console.warn("Anon auth failed:", e));
  // Memory-only cache: only docs with ACTIVE listeners get re-read on reconnect
  let db = initializeFirestore(app, { localCache: memoryLocalCache() });

  const TB_JOURNAL_PATH  = "dashboards/tradeboard_journal";
  const TB_PROMPTS_PATH  = "dashboards/tradeboard_prompts";
  const TB_NEWS_PATH     = "dashboards/tradeboard_news";
  const TB_REPORTS_PATH  = "dashboards/tradeboard_reports";
  const TB_ANALYSIS_PATH = "dashboards/tradeboard_analysis";
  const TB_WATCHLIST_PATH= "dashboards/tradeboard_watchlist";
  const MARKET_CAL_PATH  = "dashboards/market_calendar";
  const TB_DASH_PATH     = "dashboards/tradeboard_dashboard";

  let _tbJournalSaveTimer = null;
  let _tbPromptsSaveTimer = null;
  let _tbReportsSaveTimer = null;
  let _tbAnalysisSaveTimer = null;
  let _tbJournalLastOwnSaveAt = 0;
  let _tbPromptsLastOwnSaveAt = 0;
  let _tbReportsLastOwnSaveAt = 0;
  let _tbAnalysisLastOwnSaveAt = 0;
  let _tbJournalUnsub = null;
  let _tbPromptsUnsub = null;
  let _tbNewsUnsub = null;
  let _tbNewsLastOwnSaveAt = 0;
  let _tbAnalysisUnsub = null;
  let _tbWatchlistSaveTimer = null;
  let _tbWatchlistLastOwnSaveAt = 0;
  let _tbWatchlistUnsub = null;

  let _tbAppLockSaveTimer = null;
  let _tbAppLockLastOwnSaveAt = 0;
  let _tbAppLockUnsub = null;
  let _tbMarketCalUnsub = null;
  let _tbDashUnsub = null;
  let _tbDashLastOwnSaveAt = 0;
  let _tbDashSaveTimer = null;

  window._fbReady = false;

  function init(){
    // ── TradeBoard: Journal entries ───────────────────────────────────────────
    const tbJournalDocRef = doc(db, TB_JOURNAL_PATH);
    const tbPromptsDocRef = doc(db, TB_PROMPTS_PATH);
    const tbReportsDocRef = doc(db, TB_REPORTS_PATH);
    const tbAnalysisDocRef = doc(db, TB_ANALYSIS_PATH);
    const tbWatchlistDocRef = doc(db, TB_WATCHLIST_PATH);
    const tbAppLockDocRef = doc(db, "dashboards/applock");

    // Journal: load all trades
    window._fbLoadTBJournal = async () => {
      try {
        let snap;
        try { snap = await getDocFromServer(tbJournalDocRef); }
        catch(netErr) { snap = await getDoc(tbJournalDocRef); }
        if (!snap.exists()) return null;
        const data = snap.data();
        const trades = [];
        Object.entries(data).forEach(([k, v]) => {
          if (k.startsWith('t_') && v && typeof v === 'object' && v.id) trades.push(v);
        });
        trades.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        return trades.length > 0 ? trades : (Array.isArray(data.trades) ? data.trades : null);
      } catch(e) { console.warn('Firebase TBJournal load failed:', e); return null; }
    };

    // Journal: save single trade immediately (no debounce — debounce caused bulk drops)
    const _fbWriteTrade = async (trade) => {
      if (!trade || !trade.id) return;
      const fieldKey = 't_' + trade.id;
      const sanitized = JSON.parse(JSON.stringify(trade));
      _tbJournalLastOwnSaveAt = Date.now();
      try {
        await updateDoc(tbJournalDocRef, { [fieldKey]: sanitized, savedAt: Date.now() });
      } catch(err) {
        if (err.code === 'not-found') {
          await setDoc(tbJournalDocRef, { [fieldKey]: sanitized, savedAt: Date.now() });
        } else throw err;
      }
      _tbJournalLastOwnSaveAt = Date.now();
    };

    window._fbSaveTBTrade = (trade) => {
      _tbJournalLastOwnSaveAt = Date.now();
      window.dispatchEvent(new CustomEvent('fb-tb-saving'));
      _fbWriteTrade(trade)
        .then(() => window.dispatchEvent(new CustomEvent('fb-tb-journal-saved')))
        .catch(e => {
          console.warn('Firebase TBJournal save failed:', e.code, e.message);
          window.dispatchEvent(new CustomEvent('fb-tb-journal-error'));
        });
    };

    // Bulk save: writes all trades in parallel immediately
    window._fbSaveTBTradeBulk = async (trades) => {
      if (!trades || !trades.length) return;
      _tbJournalLastOwnSaveAt = Date.now();
      window.dispatchEvent(new CustomEvent('fb-tb-saving'));
      try {
        await Promise.all(trades.map(t => _fbWriteTrade(t)));
        window.dispatchEvent(new CustomEvent('fb-tb-journal-saved'));
      } catch(e) {
        console.warn('Firebase TBJournal bulk save failed:', e.code, e.message);
        window.dispatchEvent(new CustomEvent('fb-tb-journal-error'));
      }
    };

    // Journal: delete single trade
    window._fbDeleteTBTrade = async (tradeId) => {
      try {
        _tbJournalLastOwnSaveAt = Date.now();
        await updateDoc(tbJournalDocRef, { ['t_' + tradeId]: deleteField(), savedAt: Date.now() });
        _tbJournalLastOwnSaveAt = Date.now();
      } catch(e) {
        if (e.code !== 'not-found') console.warn('TBJournal delete failed:', e.message);
      }
    };

    // Atomic replace (Re-merge): delete old trade fields AND write new ones in ONE updateDoc.
    window._fbReplaceTBTrades = async (oldIds, newTrades) => {
      _tbJournalLastOwnSaveAt = Date.now();
      window.dispatchEvent(new CustomEvent('fb-tb-saving'));
      const update = { savedAt: Date.now() };
      (oldIds || []).forEach(id => { update['t_' + id] = deleteField(); });
      (newTrades || []).forEach(t => { if (t && t.id) update['t_' + t.id] = JSON.parse(JSON.stringify(t)); });
      try {
        await updateDoc(tbJournalDocRef, update);
        _tbJournalLastOwnSaveAt = Date.now();
        window.dispatchEvent(new CustomEvent('fb-tb-journal-saved'));
      } catch(err) {
        if (err.code === 'not-found') {
          await setDoc(tbJournalDocRef, update);
          _tbJournalLastOwnSaveAt = Date.now();
          window.dispatchEvent(new CustomEvent('fb-tb-journal-saved'));
        } else {
          console.warn('TBJournal replace failed:', err.code, err.message);
          window.dispatchEvent(new CustomEvent('fb-tb-journal-error'));
        }
      }
    };

    // Persist auto-sync metadata (lastWebullSync timestamp)
    window._fbSaveTBSyncMeta = (meta) => {
      try {
        updateDoc(tbJournalDocRef, { _syncMeta: meta, savedAt: Date.now() })
          .catch(() => setDoc(tbJournalDocRef, { _syncMeta: meta, savedAt: Date.now() }, { merge: true }));
      } catch(e) { console.warn('TBSyncMeta save failed:', e); }
    };

    // Prompts: load
    window._fbLoadTBPrompts = async () => {
      try {
        const snap = await getDoc(tbPromptsDocRef);
        if (!snap.exists()) return null;
        const data = snap.data();
        return Array.isArray(data.prompts) ? data.prompts : null;
      } catch(e) { console.warn('Firebase TBPrompts load failed:', e); return null; }
    };

    // Prompts: save
    window._fbSaveTBPrompts = (prompts) => {
      _tbPromptsLastOwnSaveAt = Date.now();
      window.dispatchEvent(new CustomEvent('fb-tb-saving'));
      if (_tbPromptsSaveTimer) clearTimeout(_tbPromptsSaveTimer);
      _tbPromptsSaveTimer = setTimeout(async () => {
        try {
          _tbPromptsLastOwnSaveAt = Date.now();
          await setDoc(tbPromptsDocRef, { prompts: JSON.parse(JSON.stringify(prompts)), savedAt: Date.now() });
          _tbPromptsLastOwnSaveAt = Date.now();
          window.dispatchEvent(new CustomEvent('fb-tb-prompts-saved'));
        } catch(e) {
          console.warn('Firebase TBPrompts save failed:', e.message);
          window.dispatchEvent(new CustomEvent('fb-tb-prompts-error'));
        }
      }, 1500);
    };

    // NewsHub: load cached events + settings
    const tbNewsDocRef = doc(db, TB_NEWS_PATH);
    window._fbLoadTBNews = async () => {
      try {
        const snap = await getDoc(tbNewsDocRef);
        if (!snap.exists()) return null;
        return snap.data() || null;
      } catch(e) { console.warn('Firebase TBNews load failed:', e); return null; }
    };

    // NewsHub: save (debounced 1s). Stores { events, generatedAt, settings }
    let _tbNewsSaveTimer = null;
    window._fbSaveTBNews = (payload) => {
      _tbNewsLastOwnSaveAt = Date.now();
      window.dispatchEvent(new CustomEvent('fb-tb-saving'));
      if (_tbNewsSaveTimer) clearTimeout(_tbNewsSaveTimer);
      _tbNewsSaveTimer = setTimeout(async () => {
        try {
          _tbNewsLastOwnSaveAt = Date.now();
          await setDoc(tbNewsDocRef, { ...JSON.parse(JSON.stringify(payload)), savedAt: Date.now() });
          _tbNewsLastOwnSaveAt = Date.now();
          window.dispatchEvent(new CustomEvent('fb-tb-news-saved'));
        } catch(e) {
          console.warn('Firebase TBNews save failed:', e.message);
          window.dispatchEvent(new CustomEvent('fb-tb-news-error'));
        }
      }, 1000);
    };

    // Reports: load
    window._fbLoadTBReports = async () => {
      try {
        const snap = await getDoc(tbReportsDocRef);
        if (!snap.exists()) return null;
        const data = snap.data();
        return Array.isArray(data.reports) ? data.reports : null;
      } catch(e) { console.warn('Firebase TBReports load failed:', e); return null; }
    };

    // Reports: save
    window._fbSaveTBReports = (reports) => {
      _tbReportsLastOwnSaveAt = Date.now();
      if (_tbReportsSaveTimer) clearTimeout(_tbReportsSaveTimer);
      _tbReportsSaveTimer = setTimeout(async () => {
        try {
          _tbReportsLastOwnSaveAt = Date.now();
          await setDoc(tbReportsDocRef, { reports: JSON.parse(JSON.stringify(reports)), savedAt: Date.now() });
          _tbReportsLastOwnSaveAt = Date.now();
          window.dispatchEvent(new CustomEvent('fb-tb-reports-saved'));
        } catch(e) {
          console.warn('Firebase TBReports save failed:', e.message);
        }
      }, 1500);
    };

    // Analysis cfg: load
    window._fbLoadTBAnalysis = async () => {
      try {
        const snap = await getDoc(tbAnalysisDocRef);
        if (!snap.exists()) return null;
        const data = snap.data();
        return data.cfg || null;
      } catch(e) { console.warn('Firebase TBAnalysis load failed:', e); return null; }
    };

    // Watchlist: load (single shared ticker list — drives News, parsing, sectors)
    window._fbLoadTBWatchlist = async () => {
      try {
        const snap = await getDoc(tbWatchlistDocRef);
        if (!snap.exists()) return null;
        const data = snap.data();
        return Array.isArray(data.tickers) ? data.tickers : null;
      } catch(e) { console.warn('Firebase TBWatchlist load failed:', e); return null; }
    };
    // Watchlist: save (800ms debounce)
    window._fbSaveTBWatchlist = (tickers) => {
      _tbWatchlistLastOwnSaveAt = Date.now();
      window.dispatchEvent(new CustomEvent('fb-tb-saving'));
      if (_tbWatchlistSaveTimer) clearTimeout(_tbWatchlistSaveTimer);
      _tbWatchlistSaveTimer = setTimeout(async () => {
        try {
          _tbWatchlistLastOwnSaveAt = Date.now();
          await setDoc(tbWatchlistDocRef, { tickers: JSON.parse(JSON.stringify(tickers||[])), savedAt: Date.now() });
          _tbWatchlistLastOwnSaveAt = Date.now();
          window.dispatchEvent(new CustomEvent('fb-tb-watchlist-saved'));
        } catch(e) {
          console.warn('Firebase TBWatchlist save failed:', e.message);
          window.dispatchEvent(new CustomEvent('fb-tb-watchlist-error'));
        }
      }, 800);
    };

    // Analysis cfg: save (800ms debounce)
    window._fbSaveTBAnalysis = (cfg) => {
      _tbAnalysisLastOwnSaveAt = Date.now();
      window.dispatchEvent(new CustomEvent('fb-tb-saving'));
      if (_tbAnalysisSaveTimer) clearTimeout(_tbAnalysisSaveTimer);
      _tbAnalysisSaveTimer = setTimeout(async () => {
        try {
          _tbAnalysisLastOwnSaveAt = Date.now();
          await setDoc(tbAnalysisDocRef, { cfg: JSON.parse(JSON.stringify(cfg)), savedAt: Date.now() });
          _tbAnalysisLastOwnSaveAt = Date.now();
          window.dispatchEvent(new CustomEvent('fb-tb-analysis-saved'));
        } catch(e) {
          console.warn('Firebase TBAnalysis save failed:', e.message);
          window.dispatchEvent(new CustomEvent('fb-tb-analysis-error'));
        }
      }, 800);
    };

    // ── TradeBoard: real-time listeners ───────────────────────────────────────
    if (_tbJournalUnsub) { _tbJournalUnsub(); _tbJournalUnsub = null; }
    _tbJournalUnsub = onSnapshot(tbJournalDocRef, (snap) => {
      if (!snap.exists()) return;
      if (Date.now() - _tbJournalLastOwnSaveAt < 8000) return;
      const data = snap.data();
      const remoteSavedAt = data.savedAt || 0;
      const trades = [];
      Object.entries(data).forEach(([k, v]) => {
        if (k.startsWith('t_') && v && typeof v === 'object' && v.id) trades.push(v);
      });
      trades.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      window.dispatchEvent(new CustomEvent('fb-tb-journal-remote', { detail: trades, savedAt: remoteSavedAt }));
    });
    if (_tbPromptsUnsub) { _tbPromptsUnsub(); _tbPromptsUnsub = null; }
    _tbPromptsUnsub = onSnapshot(tbPromptsDocRef, (snap) => {
      if (!snap.exists()) return;
      if (Date.now() - _tbPromptsLastOwnSaveAt < 8000) return;
      const data = snap.data();
      if (Array.isArray(data.prompts)) {
        window.dispatchEvent(new CustomEvent('fb-tb-prompts-remote', { detail: data.prompts }));
      }
    });

    if (_tbNewsUnsub) { _tbNewsUnsub(); _tbNewsUnsub = null; }
    _tbNewsUnsub = onSnapshot(tbNewsDocRef, (snap) => {
      if (!snap.exists()) return;
      if (Date.now() - _tbNewsLastOwnSaveAt < 6000) return;
      const data = snap.data();
      if (data && (Array.isArray(data.events) || data.settings)) {
        window.dispatchEvent(new CustomEvent('fb-tb-news-remote', { detail: data }));
      }
    });

    // ── TradeBoard (dashboard) — load / save / live-sync ──────────────────────
    const tbDashDocRef = doc(db, TB_DASH_PATH);
    window._fbLoadTBDash = async () => {
      try { const snap = await getDoc(tbDashDocRef); return snap.exists() ? (snap.data()||null) : null; }
      catch(e){ console.warn('TBDash load failed:', e); return null; }
    };
    window._fbSaveTBDash = (payload) => {
      _tbDashLastOwnSaveAt = Date.now();
      window.dispatchEvent(new CustomEvent('fb-tb-saving'));
      if (_tbDashSaveTimer) clearTimeout(_tbDashSaveTimer);
      _tbDashSaveTimer = setTimeout(async () => {
        const attempt = async () => {
          if (window._fbAuthReady) { try { await window._fbAuthReady; } catch(e){} }
          _tbDashLastOwnSaveAt = Date.now();
          const clean = JSON.parse(JSON.stringify(payload || {})); // strip undefined
          // Resolve the ref against the CURRENT db (it may have been recreated by
          // a teardown). Writing through a stale ref hits a terminated client.
          await setDoc(doc(db, TB_DASH_PATH), { ...clean, savedAt: Date.now() });
        };
        // Retry up to 3 times with backoff — covers auth AND App-Check token races.
        let ok=false, lastErr=null;
        for (let i=0;i<3 && !ok;i++){
          try { if(i>0) await new Promise(r=>setTimeout(r, 1200*i)); await attempt(); ok=true; }
          catch(e){ lastErr=e; }
        }
        if (ok){ _tbDashLastOwnSaveAt = Date.now(); window.dispatchEvent(new CustomEvent('fb-tb-dash-saved')); }
        else { console.error('[TBDash save FAILED]', lastErr&&(lastErr.code||''), lastErr&&lastErr.message); window.dispatchEvent(new CustomEvent('fb-tb-dash-error')); }
      }, 1000);
    };
    if (_tbDashUnsub) { _tbDashUnsub(); _tbDashUnsub = null; }
    _tbDashUnsub = onSnapshot(tbDashDocRef, (snap) => {
      if (!snap.exists()) return;
      const data = snap.data();
      // Prompt changes: signal other devices to re-pull the prompt list live.
      // (This fires even for our own writes within the 8s window is avoided below.)
      if (data && data.promptsBump && Date.now() - _tbDashLastOwnSaveAt >= 8000) {
        window.dispatchEvent(new CustomEvent('fb-tb-dash-prompts-bump', { detail: data.promptsBump }));
      }
      if (Date.now() - _tbDashLastOwnSaveAt < 8000) return;
      if (data && data.report) window.dispatchEvent(new CustomEvent('fb-tb-dash-remote', { detail: data }));
    });
    // Merge a tiny promptsBump into the dash doc (doesn't touch the report).
    window._fbBumpTBPrompts = async () => {
      _tbDashLastOwnSaveAt = Date.now();
      window.dispatchEvent(new CustomEvent('fb-tb-saving'));
      const attempt = async () => { if (window._fbAuthReady) { try { await window._fbAuthReady; } catch(e){} } return setDoc(doc(db, TB_DASH_PATH), { promptsBump: Date.now() }, { merge: true }); };
      try {
        await attempt();
        _tbDashLastOwnSaveAt = Date.now();
        window.dispatchEvent(new CustomEvent('fb-tb-dash-saved'));
      } catch(e) {
        try { await new Promise(r=>setTimeout(r,1500)); await attempt(); _tbDashLastOwnSaveAt = Date.now(); window.dispatchEvent(new CustomEvent('fb-tb-dash-saved')); }
        catch(e2){ console.error('[TBDash promptsBump FAILED]', e2.code||'', e2.message); window.dispatchEvent(new CustomEvent('fb-tb-dash-error')); }
      }
    };

    // ── Market Calendar (earnings/macro catalysts) ─────────────────────────────
    // Single-doc store. TradeHub Catalysts tab is the only writer; Index reads
    // + live-syncs.
    const tbMarketCalRef = doc(db, MARKET_CAL_PATH);
    let _tbMarketCalLastOwnSaveAt = 0;
    let _tbMarketCalSaveTimer = null;
    window._fbLoadMarketCal = async () => {
      try { const snap = await getDoc(tbMarketCalRef); return snap.exists() ? (snap.data()||null) : null; }
      catch(e){ console.warn('MarketCal load failed:', e); return null; }
    };
    window._fbSaveMarketCal = (payload) => {
      _tbMarketCalLastOwnSaveAt = Date.now();
      window.dispatchEvent(new CustomEvent('fb-tb-saving'));
      if (_tbMarketCalSaveTimer) clearTimeout(_tbMarketCalSaveTimer);
      _tbMarketCalSaveTimer = setTimeout(async () => {
        try {
          _tbMarketCalLastOwnSaveAt = Date.now();
          await setDoc(tbMarketCalRef, { ...JSON.parse(JSON.stringify(payload)), savedAt: Date.now() });
          _tbMarketCalLastOwnSaveAt = Date.now();
          window.dispatchEvent(new CustomEvent('fb-tb-marketcal-saved'));
        } catch(e){ console.warn('MarketCal save failed:', e.message); window.dispatchEvent(new CustomEvent('fb-tb-marketcal-error')); }
      }, 600);
    };
    if (_tbMarketCalUnsub) { _tbMarketCalUnsub(); _tbMarketCalUnsub = null; }
    _tbMarketCalUnsub = onSnapshot(tbMarketCalRef, (snap) => {
      if (!snap.exists()) return;
      if (Date.now() - _tbMarketCalLastOwnSaveAt < 6000) return;
      const data = snap.data();
      if (data && Array.isArray(data.events)) window.dispatchEvent(new CustomEvent('fb-tb-marketcal-remote', { detail: data }));
    });
    // Reminder docs — dashboard:'tony' scopes the push to Tony-main devices only.
    window._fbWriteReminder = async (r) => {
      if (!r || !r.id) return;
      await setDoc(doc(db, 'reminders', r.id), JSON.parse(JSON.stringify(r)));
    };
    window._fbDeleteReminder = async (id) => {
      if (!id) return;
      try { await deleteDoc(doc(db, 'reminders', id)); } catch(e){}
    };

    if (_tbAnalysisUnsub) { _tbAnalysisUnsub(); _tbAnalysisUnsub = null; }
    _tbAnalysisUnsub = onSnapshot(tbAnalysisDocRef, (snap) => {
      if (!snap.exists()) return;
      if (Date.now() - _tbAnalysisLastOwnSaveAt < 8000) return;
      const data = snap.data();
      if (data.cfg && typeof data.cfg === 'object') {
        window.dispatchEvent(new CustomEvent('fb-tb-analysis-remote', { detail: data.cfg }));
      }
    });

    if (_tbWatchlistUnsub) { _tbWatchlistUnsub(); _tbWatchlistUnsub = null; }
    _tbWatchlistUnsub = onSnapshot(tbWatchlistDocRef, (snap) => {
      if (!snap.exists()) return;
      if (Date.now() - _tbWatchlistLastOwnSaveAt < 8000) return;
      const data = snap.data();
      if (Array.isArray(data.tickers)) {
        window.dispatchEvent(new CustomEvent('fb-tb-watchlist-remote', { detail: data.tickers }));
      }
    });

    // ── AppLock locked-set sync — which apps are locked, shared across ALL devices.
    //    Same dashboards/applock doc the main suite (index.html) uses, so locking
    //    TradeHub here or there stays in sync everywhere. ──
    window._fbSaveAppLocks = (locksObj) => {
      clearTimeout(_tbAppLockSaveTimer);
      _tbAppLockSaveTimer = setTimeout(async () => {
        try {
          _tbAppLockLastOwnSaveAt = Date.now();
          await setDoc(tbAppLockDocRef, { locks: locksObj || {}, savedAt: Date.now() });
          _tbAppLockLastOwnSaveAt = Date.now();
        } catch(e) { console.warn('[AppLock] Firebase save failed:', e); }
      }, 400);
    };
    window._fbLoadAppLocks = async () => {
      try {
        const snap = await getDoc(tbAppLockDocRef);
        if (snap.exists()) { const d = snap.data(); return d.locks || {}; }
      } catch(e) { console.warn('[AppLock] Firebase load failed:', e); }
      return null;
    };
    if (_tbAppLockUnsub) { _tbAppLockUnsub(); _tbAppLockUnsub = null; }
    _tbAppLockUnsub = onSnapshot(tbAppLockDocRef, (snap) => {
      if (!snap.exists()) return;
      if (Date.now() - _tbAppLockLastOwnSaveAt < 2000) return;
      const d = snap.data();
      if (window._alApplyRemoteLocks) window._alApplyRemoteLocks(d.locks || {});
    }, (err) => { console.warn('[AppLock] onSnapshot error:', err); });

    window._fbReady = true;
    window.dispatchEvent(new CustomEvent("fb-ready"));
  }

  init();

  // ── Listener lifecycle: tear down on idle to avoid Firestore read spikes,
  //    restore on the next interaction (scoped to TradeHub's 4 docs only). ──
  let _hideTimer = null, _idleTimer = null;
  const HIDE_DELAY = 1000;            // 1s after tab hidden → teardown
  const IDLE_DELAY = 5 * 60 * 1000;   // 5min no interaction → teardown

  async function _teardown(){
    // Don't terminate Firestore while a TradeBoard build or Webull sync is in
    // flight. Builds take 60–120s; if the tab goes hidden mid-build (phone
    // screen off / app switch) the old teardown killed the client, so the
    // completion write rejected ("client already terminated") → a false
    // "Sync failed" even though the worker already had the report. Defer.
    if (window._tbBuildUntil && Date.now() < window._tbBuildUntil) {
      clearTimeout(_hideTimer); clearTimeout(_idleTimer);
      _hideTimer = null;
      _idleTimer = setTimeout(_teardown, 15000);
      return;
    }
    clearTimeout(_hideTimer); clearTimeout(_idleTimer);
    _hideTimer = null; _idleTimer = null;
    if (_tbJournalUnsub) { _tbJournalUnsub(); _tbJournalUnsub = null; }
    if (_tbPromptsUnsub) { _tbPromptsUnsub(); _tbPromptsUnsub = null; }
    if (_tbNewsUnsub)    { _tbNewsUnsub();    _tbNewsUnsub    = null; }
    if (_tbAnalysisUnsub){ _tbAnalysisUnsub();_tbAnalysisUnsub= null; }
    if (_tbWatchlistUnsub){ _tbWatchlistUnsub();_tbWatchlistUnsub= null; }
    if (_tbAppLockUnsub) { _tbAppLockUnsub(); _tbAppLockUnsub = null; }
    try { await terminate(db); } catch(e) {}
    db = initializeFirestore(app, { localCache: memoryLocalCache() });
    window._fbReady = false; // force init() on next interaction
  }
  function _restore(){
    if (!window._fbReady) init();
    _startIdleTimer();
  }
  function _startIdleTimer(){
    clearTimeout(_idleTimer);
    _idleTimer = setTimeout(_teardown, IDLE_DELAY);
  }
  ['pointerdown','keydown','touchstart','wheel'].forEach(ev =>
    window.addEventListener(ev, () => { _restore(); }, { passive:true }));
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      _hideTimer = setTimeout(_teardown, HIDE_DELAY);
    } else {
      clearTimeout(_hideTimer); _hideTimer = null;
      _restore();
    }
  });
  _startIdleTimer();
</script>

<script type="text/babel">
(function(){

/* ── Mobile hook ── */
function useIsMobile(breakpoint=768){
  const [mobile,setMobile]=useState(()=>window.innerWidth<=breakpoint);
  useEffect(()=>{
    const h=()=>setMobile(window.innerWidth<=breakpoint);

}

/* ── Enums ── */
const BIAS_ENUM   = { bullish:'bullish', bearish:'bearish', chop:'chop', mixed:'mixed' };
const REGIME_ENUM = { risk_on:'risk_on', risk_off:'risk_off', mixed:'mixed' };
const GONOGO_ENUM = { go:'go', no_go:'no_go' };
const RATING_ENUM = { strong:'strong', neutral:'neutral', weak:'weak' };

function normalizeBias(raw){if(!raw)return null;const s=raw.toLowerCase();if(/bull/.test(s))return'bullish';if(/bear/.test(s))return'bearish';if(/chop|lateral|sideways/.test(s))return'chop';if(/mix|neutral/.test(s))return'mixed';return null;}
function normalizeRegime(raw){if(!raw)return null;const s=raw.toLowerCase();if(/risk[- ]?on/.test(s))return'risk_on';if(/risk[- ]?off/.test(s))return'risk_off';if(/mix/.test(s))return'mixed';return null;}
function normalizeGoNogo(raw){if(!raw)return null;if(/no[- ]go/i.test(raw))return'no_go';if(/\bgo\b/i.test(raw))return'go';return null;}
function normalizeRating(raw){if(!raw)return'neutral';const s=raw.toLowerCase();if(/strong|bull|green|🟢/.test(s))return'strong';if(/weak|bear|avoid|red|🔴/.test(s))return'weak';return'neutral';}

/* ── Canonical state model ── */
function createEmptyMarketState(){return{marketRegime:null,marketBias:null,riskCondition:null,goNoGo:null,goNoGoReason:'',vix:{value:null,trend:null,sentiment:null},yields:{tenYear:null,direction:null,implication:null},oil:{wti:null,brent:null,trend:null,implication:null},indices:{sp500:null,nasdaq:null,dow:null},macroDrivers:[],geopoliticalRisk:{level:null,summary:'',bullets:[]},trumpStatements:{summary:'',bullets:[]},centralBanks:{summary:'',bullets:[]},economicEvents:{summary:'',bullets:[]},strongestSectors:[],weakestSectors:[],watchlist:[],tradeSetups:[],riskWarnings:[],tierList:{},summary:'',_parsedAt:null,_raw:'',_rawSections:{}};}

function computeDerivedState(state){
  if(!state)return null;
  const vixNum=parseFloat(state.vix.value);
  let volatilityRisk='low';
  if(vixNum>30)volatilityRisk='extreme';else if(vixNum>25)volatilityRisk='high';else if(vixNum>20)volatilityRisk='elevated';else if(vixNum>16)volatilityRisk='moderate';
  let macroScore=50;
  if(state.marketBias==='bullish')macroScore+=20;else if(state.marketBias==='bearish')macroScore-=20;else if(state.marketBias==='chop')macroScore-=5;
  if(state.riskCondition==='risk_on')macroScore+=15;else if(state.riskCondition==='risk_off')macroScore-=15;
  if(state.goNoGo==='go')macroScore+=10;else if(state.goNoGo==='no_go')macroScore-=15;
  if(vixNum>20)macroScore-=10;if(vixNum<15)macroScore+=5;
  macroScore=Math.max(0,Math.min(100,macroScore));
  const wtiNum=parseFloat(state.oil.wti);const yieldNum=parseFloat(state.yields.tenYear);
  let inflationPressure='moderate';
  if(wtiNum>90||yieldNum>4.5)inflationPressure='high';else if(wtiNum>75||yieldNum>4.0)inflationPressure='elevated';else if(wtiNum<60&&yieldNum<3.5)inflationPressure='low';
  const geoLevel=state.geopoliticalRisk.level||'';
  let geoScore=1;if(/high|extreme/i.test(geoLevel))geoScore=3;else if(/elev|moderate/i.test(geoLevel))geoScore=2;
  const geopoliticalSensitivity=['','low','moderate','elevated','high'][geoScore]||'moderate';
  const strongCount=state.watchlist.filter(t=>t.rating==='strong').length;
  const weakCount=state.watchlist.filter(t=>t.rating==='weak').length;
  const neutralCount=state.watchlist.filter(t=>t.rating==='neutral').length;
  const wlTotal=state.watchlist.length||1;
  const watchlistBreadth=Math.round((strongCount/wlTotal)*100);
  return{volatilityRisk,macroTailwindStrength:macroScore,inflationPressure,geopoliticalSensitivity,watchlistBreadth,strongCount,weakCount,neutralCount,setupCount:state.tradeSetups.length};
}

/* ── Parser helpers (minimal reimplementation to avoid global collision) ── */
const TB_WATCHLIST=['DRAM','SNDK','MU','INTC','WDC','AMD','CRWD','BE','GOOGL','PLTR','NVDA','MRVL','CRDO','TSLA','SPCX','AAPL','MSFT','NET','SCCO','ERO','WMT','AMZN','BABA'];
// Active watchlist — the single shared list edited in the Control tab. Drives
// News fetch, report parsing, and sector inference. Defaults to TB_WATCHLIST
// until the user customizes it; TBApp keeps this in sync via tbSetWatchlist().
let TB_WL=[...TB_WATCHLIST];
function tbSetWatchlist(arr){TB_WL=(Array.isArray(arr)&&arr.length)?arr.slice():[...TB_WATCHLIST];pushWatchlistToWorkers(TB_WL);}

// Push TB_WL to the workers so their CRON pre-builds + on-demand builds use the
// exact Control-tab list (News, Catalysts, MacroBoard all read it). Debounced;
// fire-and-forget. This is what makes the Control watchlist universal.
let _wlPushTimer=null,_wlPushLast='';
function pushWatchlistToWorkers(tickers){
  if(!Array.isArray(tickers)||!tickers.length)return;
  const sig=tickers.join(',');
  if(sig===_wlPushLast)return;            // skip identical repeats (tbSetWatchlist fires often)
  if(_wlPushTimer)clearTimeout(_wlPushTimer);
  _wlPushTimer=setTimeout(()=>{
    _wlPushLast=sig;
    const opts={method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tickers}),keepalive:true};
    fetch('https://newshub-api.av1.workers.dev/watchlist',opts).catch(()=>{});
    fetch('https://trade-dashboard.av1.workers.dev/watchlist',opts).catch(()=>{});
  },1500);
}
function tbGetWatchlist(){return TB_WL;}
const TB_TICKER_SECTORS={DRAM:'AI/Semiconductor',MRVL:'Semiconductor',SPCX:'Space',SNDK:'Storage',MU:'Semiconductor',WDC:'Storage',INTC:'Semiconductor',AMD:'Semiconductor',LMT:'Defense',CRWD:'Cybersecurity',BE:'Clean Energy',GOOGL:'Tech/Mega-Cap',PLTR:'AI/Software',NVDA:'AI/Semiconductor',CRDO:'Semiconductor',TSLA:'EV/Auto',AAPL:'Tech/Mega-Cap',MSFT:'Tech/Mega-Cap',NET:'Cybersecurity',SCCO:'Copper/Mining',ERO:'Copper/Mining',WMT:'Retail',AMZN:'Tech/Retail',BABA:'China/Tech',LMND:'InsurTech',EXPE:'Travel',NVS:'Pharma',MS:'Financials',XOM:'Energy',CVX:'Energy',VLO:'Refining',CNQ:'Energy'};
function tbInferSector(t){return TB_TICKER_SECTORS[t]||'Diversified';}

function tbExtractBullets(text){if(!text)return[];const lines=text.split('\n');const bullets=[];for(const l of lines){const t=l.replace(/^[\s•\-*#▸►▪○]+/,'').trim();if(t.length>5&&t.length<600)bullets.push(t);}return bullets;}
function tbMatchSectionKey(header,body){const h=(header+' '+body.slice(0,120)).toLowerCase();if(/snapshot|market.*overview|premarket|indices/i.test(h))return'marketSnapshot';if(/macro.*driver|key.*driver|top.*macro/i.test(h))return'macroDrivers';if(/geo|iran|middle.?east|russia|ukraine/i.test(h))return'geopolitics';if(/trump|tariff/i.test(h))return'trump';if(/central.bank|fed|ecb|boj|fomc/i.test(h))return'centralBanks';if(/economic.*event|calendar|key.*data|forward/i.test(h))return'economicEvents';if(/bias|regime|market.*condition/i.test(h))return'marketBias';if(/go.*no|no.*go|signal/i.test(h))return'goNogo';if(/sector.*strength|sector.*focus|strongest/i.test(h))return'sectorStrength';if(/watchlist/i.test(h))return'watchlist';if(/setup|trade.*idea|long.*only.*setup|actionable/i.test(h))return'tradeSetups';if(/not.*do|avoid|what.*not|mistake/i.test(h))return'whatNotToDo';if(/tier.*list|tier.*summ/i.test(h))return'tierList';return null;}
function tbSplitSections(raw){const lines=raw.split('\n');const sections=[];let cur=null;for(const l of lines){const h=/^#{1,3}\s+(.+)|^\*\*(\d+\.?\s*.+)\*\*\s*$/.exec(l);if(h){if(cur)sections.push(cur);cur={header:(h[1]||h[2]||'').trim(),lines:[]};}else if(cur){cur.lines.push(l);}else{if(!sections.length)sections.push({header:'intro',lines:[]});sections[0].lines.push(l);}}if(cur)sections.push(cur);return sections;}
function tbParseVix(text){const m=text.match(/VIX[:\s]+(\d+\.?\d*)/i);const v=m?m[1]:null;const t=/rising|elevated|above/i.test(text)?'rising':/falling|below|declining/i.test(text)?'falling':'stable';return{value:v,trend:t,sentiment:parseFloat(v)>20?'fearful':'calm'};}
function tbParseYields(text){const m=text.match(/10.?[Yy](?:ear|r)?[:\s]+(\d+\.?\d*)%?/i);const t=/rising|higher/i.test(text)?'rising':/falling|lower/i.test(text)?'falling':'stable';return{tenYear:m?m[1]:null,direction:t,implication:/equit|stock/i.test(text)?text.slice(0,80):''};}
function tbParseOil(text){const wm=text.match(/WTI[:\s$]*(\d+\.?\d*)/i);const bm=text.match(/Brent[:\s$]*(\d+\.?\d*)/i);const t=/rising|higher/i.test(text)?'rising':/falling|lower/i.test(text)?'falling':'stable';return{wti:wm?wm[1]:null,brent:bm?bm[1]:null,trend:t,implication:''};}
function tbParseIndices(text){const sp=text.match(/S&P\s*500[:\s]*([+-]?\d+\.?\d*%?)/i);const nd=text.match(/NASDAQ[:\s]*([+-]?\d+\.?\d*%?)/i);const dj=text.match(/Dow[:\s]*([+-]?\d+\.?\d*%?)/i);return{sp500:sp?sp[1]:null,nasdaq:nd?nd[1]:null,dow:dj?dj[1]:null};}
function tbParseBias(text){const b=normalizeBias(text);const c=normalizeRegime(text);return{bias:b,condition:c};}
function tbParseGoNogo(text){const lines=text.split('\n');for(const l of lines){const gn=normalizeGoNogo(l);if(gn){const rest=l.replace(/no[- ]go|go/i,'').replace(/[*:#\-]/g,'').trim();return{signal:gn,reason:rest.slice(0,200)};}}return{signal:null,reason:''};}
function tbParseSectors(text){const strong=[];const weak=[];text.split('\n').forEach(l=>{if(/strong|top|best|leading/i.test(l))strong.push(...tbExtractBullets(l));if(/weak|avoid|lag/i.test(l))weak.push(...tbExtractBullets(l));});return{strong:strong.slice(0,3),weak:weak.slice(0,3)};}
function tbParseWatchlist(text,raw){const src=text||raw||'';const results=[];const seen=new Set();src.split('\n').forEach(line=>{const found=TB_WL.find(t=>!seen.has(t)&&new RegExp(`\\b${t}\\b`).test(line));if(found){seen.add(found);const r=normalizeRating(line);results.push({ticker:found,rating:r,sector:tbInferSector(found),note:line.replace(new RegExp(`^.*${found}[:\\s\\-]*`,'i'),'').slice(0,120).trim()});}});return results;}
function tbParseSetups(text){const src=text||'';const setups=[];const lines=src.split('\n').filter(l=>l.trim());let cur=null;for(let i=0;i<lines.length;i++){const line=lines[i];const stripped=line.replace(/^[\s•\-*#▸►]+/,'').trim();const detected=TB_WL.find(t=>new RegExp(`^\\*{0,2}${t}\\*{0,2}[\\s:\\-–—]`,'i').test(stripped));if(detected){if(cur)setups.push(cur);const rest=stripped.replace(new RegExp(`^\\*{0,2}${detected}\\*{0,2}[\\s:\\-–—]*`,'i'),'').trim();let confidence='moderate';if(/high.*?conf|strong.*?setup|a\+|best/i.test(rest))confidence='high';else if(/low.*?conf|specul|risky/i.test(rest))confidence='low';let setupType='long';if(/break(out)?/i.test(rest))setupType='breakout';else if(/pullback|dip/i.test(rest))setupType='pullback';else if(/momentum/i.test(rest))setupType='momentum';else if(/reversal/i.test(rest))setupType='reversal';cur={ticker:detected,setupType,confidence,whyStrong:rest,trigger:'',macroAlignment:[],sectorAlignment:tbInferSector(detected)};} else if(cur){const clean=stripped.replace(/\*\*/g,'').trim();if(/confirm|trigger/i.test(line)&&!cur.trigger)cur.trigger=clean.slice(0,200);else if(!cur.whyStrong&&clean.length>5)cur.whyStrong=clean.slice(0,200);}}if(cur)setups.push(cur);return setups.filter(s=>s.ticker);}
function tbParseTiers(text){const tiers={};if(!text)return tiers;const re=/([SABCD][- ]?Tier)[:\s]+(.+)/gi;let m;while((m=re.exec(text))!==null)tiers[m[1].trim()]=m[2].trim().slice(0,200);return tiers;}
function tbParseGeoRisk(text){const src=text||'';const bullets=tbExtractBullets(src);let level='moderate';if(/escalat|strike|war|attack|conflict/i.test(src))level='elevated';if(/major.*?escalat|direct.*?war|military.*?action/i.test(src))level='high';if(/de[- ]?escalat|ceasefire|negotiat/i.test(src))level='low';return{level,summary:(bullets[0]||'').slice(0,200),bullets:bullets.slice(0,8)};}

function tbParseReport(raw){
  if(!raw||raw.trim().length<20)return null;
  const state=createEmptyMarketState();
  state._raw=raw;state._parsedAt=new Date().toISOString();
  const rawSecs=tbSplitSections(raw);const sectionMap={};
  for(const sec of rawSecs){const body=sec.lines.join('\n');const key=tbMatchSectionKey(sec.header,body);if(key){if(!sectionMap[key])sectionMap[key]={header:sec.header,text:body};else sectionMap[key].text+='\n'+body;}}
  state._rawSections=sectionMap;
  state.indices=tbParseIndices(raw);state.vix=tbParseVix(raw);state.yields=tbParseYields(raw);state.oil=tbParseOil(raw);
  const goSrc=(sectionMap.goNogo?sectionMap.goNogo.text+'\n':'')+raw.slice(0,3000);
  const gn=tbParseGoNogo(goSrc);state.goNoGo=gn.signal;state.goNoGoReason=gn.reason;
  const biasSrc=(sectionMap.marketBias?sectionMap.marketBias.text+'\n':'')+raw.slice(0,3000);
  const bd=tbParseBias(biasSrc);state.marketBias=bd.bias;state.riskCondition=bd.condition;state.marketRegime=bd.bias;
  if(sectionMap.sectorStrength){const{strong,weak}=tbParseSectors(sectionMap.sectorStrength.text);state.strongestSectors=strong;state.weakestSectors=weak;}
  state.geopoliticalRisk=tbParseGeoRisk(sectionMap.geopolitics?.text);
  if(sectionMap.trump)state.trumpStatements={summary:'',bullets:tbExtractBullets(sectionMap.trump.text).slice(0,8)};
  if(sectionMap.centralBanks)state.centralBanks={summary:'',bullets:tbExtractBullets(sectionMap.centralBanks.text).slice(0,8)};
  if(sectionMap.economicEvents)state.economicEvents={summary:'',bullets:tbExtractBullets(sectionMap.economicEvents.text).slice(0,8)};
  if(sectionMap.macroDrivers)state.macroDrivers=tbExtractBullets(sectionMap.macroDrivers.text).slice(0,12);
  state.watchlist=tbParseWatchlist(sectionMap.watchlist?.text,raw);
  state.tradeSetups=tbParseSetups(sectionMap.tradeSetups?.text);
  state.riskWarnings=tbExtractBullets(sectionMap.whatNotToDo?.text||'').slice(0,5);
  state.tierList=tbParseTiers(sectionMap.tierList?.text||'');
  if(sectionMap.marketSnapshot)state.summary=sectionMap.marketSnapshot.text.trim().slice(0,400);
  return state;
}

/* ── Markdown renderer ── */
function tbRenderMarkdown(text){
  if(!text)return[];
  const lines=text.split('\n');const nodes=[];let i=0;
  while(i<lines.length){
    const line=lines[i];
    if(/^### /.test(line)){nodes.push({type:'h3',text:line.replace(/^###\s*/,'')});i++;continue;}
    if(/^## /.test(line)){nodes.push({type:'h2',text:line.replace(/^##\s*/,'')});i++;continue;}
    if(/^# /.test(line)){nodes.push({type:'h1',text:line.replace(/^#\s*/,'')});i++;continue;}
    if(/^\*\*[^*]+\*\*\s*$/.test(line.trim())){nodes.push({type:'h3',text:line.trim().replace(/\*\*/g,'')});i++;continue;}
    if(/^---+$/.test(line.trim())){nodes.push({type:'hr'});i++;continue;}
    if(/^[\s]*[-•*○▪]\s/.test(line)){nodes.push({type:'li',text:line.replace(/^[\s]*[-•*○▪]\s*/,'')});i++;continue;}
    if(!line.trim()){i++;continue;}
    nodes.push({type:'p',text:line});i++;
  }
  return nodes;
}
function tbInlineFormat(text){return text.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code>$1</code>');}
function TBMarkdownBlock({text,style}){
  const nodes=tbRenderMarkdown(text);
  return(<div className="tb-md-block" style={style}>{nodes.map((n,i)=>{
    if(n.type==='hr')return<hr key={i}/>;
    if(n.type==='h1')return<h1 key={i} dangerouslySetInnerHTML={{__html:tbInlineFormat(n.text)}}/>;
    if(n.type==='h2')return<h2 key={i} dangerouslySetInnerHTML={{__html:tbInlineFormat(n.text)}}/>;
    if(n.type==='h3')return<h3 key={i} dangerouslySetInnerHTML={{__html:tbInlineFormat(n.text)}}/>;
    if(n.type==='li')return<div key={i} style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:5}}><span style={{color:'var(--ac)',flexShrink:0,marginTop:3,fontSize:12}}>▸</span><span dangerouslySetInnerHTML={{__html:tbInlineFormat(n.text)}} style={{fontSize:14,color:'var(--txd)',lineHeight:1.8,fontFamily:'Lora,serif'}}/></div>;
    return<p key={i} dangerouslySetInnerHTML={{__html:tbInlineFormat(n.text)}}/>;
  })}</div>);
}
