/* ── Firebase-backed journal hook ── */
function useTBJournal(){
  const [trades,setTrades]=useState([]);
  const [loading,setLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);

  /* Load all trades from Firebase on mount */
  const load=useCallback(async()=>{
    setLoading(true);
    try{
      if(window._fbLoadTBJournal){
        const data=await window._fbLoadTBJournal();
        if(data&&Array.isArray(data))setTrades(data);
      }
    }catch(e){console.warn('TB journal load error',e);}
    setLoading(false);
  },[]);

  useEffect(()=>{
    if(window._fbReady)load();
    else{const h=()=>load();window.addEventListener('fb-ready',h,{once:true});return()=>window.removeEventListener('fb-ready',h);}
  },[load]);

  /* Live sync: apply remote journal changes from other devices.
     Also force a fresh server load if we haven't seen this savedAt before — this
     handles Firestore returning a stale local cache on mobile before the server
     write arrives, which caused Re-merge on desktop to not reflect on phone. */
  const lastSeenSavedAt=useRef(0);
  useEffect(()=>{
    const onRemote=(e)=>{
      if(!e.detail||!Array.isArray(e.detail))return;
      const incoming=e.detail;
      setTrades(incoming);
    };
    window.addEventListener('fb-tb-journal-remote',onRemote);
    return()=>window.removeEventListener('fb-tb-journal-remote',onRemote);
  },[load]);

  /* Webull auto-sync: pull from Cloudflare Worker, merge into state + Firebase.
     SELLs chain as new legs onto the most-recent open BUY entry for the same
     ticker instead of creating a separate top-level entry. */
  const sync=useCallback(async()=>{
    setSyncing(true);
    window._tbBuildUntil=Date.now()+120000; // keep Firestore alive through sync write
    try{
      const r=await fetch(`${TB_API_BASE}/api/journal/sync?t=${Date.now()}`,{method:'POST',cache:'no-store'});
      const j=await r.json();
      console.log('[TradeBoard] journal/sync returned',Array.isArray(j.data)?j.data.length:0,'orders');
      if(j.ok&&Array.isArray(j.data)){

        setTrades(prev=>{
          /* Mutable map: entry id → entry (deep-copy legs so we can push) */
          const map=new Map(prev.map(t=>[t.id,{...t,legs:[...(t.legs||[])]}]));
          /* Dedup keys. Webull orders carry a _wbId; but worker IDs can drift
             between syncs, so we ALSO key every existing leg by a content
             fingerprint (ticker|action|minute|qty|price). A pull is skipped if
             EITHER its _wbId or its content already exists — this is what stops
             the every-sync re-duplication and pre-API orphan reappearance.
             Trade-off: two genuinely identical fills in the same minute (same
             qty+price+side) would collapse to one — vanishingly rare in practice. */
          const fpOf=(tk,l)=>{const p=n=>{const x=parseFloat(n);return isNaN(x)?0:x;};return (tk||'').toUpperCase()+'|'+(l.action||'')+'|'+String(l.datetime||'').slice(0,16)+'|'+p(l.qty)+'|'+p(l.price);};
          const absorbedWb=new Set();       /* 'wb:'+_wbId */
          const absorbedContent=new Set();  /* content fp of EVERY existing leg */
          map.forEach(entry=>{const tk=entry.ticker;(entry.legs||[]).forEach(l=>{if(l._wbId)absorbedWb.add('wb:'+l._wbId);absorbedContent.add(fpOf(tk,l));});});
          /* Find the most-recent OPEN entry for a ticker (buyQty > sellQty, not CLOSED) */
          const findOpenEntry=ticker=>{
            let best=null;
            map.forEach(entry=>{
              if((entry.ticker||'').toUpperCase()!==ticker.toUpperCase())return;
              const legs=entry.legs||[];
              const bq=legs.filter(l=>l.action==='BUY').reduce((s,l)=>s+(parseFloat(l.qty)||0),0);
              const sq=legs.filter(l=>l.action==='SELL').reduce((s,l)=>s+(parseFloat(l.qty)||0),0);
              if(bq>sq&&entry.status!=='CLOSED'){
                if(!best||(entry.createdAt||0)>(best.createdAt||0))best=entry;
              }
            });
            return best;
          };
          /* Process in chronological order so BUYs land before same-day SELLs */
          const wbTs=r=>r.filledAt||r.filledTime||r.tradeTime||r.orderTime||r.createTime||r.datetime||r.date||0;
          const sorted=[...j.data].sort((a,b)=>new Date(wbTs(a))-new Date(wbTs(b)));
          const toSave=new Map(); /* entry id → entry — collect all mutations, save once */


          sorted.forEach(raw=>{
            const wbId=String(raw.id||raw.orderId||raw.fillId||(raw.ticker+(raw.date||raw.datetime||raw.filledAt||'')));
            if(absorbedWb.has('wb:'+wbId))return;
            const action=(raw.side||raw.action||'BUY').toUpperCase();
            const ticker=(raw.ticker||raw.symbol||'').toUpperCase();
            /* ── Webull field aliases ─────────────────────────────────────────
               datetime: filledAt | filledTime | tradeTime | orderTime | createTime | date | datetime
               qty:      filled   | filledQty  | filledQuantity | leavesQuantity | qty
               price:    avgFilledPrice | avgFill | avgPrice | fillPrice | limitPrice | price
               fee:      totalCommission | commission | fee | charges
               ─────────────────────────────────────────────────────────────── */
            const rawDatetime=
              raw.date||raw.datetime||raw.filledAt||raw.filledTime||
              raw.tradeTime||raw.orderTime||raw.createTime||null;
            /* Webull timestamps can be epoch-ms numbers */
            const resolvedDatetime=rawDatetime
              ?( typeof rawDatetime==='number'
                  ? new Date(rawDatetime).toISOString()
                  : String(rawDatetime) )
              : new Date().toISOString();
            const rawQty=raw.qty??raw.filled??raw.filledQty??raw.filledQuantity??'';
            const rawPrice=raw.avgFill??raw.avgFilledPrice??raw.avgPrice??raw.price??raw.limitPrice??'';
            /* Webull API fee fields — covers all known variants from webull-api-client and custom workers:
               totalCommission (official), commission, fee, charges, secFee, tafFee,
               regulatory_fee, platform_fee, broker_fee, fees (object with .total),
               order_fee, trade_fee, transaction_fee */
            const rawFee=(()=>{
              /* commission confirmed as fee field; Webull is commission-free so =0.
               SEC/TAF regulatory fees are not included in this endpoint's data. */
            const candidates=[
                raw.commission,raw.totalCommission,raw.total_commission,
                raw.fee,raw.totalFee,raw.total_fee,
                raw.secFee,raw.tafFee,raw.commissionFee,
                raw.fees?.total??raw.fees,
                raw.charges,raw.brokerFee,raw.orderFee,
              ];
              for(const c of candidates){
                const n=parseFloat(c);
                if(c!==undefined&&c!==null&&c!==''&&!isNaN(n)&&n>0)return n;
              }
              return 0;
            })();

            const newLeg={
              id:tbUuid(),
              _wbId:wbId,
              action,
              datetime:tbToLocalDT(resolvedDatetime),
              qty:String(rawQty),
              price:String(rawPrice),
              fee:rawFee!==0?String(rawFee):'0',
            };
            absorbedWb.add('wb:'+wbId);
            /* Already present (any source / any prior sync)? Skip — no dup. */
            const _cfp=fpOf(ticker,newLeg);
            if(absorbedContent.has(_cfp))return;
            absorbedContent.add(_cfp);
            /* Position grouping: attach BOTH buys and sells to the current open
               position for this ticker. A position opens on the first buy while
               flat and stays open until cumulative SELL qty >= cumulative BUY qty.
               This lets scale-ins (extra buys) and scale-outs (partial sells)
               merge into ONE trade instead of fragmenting per order. */
            const open=findOpenEntry(ticker);
            if(open){
              open.legs=[...open.legs,newLeg];
              const bq=open.legs.filter(l=>l.action==='BUY').reduce((s,l)=>s+(parseFloat(l.qty)||0),0);
              const sq=open.legs.filter(l=>l.action==='SELL').reduce((s,l)=>s+(parseFloat(l.qty)||0),0);
              open.status=(bq>0&&sq>=bq)?'CLOSED':'OPEN';
              map.set(open.id,open);
              toSave.set(open.id,open);
              return;
            }
            /* No open position. A BUY opens a new one; a stray SELL with no
               matching long becomes its own closed entry. */
            const entryId=tbUuid();
            const entry={
              id:entryId,
              ticker,
              market:raw.market||raw.assetType||'STOCK',
              createdAt:new Date(resolvedDatetime).getTime()||Date.now(),
              source:'webull',
              legs:[newLeg],
              notes:'',
              status:action==='BUY'?'OPEN':'CLOSED',
            };
            map.set(entryId,entry);
            toSave.set(entryId,entry);
          });
          /* Reconcile the WHOLE journal: dedup + regroup all webull legs so the
             output is always clean, then atomically replace the Firebase doc so
             FB exactly matches local (drops any stale/duplicate docs from earlier
             broken syncs) and every device receives it in one snapshot. */
          const merged=[...map.values()];
          const {others,rebuilt}=tbReconcileWebull(merged);
          const finalTrades=[...others,...rebuilt].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
          const finalIds=new Set(finalTrades.map(t=>t.id));
          const staleIds=prev.map(t=>t.id).filter(id=>!finalIds.has(id));
          if(window._fbReplaceTBTrades)window._fbReplaceTBTrades(staleIds,finalTrades);
          else if(window._fbSaveTBTradeBulk)window._fbSaveTBTradeBulk(finalTrades);
          return finalTrades;
        });
      }
    }catch(e){console.warn('TB Webull sync error (server may be offline)',e);}
    /* Record sync timestamp in localStorage + Firebase so all devices know */
    const nowTs=Date.now();
    localStorage.setItem(TB_SYNC_TS_KEY,String(nowTs));
    if(window._fbSaveTBSyncMeta)window._fbSaveTBSyncMeta({lastWebullSync:nowTs});
    window._tbBuildUntil=0;
    setSyncing(false);
  },[]);

  /* Manual add — tagged source:'manual', saved to Firebase */
  const add=useCallback(async(fields)=>{
    const trade={...fields,id:fields.id||tbUuid(),createdAt:Date.now(),source:'manual'};
    setTrades(prev=>[trade,...prev]);
    if(window._fbSaveTBTrade)window._fbSaveTBTrade(trade);
    return{ok:true,data:trade};
  },[]);

  /* Edit — updates Firebase */
  const patch=useCallback(async(id,fields)=>{
    let updated=null;
    setTrades(prev=>prev.map(t=>{if(t.id!==id)return t;updated={...t,...fields,id};return updated;}));
    if(updated&&window._fbSaveTBTrade)window._fbSaveTBTrade(updated);
    return{ok:true,data:updated};
  },[]);

  /* Delete — removes from Firebase */
  const del=useCallback(async(id)=>{
    setTrades(prev=>prev.filter(t=>t.id!==id));
    if(window._fbDeleteTBTrade)window._fbDeleteTBTrade(id);
  },[]);

  /* Bulk delete — single state update so all IDs are removed atomically */
  const delBulk=useCallback(async(ids)=>{
    const idSet=new Set(ids);
    setTrades(prev=>prev.filter(t=>!idSet.has(t.id)));
    /* Fire all deletes in parallel */
    if(window._fbDeleteTBTrade)await Promise.all(ids.map(id=>window._fbDeleteTBTrade(id)));
  },[]);

  /* Re-merge: same reconciliation Webull Sync now runs — dedup + FIFO regroup of
     all webull legs. Manual/CSV trades untouched. Kept as a manual button for
     one-off cleanups, but routine syncs already self-heal. */
  const rebuild=useCallback(async()=>{
    let removed=0,made=0,oldIds=[],rebuilt=[];
    setTrades(prev=>{
      const r=tbReconcileWebull(prev);
      rebuilt=r.rebuilt;oldIds=r.oldWebullIds;removed=oldIds.length;made=rebuilt.length;
      return [...r.others,...rebuilt].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    });
    /* Persist atomically: one updateDoc drops stale webull docs AND writes the
       merged ones, so every device gets the cleaned journal in a single snapshot. */
    if(window._fbReplaceTBTrades){
      await window._fbReplaceTBTrades(oldIds,rebuilt);
    }else{
      if(window._fbDeleteTBTrade)await Promise.all(oldIds.map(id=>window._fbDeleteTBTrade(id)));
      if(window._fbSaveTBTradeBulk)await window._fbSaveTBTradeBulk(rebuilt);
    }
    return{ok:true,removed,made};
  },[]);

  /* Auto-sync: only runs on the "main" device (td6_mainDash==='tony') so phones
     never trigger an independent sync that races with desktop and causes dupes. */
  useEffect(()=>{
    if(localStorage.getItem('td6_mainDash')!=='tony')return; /* non-main: skip */
    const doAutoSync=async()=>{
      try{
        const last=parseInt(localStorage.getItem(TB_SYNC_TS_KEY)||'0',10);
        if(Date.now()-last<86400000)return; /* <24h ago, skip */
        await sync();
        const now=Date.now();
        localStorage.setItem(TB_SYNC_TS_KEY,String(now));
        if(window._fbSaveTBSyncMeta)window._fbSaveTBSyncMeta({lastWebullSync:now});
      }catch(e){console.warn('TB auto-sync failed',e);}
    };
    const tryOnce=()=>{if(!window._fbReady){window.addEventListener('fb-ready',tryOnce,{once:true});return;}doAutoSync();};
    tryOnce();
  },[]); // eslint-disable-line react-hooks/exhaustive-deps

  /* CSV import (Stonk Journal format) — dedup by ticker+date+entryPrice+qty */
  const importCSV=useCallback(async(csvText)=>{
    /* ── parse ── */
    const parseMoney=s=>{if(!s)return 0;return parseFloat(String(s).replace(/[$,]/g,''))||0;};
    const lines=csvText.split('\n').map(l=>l.trim()).filter(Boolean);
    if(!lines.length)return{ok:false,error:'Empty file'};
    /* Parse CSV respecting quoted fields */
    const parseRow=line=>{const cols=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){cols.push(cur);cur='';}else cur+=c;}cols.push(cur);return cols;};
    const headers=parseRow(lines[0]).map(h=>h.trim().toLowerCase());
    const col=name=>{const i=headers.indexOf(name);return i>=0?i:-1;};
    const iDate=col('date'),iTime=col('time'),iSym=col('symbol'),iMkt=col('market');
    const iStatus=col('status'),iSide=col('side'),iQty=col('qty');
    const iEntry=col('entry'),iExit=col('exit'),iEntTot=col('ent tot'),iExtTot=col('ext tot');
    const iHold=col('hold'),iReturn=col('return'),iTags=col('tags'),iNotes=col('notes');

    const newEntries=[];
    for(let i=1;i<lines.length;i++){
      const row=parseRow(lines[i]);
      const g=idx=>idx>=0?(row[idx]||'').trim():'';
      const dateStr=g(iDate); /* M/D/YYYY — this is the SELL/close date in Stonk Journal */
      const timeStr=g(iTime)||'09:30';
      const symbol=(g(iSym)||'').toUpperCase();
      const market=g(iMkt)||'STOCK';
      const status=(g(iStatus)||'').toUpperCase(); /* WIN|LOSS */
      const side=(g(iSide)||'LONG').toUpperCase();
      const qty=parseFloat(g(iQty))||0;
      const entryPrice=parseMoney(g(iEntry));
      const exitPrice=parseMoney(g(iExit));
      const entTot=parseMoney(g(iEntTot))||entryPrice*qty;
      const extTot=parseMoney(g(iExtTot))||exitPrice*qty;
      const holdStr=g(iHold); /* "6 DAYS", "15 MIN", "1 DAY" etc */
      const netPnL=parseMoney(g(iReturn));
      const tags=g(iTags)?g(iTags).split(',').map(t=>t.trim()).filter(Boolean):[];
      const notes=g(iNotes)||'';
      if(!symbol||!dateStr)continue;

      /* CSV Date+Time = SELL date. Parse it first, then subtract hold to get buy date. */
      const parseHoldMs=h=>{if(!h||h==='-')return 0;const m=h.match(/(\d+)\s*(MIN|HR|DAY|DAYS|WEEK|WEEKS)/i);if(!m)return 0;const n=parseInt(m[1]);const u=(m[2]||'').toUpperCase();if(u==='MIN')return n*60000;if(u==='HR')return n*3600000;if(u==='DAY'||u==='DAYS')return n*86400000;if(u==='WEEK'||u==='WEEKS')return n*7*86400000;return 0;};
      const [mm,dd,yyyy]=(dateStr.split('/')||[]);
      const sellDT=yyyy?`${yyyy}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}T${timeStr}`:'';
      const sellMs=sellDT?new Date(sellDT).getTime():0;
      const holdMs=parseHoldMs(holdStr);
      /* Buy date = sell date minus hold duration. If no hold info, use same date. */
      const buyMs=sellMs&&holdMs?sellMs-holdMs:sellMs;
      const buyDT=buyMs?tbToLocalDT(buyMs):(sellDT||'');

      const buyLeg={id:tbUuid(),_csvImport:true,action:'BUY',datetime:buyDT,qty:String(qty),price:String(entryPrice),fee:'0'};
      const legs=[buyLeg];
      /* Always add SELL leg if we have an exit price */
      if(exitPrice>0){
        const sellLeg={id:tbUuid(),_csvImport:true,action:'SELL',datetime:sellDT,qty:String(qty),price:String(exitPrice),fee:'0'};
        legs.push(sellLeg);
      }
      const entryId=tbUuid();
      newEntries.push({
        id:entryId,
        ticker:symbol,
        market,
        createdAt:buyMs||Date.now(),
        source:'csv',
        legs,
        status:exitPrice>0?'CLOSED':'OPEN',
        netPnL:netPnL!==0?netPnL:null, /* use Stonk Journal's computed P&L */
        setupType:'',
        tags,
        notes,
        direction:side==='SHORT'?'SHORT':'LONG',
      });
    }
    if(!newEntries.length)return{ok:true,added:0,skipped:lines.length-1};
    setTrades(prev=>[...newEntries,...prev].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)));
    if(window._fbSaveTBTradeBulk)await window._fbSaveTBTradeBulk(newEntries);
    else if(window._fbSaveTBTrade)newEntries.forEach(e=>window._fbSaveTBTrade(e));
    return{ok:true,added:newEntries.length,skipped:0};
  },[]);

  return{trades,loading,syncing,load,sync,add,patch,del,delBulk,importCSV,rebuild};
}

function tbUuid(){return([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));}

/* ── Group a flat, chronologically-sorted leg list for ONE ticker into position
   entries. A position opens on the first leg while flat and closes once cumulative
   SELL qty >= cumulative BUY qty (bq>0). Scale-ins/scale-outs stay in one entry.
   Original leg objects are reused so _wbId dedup keys survive a rebuild. ── */
function tbGroupLegsIntoPositions(ticker,legs,meta){
  const p=n=>{const x=parseFloat(n);return isNaN(x)?0:x;};
  const out=[];let cur=null,bq=0,sq=0;
  legs.forEach(leg=>{
    if(!cur){cur={id:tbUuid(),ticker,market:(meta&&meta.market)||'STOCK',createdAt:new Date(leg.datetime).getTime()||Date.now(),source:'webull',legs:[],notes:'',status:'OPEN'};bq=0;sq=0;}
    cur.legs.push(leg);
    if(leg.action==='SELL')sq+=p(leg.qty);else bq+=p(leg.qty);
    if(bq>0&&sq>=bq){cur.status='CLOSED';out.push(cur);cur=null;}
  });
  if(cur){cur.status='OPEN';out.push(cur);}
  return out;
}

/* ── Reconcile an entire trade list: leave manual/CSV trades alone; take ALL
   webull legs, dedup them (by _wbId, else content fingerprint), and regroup
   per ticker into clean FIFO positions. Returns the clean webull entries, the
   untouched others, and the ids of the old webull entries that were replaced.
   Used by BOTH Webull Sync and Re-merge so they always produce identical,
   duplicate-free output. ── */
function tbReconcileWebull(trades){
  const webull=trades.filter(t=>t.source==='webull');
  const others=trades.filter(t=>t.source!=='webull');
  const byTicker=new Map();const seen=new Set();
  webull.forEach(t=>{
    const tk=(t.ticker||'').toUpperCase();
    if(!byTicker.has(tk))byTicker.set(tk,{market:t.market||'STOCK',legs:[]});
    (t.legs||[]).forEach(l=>{
      const p=n=>{const x=parseFloat(n);return isNaN(x)?0:x;};
      const k=l._wbId?('wb:'+l._wbId):(tk+'|'+(l.action||'')+'|'+String(l.datetime||'').slice(0,16)+'|'+p(l.qty)+'|'+p(l.price));
      if(seen.has(k))return;seen.add(k);
      byTicker.get(tk).legs.push(l);
    });
  });
  const rebuilt=[];
  byTicker.forEach((v,tk)=>{
    const sorted=[...v.legs].sort((a,b)=>new Date(a.datetime)-new Date(b.datetime));
    tbGroupLegsIntoPositions(tk,sorted,{market:v.market}).forEach(e=>rebuilt.push(e));
  });
  return {others,rebuilt,oldWebullIds:webull.map(t=>t.id)};
}

/* ── Trade stats computer ── */
/* ── Normalize any datetime value → 'YYYY-MM-DDThh:mm' for datetime-local inputs ── */
function tbToLocalDT(raw){
  if(!raw)return '';
  const d=typeof raw==='number'?new Date(raw):new Date(raw);
  if(isNaN(d.getTime()))return typeof raw==='string'?raw.slice(0,16):'';
  // Format in local time (not UTC) so datetime-local input shows correctly
  const pad=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());
}

function tbComputeTradeStats(entry){
  const legs=entry.legs||[];
  const p=n=>{const x=parseFloat(n);return isNaN(x)?0:x;};
  if(!legs.length){
    const side=(entry.side||'BUY').toUpperCase();const qty=p(entry.qty);const avgFill=p(entry.avgFill);const gross=qty*avgFill;const isSell=side==='SELL';
    const status=entry.status||(isSell?'CLOSED':'OPEN');const netPnL=entry.netPnL!=null?entry.netPnL:null;
    return{status,entryTotal:isSell?0:gross,exitTotal:isSell?gross:0,avgEntry:isSell?0:avgFill,avgExit:isSell?avgFill:0,netPnL,pnlPct:null,holdTime:null,buyQty:isSell?0:qty};
  }
  const buys=legs.filter(l=>l.action==='BUY');const sells=legs.filter(l=>l.action==='SELL');
  const totalFees=legs.reduce((s,l)=>s+p(l.fee),0);
  const entryTotal=buys.reduce((s,l)=>s+p(l.price)*p(l.qty),0);const exitTotal=sells.reduce((s,l)=>s+p(l.price)*p(l.qty),0);
  const buyQty=buys.reduce((s,l)=>s+p(l.qty),0);const sellQty=sells.reduce((s,l)=>s+p(l.qty),0);
  const avgEntry=buyQty?entryTotal/buyQty:0;const avgExit=sellQty?exitTotal/sellQty:0;
  const hasExit=sells.length>0;const rawPnL=hasExit?exitTotal-entryTotal:null;
  const netPnL=entry.netPnL!=null?parseFloat(entry.netPnL):(rawPnL!=null?rawPnL-totalFees:null);
  const costBasis=entryTotal+totalFees;
  const pnlPct=costBasis>0&&netPnL!=null?(netPnL/costBasis)*100:null;
  let holdTime=null;
  const bd=buys.map(l=>new Date(l.datetime)).filter(d=>!isNaN(d.getTime()));
  const sd=sells.map(l=>new Date(l.datetime)).filter(d=>!isNaN(d.getTime()));
  if(bd.length&&sd.length){const diff=Math.max(...sd)-Math.min(...bd);const mins=Math.floor(diff/60000);holdTime=mins<60?`${mins} MIN`:mins<1440?`${Math.round(mins/60)} HR`:`${Math.round(mins/1440)} DAYS`;}
  const status=entry.status||(hasExit?'CLOSED':'OPEN');
  return{status,entryTotal,exitTotal,avgEntry,avgExit,netPnL,pnlPct,holdTime,buyQty,totalFees};
}

/* ── Portfolio hook (Webull, Cloudflare) ── */
/* Module-level cache so the portfolio survives tab switches (component remounts)
   and is NOT re-fetched every time the tab is reopened. Fetches once per page
   load; after that, revisiting the tab shows the last data. Manual Refresh
   (and a hard page reload) still pull fresh. */
let _tbPortfolioCache={data:null,lastFetch:null,error:null,fetched:false};
function useTBPortfolio(){
  const [data,setData]=useState(_tbPortfolioCache.data);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(_tbPortfolioCache.error);
  const [lastFetch,setLastFetch]=useState(_tbPortfolioCache.lastFetch);
  const inFlight=useRef(false);
  const refresh=useCallback(async()=>{
    if(inFlight.current)return; // guard: no concurrent fetches
    inFlight.current=true;
    setLoading(true);setError(null);
    try{
      const r=await fetch(`${TB_API_BASE}/api/portfolio/summary`);
      if(!r.ok)throw new Error(`HTTP ${r.status}`);
      const j=await r.json();
      if(j.ok){const lf=new Date();setData(j.data);setLastFetch(lf);_tbPortfolioCache.data=j.data;_tbPortfolioCache.lastFetch=lf;_tbPortfolioCache.error=null;if(window._tbSetPortfolioOk)window._tbSetPortfolioOk(true);}
      else{setError(j.error||'Portfolio error');_tbPortfolioCache.error=j.error||'Portfolio error';if(window._tbSetPortfolioOk)window._tbSetPortfolioOk(false);}
    }
    catch(e){setError(e.message||'Cannot reach Webull API.');_tbPortfolioCache.error=e.message||'Cannot reach Webull API.';if(window._tbSetPortfolioOk)window._tbSetPortfolioOk(false);}
    finally{setLoading(false);inFlight.current=false;_tbPortfolioCache.fetched=true;}
  },[]);
  // Fetch ONCE per page load. On later tab revisits we already have cached data,
  // so we just show it — no auto-refresh, no polling interval.
  useEffect(()=>{
    if(!_tbPortfolioCache.fetched){_tbPortfolioCache.fetched=true;refresh();}
  },[]); // eslint-disable-line react-hooks/exhaustive-deps
  return{data,loading,error,lastFetch,refresh};
}

/* ── Computed bar ── */
function TBComputedBar({label,value,color,unit=''}){
  return(<div style={{marginBottom:12}}>
    <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
      <span style={{fontSize:13,color:'var(--txm)',fontWeight:700}}>{label}</span>
      <span style={{fontSize:11,fontFamily:'IBM Plex Mono,monospace',color,fontWeight:700}}>{value}{unit}</span>
    </div>
    <div className="tb-computed-bar"><div className="tb-computed-bar-fill" style={{width:`${value}%`,background:color}}/></div>
  </div>);
}

/* ── Journal stats bar ── */
function TBJournalStats({trades,activeFilter,onFilterChange}){
  const s=useMemo(()=>{
    let wins=0,losses=0,open=0,wash=0,totalPnL=0,winSum=0,lossSum=0;
    trades.forEach(t=>{const st=tbComputeTradeStats(t);if(st.status==='OPEN'){open++;return;}if(st.netPnL==null)return;totalPnL+=st.netPnL;if(st.netPnL>0){wins++;winSum+=st.netPnL;}else if(st.netPnL<0){losses++;lossSum+=st.netPnL;}else wash++;});
    const total=wins+losses;
    return{wins,losses,open,wash,totalPnL,avgWin:wins?winSum/wins:0,avgLoss:losses?lossSum/losses:0,winRate:total?Math.round(wins/total*100):0};
  },[trades]);
  const C=({label,val,sub,col,fk})=>{const active=fk&&activeFilter===fk;return(<div onClick={fk?()=>onFilterChange&&onFilterChange(active?'ALL':fk):undefined} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'10px 18px',background:active?'rgba(224,96,122,0.13)':'var(--s2)',borderRadius:10,border:active?'1px solid var(--ac)':'1px solid var(--bd)',minWidth:72,cursor:fk?'pointer':'default',transition:'all .15s'}}>
    <div style={{fontSize:11,color:active?'var(--ac)':'var(--txm)',fontWeight:800,textTransform:'uppercase',letterSpacing:1}}>{label}</div>
    <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:20,fontWeight:800,color:col||'var(--tx)'}}>{val}</div>
    {sub&&<div style={{fontSize:10,color:'var(--txm)'}}>{sub}</div>}
  </div>);};
  return(<div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
    <C label="Wins" val={s.wins} col="var(--tbb)" sub={`${s.winRate}%`} fk="WIN"/>
    <C label="Losses" val={s.losses} col="var(--tbr)" sub={s.losses?`${100-s.winRate}%`:'0%'} fk="LOSS"/>
    <C label="Open" val={s.open} col="var(--tbw)" fk="OPEN"/>
    <C label="Wash" val={s.wash} col="var(--txm)" fk="WASH"/>
    <C label="Avg W" val={s.avgWin?tbFmt$(s.avgWin):'—'} col="var(--tbb)"/>
    <C label="Avg L" val={s.avgLoss?tbFmt$(s.avgLoss):'—'} col="var(--tbr)"/>
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'10px 22px',background:(s.wins+s.losses)===0?'var(--s2)':s.totalPnL>0?'rgba(74,222,128,0.08)':s.totalPnL<0?'rgba(248,113,113,0.08)':'var(--s2)',borderRadius:10,border:`1px solid ${(s.wins+s.losses)===0?'var(--bd)':s.totalPnL>0?'rgba(74,222,128,0.25)':s.totalPnL<0?'rgba(248,113,113,0.25)':'var(--bd)'}`,minWidth:80}}>
      <div style={{fontSize:10,color:'var(--txm)',fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>Net P&L</div>
      <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:18,fontWeight:800,color:(s.wins+s.losses)===0?'var(--txm)':tbPnlCol(s.totalPnL)}}>{(s.wins+s.losses)===0?'—':tbFmt$(s.totalPnL)}</div>
    </div>
  </div>);
}

/* ── Trade modal form ── */
const TB_SETUP_TYPES=['','Breakout','Pullback','Momentum','Reversal','Gap Up','Gap Down','VWAP Reclaim','Support Bounce','Resistance Break','Earnings','News Play','Scalp','Swing','Other'];
const TB_TIMEFRAMES=['','1m','5m','15m','30m','1H','4H','1D','1W'];
const TB_MARKETS=['STOCK','OPTION','CRYPTO','FOREX','FUTURES'];
const TB_IS={background:'var(--s2)',border:'1.5px solid var(--bd)',borderRadius:8,color:'var(--tx)',fontSize:13,padding:'7px 10px',outline:'none',width:'100%'};
const TB_SS={...TB_IS,cursor:'pointer'};
const TB_LS={fontSize:10,fontWeight:800,color:'var(--txm)',textTransform:'uppercase',letterSpacing:1,marginBottom:3,display:'block'};

function TBTradeModal({entry,onClose,onSave,onDel}){
  const isEdit=!!entry;
  const isMobile=useIsMobile();
  const [tab,setTab]=useState('general');
  const [market,setMarket]=useState(entry?.market||'STOCK');
  const [symbol,setSymbol]=useState(entry?.ticker||'');
  const [direction,setDir]=useState(entry?.direction||'LONG');
  const [target,setTarget]=useState(entry?.target||'');
  const [stopLoss,setStop]=useState(entry?.stopLoss||'');
  const [legs,setLegs]=useState(()=>{
    if(entry?.legs?.length)return entry.legs.map(l=>({...l,id:l.id||tbUuid(),datetime:tbToLocalDT(l.datetime)}));
    return[{id:tbUuid(),action:'BUY',datetime:new Date().toISOString().slice(0,16),qty:'1',price:'',fee:''}];
  });
  const [setupType,setSetup]=useState(entry?.setupType||'');
  const [timeframe,setTF]=useState(entry?.timeframe||'');
  const [confidence,setConf]=useState(entry?.confidence||0);
  const [tags,setTags]=useState((entry?.tags||[]).join(', '));
  const [notes,setNotes]=useState(entry?.notes||'');
  const [netPnL,setNetPnL]=useState(entry?.netPnL!=null?String(entry.netPnL):'');
  const [saving,setSaving]=useState(false);const [confirm,setConfirm]=useState(false);const [err,setErr]=useState('');

  /* Hide global tony-app-nav while modal open — prevents overlap on both desktop+mobile */
  useEffect(()=>{
    const nav=document.getElementById('tony-app-nav');
    const prevNav=nav?nav.style.display:null;
    if(nav)nav.style.display='none';
    return()=>{if(nav&&prevNav!==null)nav.style.display=prevNav;};
  },[]);

  const addLeg=()=>setLegs(p=>[...p,{id:tbUuid(),action:'BUY',datetime:new Date().toISOString().slice(0,16),qty:'1',price:'',fee:''}]);
  const removeLeg=id=>setLegs(p=>p.filter(l=>l.id!==id));
  const patchLeg=(id,k,v)=>setLegs(p=>p.map(l=>l.id===id?{...l,[k]:v}:l));
  const autoStats=useMemo(()=>tbComputeTradeStats({legs,netPnL:netPnL!==''?parseFloat(netPnL):null}),[legs,netPnL]);

  const submit=async()=>{
    if(!symbol.trim()){setErr('Symbol required.');return;}
    const firstBuy=legs.find(l=>l.action==='BUY');
    if(!firstBuy?.price){setErr('At least one BUY leg with price required.');return;}
    setSaving(true);
    const payload={
      ticker:symbol.trim().toUpperCase(),market,direction,target:target||null,stopLoss:stopLoss||null,
      legs:legs.map(l=>({...l,qty:parseFloat(l.qty)||0,price:parseFloat(l.price)||0,fee:parseFloat(l.fee)||0})),
      setupType,timeframe,confidence:parseInt(confidence),
      tags:tags.split(',').map(t=>t.trim()).filter(Boolean),notes,
      netPnL:netPnL!==''?parseFloat(netPnL):null,
      side:'BUY',qty:legs.filter(l=>l.action==='BUY').reduce((s,l)=>s+(parseFloat(l.qty)||0),0),
      avgFill:parseFloat(firstBuy.price)||0,date:firstBuy.datetime||new Date().toISOString(),
    };
    const r=isEdit?await onSave(entry.id,payload):await onSave(payload);
    setSaving(false);
    if(r?.ok===false){setErr(r.error||'Failed');return;}
    onClose();
  };

  return ReactDOM.createPortal(
    <div className="tb-modal-overlay" style={{position:'fixed',inset:0,zIndex:99999,background:'rgba(0,0,0,0.82)',backdropFilter:'blur(8px)',overflowY:'auto',overflowX:'hidden',padding:isMobile?'calc(env(safe-area-inset-top,0px) + 0px) 0 60px':'70px 16px 60px'}}>
      <div className="tb-modal-inner" style={{background:'var(--s1)',border:'1px solid var(--bdl)',borderRadius:isMobile?0:16,width:'100%',maxWidth:700,margin:'0 auto',boxShadow:'0 32px 80px rgba(0,0,0,0.6)',overflow:'hidden'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 22px',borderBottom:'1px solid var(--bd)'}}>
          <div style={{fontFamily:'Lora,serif',fontSize:16,fontWeight:700,color:'var(--tx)'}}>{isEdit?`Edit — ${entry.ticker}`:'New Trade'}</div>
          <button onClick={onClose} style={{background:'transparent',border:'none',color:'var(--txm)',fontSize:20,cursor:'pointer',padding:'0 4px',lineHeight:1}}>✕</button>
        </div>
        <div style={{display:'flex',borderBottom:'1px solid var(--bd)'}}>
          {['general','journal'].map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:'11px',border:'none',borderBottom:`2px solid ${tab===t?'var(--ac)':'transparent'}`,background:'transparent',color:tab===t?'var(--tx)':'var(--txm)',fontSize:13,fontWeight:tab===t?700:500,cursor:'pointer',textTransform:'capitalize',transition:'all .15s'}}>{t==='general'?'General':'Journal'}</button>
          ))}
        </div>
        <div style={{padding:'16px clamp(10px,4vw,22px)'}}>
          {tab==='general'&&(
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr 1fr':'120px 1fr 100px 110px auto',gap:isMobile?8:10,alignItems:'end'}} className="tb-leg-grid-top">
                <div><span style={TB_LS}>Market</span><select style={TB_SS} value={market} onChange={e=>setMarket(e.target.value)}>{TB_MARKETS.map(m=><option key={m}>{m}</option>)}</select></div>
                <div><span style={TB_LS}>Symbol *</span><input style={TB_IS} value={symbol} onChange={e=>setSymbol(e.target.value.toUpperCase())} placeholder="e.g. XOM"/></div>
                <div><span style={TB_LS}>Target $</span><input style={TB_IS} type="number" value={target} onChange={e=>setTarget(e.target.value)} placeholder="—"/></div>
                <div><span style={TB_LS}>Stop-Loss $</span><input style={TB_IS} type="number" value={stopLoss} onChange={e=>setStop(e.target.value)} placeholder="—"/></div>
                <div><span style={TB_LS}>Dir</span><button onClick={()=>setDir(d=>d==='LONG'?'SHORT':'LONG')} style={{padding:'7px 14px',borderRadius:8,border:'none',background:direction==='LONG'?'var(--tbb)':'var(--tbr)',color:'#fff',fontWeight:800,fontSize:12,cursor:'pointer',whiteSpace:'nowrap',height:36}}>{direction}</button></div>
              </div>
              {/* Desktop: grid row. Mobile: stacked card per leg */}
              {!isMobile&&<div style={{display:'grid',gridTemplateColumns:'36px 90px 1fr 80px 90px 70px 32px',gap:8,padding:'0 2px'}}>
                {['','Action','Date / Time','Qty','Price $','Fee $',''].map((h,i)=>(
                  <div key={i} style={{fontSize:10,fontWeight:800,color:'var(--txm)',textTransform:'uppercase',letterSpacing:1}}>{h}</div>
                ))}
              </div>}
              <div style={{display:'flex',flexDirection:'column',gap:isMobile?10:8}}>
                {legs.map((leg,i)=>(
                  isMobile?(
                    /* ── Mobile: stacked card ── */
                    <div key={leg.id} style={{background:'var(--s2)',borderRadius:10,padding:'10px 12px',border:`1px solid ${leg.action==='BUY'?'rgba(74,222,128,0.25)':'rgba(248,113,113,0.25)'}`}}>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <div style={{width:24,height:24,borderRadius:'50%',background:leg.action==='BUY'?'rgba(74,222,128,0.15)':'rgba(248,113,113,0.15)',border:`2px solid ${leg.action==='BUY'?'var(--tbb)':'var(--tbr)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:leg.action==='BUY'?'var(--tbb)':'var(--tbr)',flexShrink:0}}>{i+1}</div>
                          <select style={{...TB_SS,fontWeight:700,color:leg.action==='BUY'?'var(--tbb)':'var(--tbr)',padding:'6px 8px',width:'auto',fontSize:14}} value={leg.action} onChange={e=>patchLeg(leg.id,'action',e.target.value)}><option>BUY</option><option>SELL</option></select>
                        </div>
                        <button onClick={()=>removeLeg(leg.id)} disabled={legs.length<=1} style={{width:30,height:30,borderRadius:8,border:'none',background:'rgba(248,113,113,0.12)',color:'var(--tbr)',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',opacity:legs.length<=1?.3:1,flexShrink:0}}>✕</button>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr',gap:8}}>
                        <div><span style={{...TB_LS,marginBottom:2}}>Date / Time</span><input style={{...TB_IS,fontSize:14}} type="datetime-local" value={leg.datetime} onChange={e=>patchLeg(leg.id,'datetime',e.target.value)}/></div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                          <div><span style={{...TB_LS,marginBottom:2}}>Qty</span><input style={{...TB_IS,fontSize:14}} type="number" value={leg.qty} onChange={e=>patchLeg(leg.id,'qty',e.target.value)} placeholder="1"/></div>
                          <div><span style={{...TB_LS,marginBottom:2}}>Price $</span><input style={{...TB_IS,fontSize:14}} type="number" value={leg.price} onChange={e=>patchLeg(leg.id,'price',e.target.value)} placeholder="0.00"/></div>
                          <div><span style={{...TB_LS,marginBottom:2}}>Fee $</span><input style={{...TB_IS,fontSize:14}} type="number" value={leg.fee} onChange={e=>patchLeg(leg.id,'fee',e.target.value)} placeholder="0"/></div>
                        </div>
                      </div>
                    </div>
                  ):(
                    /* ── Desktop: grid row ── */
                    <div key={leg.id} style={{display:'grid',gridTemplateColumns:'36px 90px 1fr 80px 90px 70px 32px',gap:8,alignItems:'center'}} className="tb-leg-grid">
                      <div style={{width:28,height:28,borderRadius:'50%',background:leg.action==='BUY'?'rgba(74,222,128,0.15)':'rgba(248,113,113,0.15)',border:`2px solid ${leg.action==='BUY'?'var(--tbb)':'var(--tbr)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:800,color:leg.action==='BUY'?'var(--tbb)':'var(--tbr)'}}>{i+1}</div>
                      <select style={{...TB_SS,fontWeight:700,color:leg.action==='BUY'?'var(--tbb)':'var(--tbr)',padding:'7px 6px'}} value={leg.action} onChange={e=>patchLeg(leg.id,'action',e.target.value)}><option>BUY</option><option>SELL</option></select>
                      <input style={TB_IS} type="datetime-local" value={leg.datetime} onChange={e=>patchLeg(leg.id,'datetime',e.target.value)}/>
                      <input style={TB_IS} type="number" value={leg.qty} onChange={e=>patchLeg(leg.id,'qty',e.target.value)} placeholder="1"/>
                      <input style={TB_IS} type="number" value={leg.price} onChange={e=>patchLeg(leg.id,'price',e.target.value)} placeholder="0.00"/>
                      <input style={TB_IS} type="number" value={leg.fee} onChange={e=>patchLeg(leg.id,'fee',e.target.value)} placeholder="0"/>
                      <button onClick={()=>removeLeg(leg.id)} disabled={legs.length<=1} style={{width:28,height:28,borderRadius:6,border:'none',background:'rgba(248,113,113,0.1)',color:'var(--tbr)',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',opacity:legs.length<=1?.3:1}}>✕</button>
                    </div>
                  )
                ))}
              </div>
              <button onClick={addLeg} style={{alignSelf:'center',width:36,height:36,borderRadius:'50%',border:'2px dashed var(--bdl)',background:'transparent',color:'var(--ac)',fontSize:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
              {autoStats.entryTotal>0&&(
                <div style={{display:'flex',gap:14,flexWrap:'wrap',padding:'10px 14px',background:'var(--s2)',borderRadius:10,border:'1px solid var(--bd)',fontSize:12}}>
                  <span style={{color:'var(--txm)'}}>Entry: <span style={{fontFamily:'IBM Plex Mono,monospace',color:'var(--tx)',fontWeight:700}}>{tbFmt$(autoStats.entryTotal)}</span></span>
                  {autoStats.exitTotal>0&&<span style={{color:'var(--txm)'}}>Exit: <span style={{fontFamily:'IBM Plex Mono,monospace',color:'var(--tx)',fontWeight:700}}>{tbFmt$(autoStats.exitTotal)}</span></span>}
                  {autoStats.netPnL!=null&&<span style={{color:'var(--txm)'}}>P&L: <span style={{fontFamily:'IBM Plex Mono,monospace',fontWeight:700,color:tbPnlCol(autoStats.netPnL)}}>{tbFmt$(autoStats.netPnL)}</span></span>}
                  {autoStats.pnlPct!=null&&<span style={{fontFamily:'IBM Plex Mono,monospace',fontWeight:700,color:tbPnlCol(autoStats.pnlPct)}}>{tbFmtPct(autoStats.pnlPct)}</span>}
                  {autoStats.holdTime&&<span style={{color:'var(--txm)'}}>Hold: <span style={{color:'var(--txd)',fontWeight:600}}>{autoStats.holdTime}</span></span>}
                </div>
              )}
            </div>
          )}
          {tab==='journal'&&(
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div><span style={TB_LS}>Setup Type</span><select style={TB_SS} value={setupType} onChange={e=>setSetup(e.target.value)}>{TB_SETUP_TYPES.map(o=><option key={o} value={o}>{o||'— Select —'}</option>)}</select></div>
                <div><span style={TB_LS}>Timeframe</span><select style={TB_SS} value={timeframe} onChange={e=>setTF(e.target.value)}>{TB_TIMEFRAMES.map(o=><option key={o} value={o}>{o||'— Select —'}</option>)}</select></div>
              </div>
              <div><span style={TB_LS}>Net P&L Override $ <span style={{color:'var(--txm)',fontWeight:400,textTransform:'none',letterSpacing:0,fontSize:9}}>(blank = auto from legs)</span></span><input style={TB_IS} type="number" value={netPnL} onChange={e=>setNetPnL(e.target.value)} placeholder="Auto-computed"/></div>
              <div><span style={TB_LS}>Tags</span><input style={TB_IS} value={tags} onChange={e=>setTags(e.target.value)} placeholder="gap, catalyst, earnings…"/></div>
              <div>
                <span style={TB_LS}>Confidence <span style={{color:'var(--ac)',fontFamily:'IBM Plex Mono,monospace'}}>{confidence}</span>/10</span>
                <input type="range" min="0" max="10" value={confidence} onChange={e=>setConf(e.target.value)} style={{width:'100%',accentColor:'var(--ac)',cursor:'pointer'}}/>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--txm)',marginTop:2}}><span>0</span><span>5</span><span>10</span></div>
              </div>
              <div><span style={TB_LS}>Notes</span><textarea style={{...TB_IS,fontFamily:'Lora,serif',lineHeight:1.75,resize:'vertical',minHeight:120}} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Setup rationale, execution notes, lessons…"/></div>
            </div>
          )}
          {err&&<div style={{marginTop:12,fontSize:12,color:'var(--tbe)',background:'rgba(212,122,106,0.08)',borderRadius:8,padding:'8px 14px'}}>{err}</div>}
          <div style={{display:'flex',gap:10,justifyContent:'space-between',marginTop:18,paddingTop:14,borderTop:'1px solid var(--bd)'}}>
            {isEdit?(!confirm
              ?<button onClick={()=>setConfirm(true)} style={{padding:'7px 16px',borderRadius:8,border:'none',background:'rgba(248,113,113,0.12)',color:'var(--tbr)',fontWeight:700,fontSize:12,cursor:'pointer'}}>Delete</button>
              :<div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span style={{fontSize:12,color:'var(--tbe)'}}>Confirm?</span>
                <button onClick={()=>{onDel(entry.id);onClose();}} style={{padding:'6px 14px',borderRadius:8,border:'none',background:'var(--tbr)',color:'#fff',fontWeight:700,fontSize:12,cursor:'pointer'}}>Yes</button>
                <button onClick={()=>setConfirm(false)} className="tb-btn-ghost" style={{fontSize:12}}>No</button>
              </div>
            ):<div/>}
            <div style={{display:'flex',gap:10}}>
              <button className="tb-btn-ghost" onClick={onClose} style={{fontSize:12}}>Cancel</button>
              <button className="tb-btn-primary" onClick={submit} disabled={saving} style={{fontSize:12}}>{saving?'Saving…':'Save'}</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  ,document.getElementById('tradeboard-root')||document.body);
}

/* ── Trade row (desktop table) ── */
function TBTradeRow({trade,onClick,asFragment}){
  const s=useMemo(()=>tbComputeTradeStats(trade),[trade]);
  const legs=trade.legs||[];const buyLegs=legs.filter(l=>l.action==='BUY');
  const isLong=trade.direction==='LONG'||(!trade.direction);
  const sellLegs=legs.filter(l=>l.action==='SELL');
  const sellDates=sellLegs.map(l=>new Date(l.datetime)).filter(d=>!isNaN(d.getTime()));
  const exitDate=sellDates.length?new Date(Math.max(...sellDates.map(d=>d.getTime()))):null;
  const entryDate=exitDate||(buyLegs[0]?.datetime?new Date(buyLegs[0].datetime):(trade.date?new Date(trade.date):null));
  const qty=buyLegs.reduce((a,l)=>a+(parseFloat(l.qty)||0),0)||trade.qty||0;
  const cells=(<React.Fragment>
      <td style={{padding:'11px 14px',fontSize:14,color:'var(--txm)',whiteSpace:'nowrap'}}>{entryDate?entryDate.toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'numeric'}):'—'}</td>
      <td style={{padding:'11px 14px'}}><span style={{fontFamily:'IBM Plex Mono,monospace',fontWeight:700,fontSize:14,color:'var(--tx)'}}>{trade.ticker||'—'}</span>{trade.market&&trade.market!=='STOCK'&&<span style={{fontSize:9,color:'var(--txm)',background:'var(--s2)',borderRadius:4,padding:'1px 5px',fontWeight:700,marginLeft:5}}>{trade.market}</span>}</td>
      <td style={{padding:'11px 14px'}}>{s.status==='OPEN'?<span style={{fontSize:11,fontWeight:800,color:'var(--tbw)',background:'rgba(251,191,36,0.12)',borderRadius:6,padding:'3px 9px'}}>OPEN</span>:s.netPnL!=null&&s.netPnL>0?<span style={{fontSize:11,fontWeight:800,color:'var(--tbb)',background:'rgba(74,222,128,0.1)',borderRadius:6,padding:'3px 9px'}}>WIN</span>:s.netPnL!=null&&s.netPnL<0?<span style={{fontSize:11,fontWeight:800,color:'var(--tbr)',background:'rgba(248,113,113,0.1)',borderRadius:6,padding:'3px 9px'}}>LOSS</span>:<span style={{fontSize:11,fontWeight:800,color:'var(--txm)',background:'var(--s2)',borderRadius:6,padding:'3px 9px'}}>—</span>}</td>
      <td style={{padding:'11px 14px'}}><span style={{fontSize:11,fontWeight:800,color:isLong?'var(--tbb)':'var(--tbr)'}}>{isLong?'LONG':'SHORT'}</span></td>
      <td style={{padding:'11px 14px'}}>{trade.source==='manual'?<span style={{fontSize:9,fontWeight:800,color:'var(--info)',background:'rgba(96,165,250,0.1)',borderRadius:4,padding:'2px 6px',border:'1px solid rgba(96,165,250,0.2)'}}>M</span>:trade.source==='csv'?<span style={{fontSize:9,fontWeight:800,color:'var(--tbw)',background:'rgba(251,191,36,0.08)',borderRadius:4,padding:'2px 6px',border:'1px solid rgba(251,191,36,0.2)'}}>CSV</span>:<span style={{fontSize:9,fontWeight:800,color:'var(--tbb)',background:'rgba(74,222,128,0.08)',borderRadius:4,padding:'2px 6px',border:'1px solid rgba(74,222,128,0.2)'}}>W</span>}</td>
      <td style={{padding:'11px 14px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:14,color:'var(--txd)'}}>{tbFmtNum(qty)}</td>
      <td style={{padding:'11px 14px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:14,color:'var(--txd)'}}>{s.avgEntry?tbFmt$(s.avgEntry):'—'}</td>
      <td style={{padding:'11px 14px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:14,color:'var(--txd)'}}>{s.avgExit?tbFmt$(s.avgExit):'—'}</td>
      <td style={{padding:'11px 14px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:14,color:'var(--txd)'}}>{s.entryTotal?tbFmt$(s.entryTotal):'—'}</td>
      <td style={{padding:'11px 14px',textAlign:'right',fontFamily:'IBM Plex Mono,monospace',fontSize:14,color:'var(--txd)'}}>{s.exitTotal?tbFmt$(s.exitTotal):'—'}</td>
      <td style={{padding:'11px 14px',textAlign:'right',fontSize:11,color:s.holdTime?'var(--ac)':'var(--txm)',fontWeight:600,whiteSpace:'nowrap'}}>{s.holdTime||'—'}</td>
      <td style={{padding:'11px 14px',textAlign:'right'}}>{s.netPnL!=null?<span style={{fontFamily:'IBM Plex Mono,monospace',fontWeight:700,fontSize:14,color:tbPnlCol(s.netPnL)}}>{tbFmt$(s.netPnL)}</span>:<span style={{color:'var(--txm)',fontSize:11}}>—</span>}</td>
      <td style={{padding:'11px 14px',textAlign:'right'}}>{s.pnlPct!=null?<span style={{fontFamily:'IBM Plex Mono,monospace',fontWeight:700,fontSize:12,color:tbPnlCol(s.pnlPct)}}>{tbFmtPct(s.pnlPct)}</span>:<span style={{color:'var(--txm)',fontSize:11}}>—</span>}</td>
      <td style={{padding:'11px 14px'}}>{trade.setupType&&<span style={{fontSize:10,color:'var(--txm)',background:'var(--s2)',borderRadius:4,padding:'2px 7px',fontWeight:600}}>{trade.setupType}</span>}</td>
      <td style={{padding:'11px 14px',maxWidth:160}}>{trade.notes?<span style={{fontSize:13,color:'var(--txd)',fontFamily:'Lora,serif',fontStyle:'italic',display:'-webkit-box',WebkitLineClamp:1,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{trade.notes}</span>:<span style={{fontSize:13,color:'var(--txm)',fontStyle:'italic'}}>—</span>}</td>
    </React.Fragment>);
  if(asFragment)return cells;
  return(<tr onClick={onClick} style={{borderBottom:'1px solid var(--bd)',cursor:'pointer',transition:'background .1s'}} onMouseEnter={e=>e.currentTarget.style.background='var(--s2)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>{cells}</tr>);
}

/* ── Journal Page ── */
function TBJournalPage(){
  const jHook=useTBJournal();
  const isMobile=useIsMobile();
  const [modal,setModal]=useState(null);
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('ALL');
  const [sortCol,setSortCol]=useState('date');
  const [sortDir,setSortDir]=useState(-1);
  const [syncing,setSyncing]=useState(false);
  const [csvImporting,setCsvImporting]=useState(false);
  const [csvToast,setCsvToast]=useState(null);
  const csvInputRef=useRef(null);
  const [selectMode,setSelectMode]=useState(false);
  const [selected,setSelected]=useState(new Set());

  const toggleSelect=id=>setSelected(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  const selectAll=()=>setSelected(new Set(filtered.map(t=>t.id)));
  const clearSelect=()=>{setSelected(new Set());setSelectMode(false);};
  const deleteSelected=async()=>{
    /* Snapshot both selected AND all filtered IDs at call time.
       If "Select All" was used, use filtered snapshot to avoid stale-Set race. */
    const ids=selected.size===filtered.length
      ? filtered.map(t=>t.id)   /* all-selected: use freshest filtered list */
      : [...selected];
    setSelectMode(false);
    setSelected(new Set());
    await jHook.delBulk(ids);
  };

  const filtered=useMemo(()=>{
    let t=[...jHook.trades];
    if(search.trim())t=t.filter(x=>(x.ticker||'').toLowerCase().includes(search.toLowerCase())||(x.notes||'').toLowerCase().includes(search.toLowerCase())||(x.setupType||'').toLowerCase().includes(search.toLowerCase()));
    if(filter!=='ALL')t=t.filter(x=>{const s=tbComputeTradeStats(x);if(filter==='OPEN')return s.status==='OPEN';if(filter==='WIN')return s.netPnL!=null&&s.netPnL>0;if(filter==='LOSS')return s.netPnL!=null&&s.netPnL<0;return true;});
    t.sort((a,b)=>{
      if(sortCol==='date'){const lastSell=tr=>{const sells=(tr.legs||[]).filter(l=>l.action==='SELL');const dts=sells.map(l=>new Date(l.datetime)).filter(d=>!isNaN(d));if(dts.length)return Math.max(...dts.map(d=>d.getTime()));return new Date((tr.legs?.[0]?.datetime||tr.date)||0).getTime();};return sortDir*(lastSell(a)-lastSell(b));}
      const va=a[sortCol]??0,vb=b[sortCol]??0;
      return typeof va==='string'?sortDir*va.localeCompare(vb||''):sortDir*((parseFloat(va)||0)-(parseFloat(vb)||0));
    });
    return t;
  },[jHook.trades,search,filter,sortCol,sortDir]);

  const toggleSort=k=>{if(sortCol===k){if(sortDir===1){setSortCol('date');setSortDir(-1);}else setSortDir(1);}else{setSortCol(k);setSortDir(-1);}};
  const arr=k=>sortCol===k?(sortDir===-1?'↓':'↑ ×'):'⇅';
  const Th=({k,ch,r})=>(<th onClick={()=>toggleSort(k)} style={{padding:'9px 14px',fontSize:10,fontWeight:800,color:sortCol===k?'var(--ac)':'var(--txm)',textTransform:'uppercase',letterSpacing:1.5,cursor:'pointer',userSelect:'none',textAlign:r?'right':'left',whiteSpace:'nowrap',background:'var(--s2)',borderBottom:'1px solid var(--bd)'}}>{ch} <span style={{opacity:.5}}>{arr(k)}</span></th>);
  const SH=({ch,r})=>(<th style={{padding:'9px 14px',fontSize:10,fontWeight:800,color:'var(--txm)',textTransform:'uppercase',letterSpacing:1.5,textAlign:r?'right':'left',whiteSpace:'nowrap',background:'var(--s2)',borderBottom:'1px solid var(--bd)'}}>{ch}</th>);

  const doSync=async()=>{setSyncing(true);await jHook.sync();setSyncing(false);};

  const [remerging,setRemerging]=useState(false);
  const doRemerge=async()=>{
    if(!window.confirm('Re-merge all Webull trades from their fills using FIFO grouping? Fixes split/mismatched trades. Manual & CSV trades are not touched.'))return;
    setRemerging(true);
    try{
      const res=await jHook.rebuild();
      setCsvToast(res&&res.ok?`Re-merged into ${res.made} trade${res.made!==1?'s':''} (was ${res.removed})`:'Re-merge failed');
    }catch(err){setCsvToast('Re-merge error: '+err.message);}
    setRemerging(false);
    setTimeout(()=>setCsvToast(null),3500);
  };

  const doImportCSV=async(e)=>{
    const file=e.target.files&&e.target.files[0];
    if(!file){return;}
    e.target.value=''; /* reset so same file can be re-selected */
    setCsvImporting(true);
    try{
      const text=await file.text();
      const result=await jHook.importCSV(text);
      if(result.ok){
        setCsvToast(result.added===0
          ?'No new trades (all duplicates)'
          :`Imported ${result.added} trade${result.added!==1?'s':''}${result.skipped?` · ${result.skipped} skipped`:''}`);}
      else setCsvToast('Import failed: '+(result.error||'unknown error'));
    }catch(err){setCsvToast('Import error: '+err.message);}
    setCsvImporting(false);
    setTimeout(()=>setCsvToast(null),3500);
  };

  const doExportCSV=()=>{
    const trades=jHook.trades;
    if(!trades||!trades.length){setCsvToast('No trades to export.');setTimeout(()=>setCsvToast(null),3000);return;}
    /* Helper: wrap cell in quotes, escape internal quotes */
    const cell=v=>{
      if(v==null||v===undefined||v==='')return'';
      const s=String(v).replace(/"/g,'""');
      return(s.includes(',')||s.includes('"')||s.includes('\n'))?`"${s}"`:s;
    };
    /* Determine max leg count across all trades for columnar layout */
    const maxLegs=Math.max(...trades.map(t=>(t.legs||[]).length),1);
    /* Build header row — static trade fields + per-leg columns */
    const legHdrs=Array.from({length:maxLegs},(_,i)=>[
      `Leg${i+1}_Action`,`Leg${i+1}_DateTime`,`Leg${i+1}_Qty`,`Leg${i+1}_Price`,`Leg${i+1}_Fee`
    ]).flat();
    const headers=[
      'TradeID','Date','Symbol','Market','Direction','Status','Source',
      'Buy_Qty','Avg_Entry','Avg_Exit','Entry_Total','Exit_Total',
      'Total_Fees','Hold_Time','Realized_PnL','PnL_Pct',
      'Setup_Type','Timeframe','Confidence','Target','Stop_Loss',
      'Tags','Notes',
      ...legHdrs
    ];
    const rows=[headers.join(',')];
    trades.forEach(t=>{
      const s=tbComputeTradeStats(t);
      const legs=t.legs||[];
      /* Format dates: prefer last SELL datetime for "Date", fallback to first BUY or t.date */
      const sells=legs.filter(l=>l.action==='SELL');
      const sellDates=sells.map(l=>new Date(l.datetime)).filter(d=>!isNaN(d.getTime()));
      const buys=legs.filter(l=>l.action==='BUY');
      const buyDates=buys.map(l=>new Date(l.datetime)).filter(d=>!isNaN(d.getTime()));
      const tradeDate=sellDates.length
        ?new Date(Math.max(...sellDates.map(d=>d.getTime())))
        :buyDates.length?buyDates[0]:(t.date?new Date(t.date):null);
      const fmtDate=d=>{if(!d||isNaN(d.getTime()))return'';const mm=String(d.getMonth()+1).padStart(2,'0');const dd=String(d.getDate()).padStart(2,'0');const hh=String(d.getHours()).padStart(2,'0');const min=String(d.getMinutes()).padStart(2,'0');return`${d.getFullYear()}-${mm}-${dd} ${hh}:${min}`;};
      const staticCols=[
        cell(t.id||''),
        cell(fmtDate(tradeDate)),
        cell(t.ticker||''),
        cell(t.market||'STOCK'),
        cell(t.direction||'LONG'),
        cell(s.status||''),
        cell(t.source||''),
        cell(s.buyQty!=null?Number(s.buyQty.toFixed(6)):''),
        cell(s.avgEntry?Number(s.avgEntry.toFixed(4)):''),
        cell(s.avgExit?Number(s.avgExit.toFixed(4)):''),
        cell(s.entryTotal?Number(s.entryTotal.toFixed(4)):''),
        cell(s.exitTotal?Number(s.exitTotal.toFixed(4)):''),
        cell(s.totalFees!=null?Number(s.totalFees.toFixed(4)):''),
        cell(s.holdTime||''),
        cell(s.netPnL!=null?Number(s.netPnL.toFixed(4)):''),
        cell(s.pnlPct!=null?Number(s.pnlPct.toFixed(4)):''),
        cell(t.setupType||''),
        cell(t.timeframe||''),
        cell(t.confidence!=null&&t.confidence!==0?t.confidence:''),
        cell(t.target||''),
        cell(t.stopLoss||''),
        cell((t.tags||[]).join('; ')),
        cell(t.notes||''),
      ];
      /* Per-leg columns, padded to maxLegs */
      const legCols=[];
      for(let i=0;i<maxLegs;i++){
        const l=legs[i];
        if(l){
          const ldt=l.datetime?fmtDate(new Date(l.datetime)):'';
          legCols.push(cell(l.action||''),cell(ldt),cell(l.qty!=null?l.qty:''),cell(l.price!=null?l.price:''),cell(l.fee!=null?l.fee:''));
        }else{
          legCols.push('','','','','');
        }
      }
      rows.push([...staticCols,...legCols].join(','));
    });
    const csv=rows.join('\r\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const now=new Date();
    const stamp=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
    a.href=url;a.download=`taskhub_trades_${stamp}.csv`;a.style.display='none';
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},500);
    setCsvToast(`Exported ${trades.length} trade${trades.length!==1?'s':''}`);
    setTimeout(()=>setCsvToast(null),3000);
  };

  return(
    <div className="tb-fade-in" style={{display:'flex',flexDirection:'column',gap:16,padding:'16px clamp(10px,4vw,28px) 40px'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:140}}>
          <div style={{fontSize:20,fontWeight:800,color:'var(--tx)'}}>Journal</div>
          <div style={{fontSize:13,color:'var(--txm)'}}>{jHook.trades.length} trades</div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        {!selectMode&&localStorage.getItem('td6_mainDash')==='tony'&&<button className="tb-btn-ghost" onClick={doSync} disabled={jHook.syncing||syncing} style={{fontSize:13}}>{jHook.syncing||syncing?'⟳ Syncing…':'⟳ Webull Sync'}</button>}
        {!selectMode&&localStorage.getItem('td6_mainDash')==='tony'&&<button className="tb-btn-ghost" onClick={doRemerge} disabled={remerging||jHook.syncing||syncing} style={{fontSize:13}} title="Rebuild Webull trades from fills with correct FIFO grouping">{remerging?'⟳ Re-merging…':'⤳ Re-merge'}</button>}
        {!selectMode&&<button className="tb-btn-ghost" onClick={()=>setModal('add')} style={{fontSize:13}}>＋ Manual Trade</button>}
        {!selectMode&&<button className="tb-btn-ghost" onClick={()=>csvInputRef.current&&csvInputRef.current.click()} disabled={csvImporting} style={{fontSize:13}}>{csvImporting?'⏳ Importing…':'📂 Import CSV'}</button>}
        {!selectMode&&<button className="tb-btn-ghost" onClick={doExportCSV} disabled={!jHook.trades.length} style={{fontSize:13}}>⬇ Export CSV</button>}
        {!selectMode&&<button className="tb-btn-ghost" onClick={()=>setSelectMode(true)} style={{fontSize:13}}>☑ Select</button>}
        {selectMode&&<span style={{fontSize:13,color:'var(--txm)',fontWeight:600}}>{selected.size} selected</span>}
        {selectMode&&<button className="tb-btn-ghost" onClick={selectAll} style={{fontSize:12}}>Select All</button>}
        {selectMode&&selected.size>0&&<button onClick={deleteSelected} style={{display:'inline-flex',alignItems:'center',gap:5,background:'rgba(248,113,113,0.12)',color:'var(--tbr)',border:'1.5px solid rgba(248,113,113,0.35)',borderRadius:100,padding:'7px 16px',fontSize:13,fontWeight:700,cursor:'pointer'}}>🗑 Delete {selected.size}</button>}
        {selectMode&&<button className="tb-btn-ghost" onClick={clearSelect} style={{fontSize:12}}>Cancel</button>}
        <input ref={csvInputRef} type="file" accept=".csv,text/csv" style={{display:'none'}} onChange={doImportCSV}/>
        </div>
      </div>
      <TBJournalStats trades={jHook.trades} activeFilter={filter} onFilterChange={setFilter}/>
      <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search symbol, notes, setup…" style={{background:'var(--s2)',border:'1px solid var(--bd)',borderRadius:8,color:'var(--tx)',fontSize:14,padding:'7px 14px',outline:'none',width:'min(230px,100%)',flex:1,minWidth:0}} onFocus={e=>e.target.style.borderColor='var(--ac)'} onBlur={e=>e.target.style.borderColor='var(--bd)'}/>
        <div style={{marginLeft:'auto',fontSize:13,color:'var(--txm)'}}>{filtered.length} trade{filtered.length!==1?'s':''}</div>
      </div>
      <div className="tb-card" style={{padding:0,overflow:'hidden'}}>
        {jHook.loading&&<div style={{padding:'16px 20px',fontSize:14,color:'var(--txm)'}}>Loading…</div>}
        {!jHook.loading&&filtered.length===0&&<div style={{padding:'52px',textAlign:'center',fontFamily:'Lora,serif',fontSize:15,color:'var(--txm)',fontStyle:'italic'}}>No trades yet. Click "⟳ Webull Sync" to pull from Webull, or "＋ Manual Trade" to log one manually.</div>}
        {filtered.length>0&&isMobile&&(
          <div style={{display:'flex',flexDirection:'column'}}>
            {filtered.map(t=>{
              const s=tbComputeTradeStats(t);const legs=t.legs||[];const buyLegs=legs.filter(l=>l.action==='BUY');
              const tSellLegs=legs.filter(l=>l.action==='SELL');
              const tSellDates=tSellLegs.map(l=>new Date(l.datetime)).filter(d=>!isNaN(d.getTime()));
              const tExitDate=tSellDates.length?new Date(Math.max(...tSellDates.map(d=>d.getTime()))):null;
              const entryDate=tExitDate||(buyLegs[0]?.datetime?new Date(buyLegs[0].datetime):(t.date?new Date(t.date):null));
              const isLong=t.direction==='LONG'||(!t.direction);
              return(<div key={t.id} onClick={()=>selectMode?toggleSelect(t.id):setModal(t)} style={{padding:'12px 14px',borderBottom:`1px solid ${selected.has(t.id)?'var(--ac)':'var(--bd)'}`,cursor:'pointer',transition:'background .1s',background:selected.has(t.id)?'rgba(224,96,122,0.08)':'transparent'}} onTouchStart={e=>{if(!selectMode)e.currentTarget.style.background='var(--s2)';}} onTouchEnd={e=>{if(!selectMode)e.currentTarget.style.background='transparent';}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:5}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    {selectMode&&<div style={{width:18,height:18,borderRadius:4,border:`2px solid ${selected.has(t.id)?'var(--ac)':'var(--bdl)'}`,background:selected.has(t.id)?'var(--ac)':'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'#fff'}}>{selected.has(t.id)?'✓':''}</div>}
                    <span style={{fontFamily:'IBM Plex Mono,monospace',fontWeight:700,fontSize:14,color:'var(--tx)'}}>{t.ticker||'—'}</span>
                    <span style={{fontSize:11,fontWeight:800,color:isLong?'var(--tbb)':'var(--tbr)'}}>{isLong?'LONG':'SHORT'}</span>
                    {s.status==='OPEN'?<span style={{fontSize:10,fontWeight:800,color:'var(--tbw)',background:'rgba(251,191,36,0.12)',borderRadius:5,padding:'2px 6px'}}>OPEN</span>:s.netPnL!=null&&s.netPnL>0?<span style={{fontSize:10,fontWeight:800,color:'var(--tbb)',background:'rgba(74,222,128,0.1)',borderRadius:5,padding:'2px 6px'}}>WIN</span>:s.netPnL!=null&&s.netPnL<0?<span style={{fontSize:10,fontWeight:800,color:'var(--tbr)',background:'rgba(248,113,113,0.1)',borderRadius:5,padding:'2px 6px'}}>LOSS</span>:null}
                    {t.source==='manual'&&<span style={{fontSize:9,fontWeight:800,color:'var(--info)',background:'rgba(96,165,250,0.1)',borderRadius:4,padding:'1px 5px',border:'1px solid rgba(96,165,250,0.2)'}}>MANUAL</span>}{t.source==='csv'&&<span style={{fontSize:9,fontWeight:800,color:'var(--tbw)',background:'rgba(251,191,36,0.08)',borderRadius:4,padding:'1px 5px',border:'1px solid rgba(251,191,36,0.2)'}}>CSV</span>}
                  </div>
                  <div style={{textAlign:'right'}}>
                    {s.netPnL!=null&&<div style={{fontFamily:'IBM Plex Mono,monospace',fontWeight:700,fontSize:14,color:tbPnlCol(s.netPnL)}}>{tbFmt$(s.netPnL)}</div>}
                    {s.pnlPct!=null&&<div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11,color:tbPnlCol(s.pnlPct)}}>{tbFmtPct(s.pnlPct)}</div>}
                  </div>
                </div>
                <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                  {entryDate&&<span style={{fontSize:13,color:'var(--txm)'}}>{entryDate.toLocaleDateString('en-US',{month:'numeric',day:'numeric'})}</span>}
                  {s.avgEntry>0&&<span style={{fontSize:13,color:'var(--txm)'}}>In: <span style={{color:'var(--txd)',fontFamily:'IBM Plex Mono,monospace'}}>{tbFmt$(s.avgEntry)}</span></span>}
                  {s.avgExit>0&&<span style={{fontSize:13,color:'var(--txm)'}}>Out: <span style={{color:'var(--txd)',fontFamily:'IBM Plex Mono,monospace'}}>{tbFmt$(s.avgExit)}</span></span>}
                  {s.holdTime&&<span style={{fontSize:13,color:'var(--ac)',fontWeight:600}}>{s.holdTime}</span>}
                  {t.setupType&&<span style={{fontSize:10,color:'var(--txm)',background:'var(--s2)',borderRadius:4,padding:'1px 6px',fontWeight:600}}>{t.setupType}</span>}
                </div>
                {t.notes&&<div style={{fontSize:13,color:'var(--txd)',fontFamily:'Lora,serif',fontStyle:'italic',marginTop:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.notes}</div>}
              </div>);
            })}
          </div>
        )}
        {filtered.length>0&&!isMobile&&(
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead><tr>

/* ── Realized P&L via FIFO over Webull filled-order history ──
   Worker /api/portfolio/summary account object has NO realizedPnL field
   (Webull balance endpoint never returns it), so derive it client-side by
   FIFO-matching SELLs against earliest BUYs per symbol. Returns null when
   there are no closed round-trips (so UI can fall back to '—'). */
function tbRealizedFromHistory(history){
  if(!Array.isArray(history)||!history.length)return null;
  const ev=history.map(h=>({
    sym:(h.symbol||h.ticker||'').toUpperCase(),
    side:(h.action||h.side||'').toUpperCase(),
    qty:parseFloat(h.filledQty??h.filled??h.qty)||0,
    price:parseFloat(h.avgFilledPrice??h.avgFill??h.avgPrice??h.price)||0,
    fee:parseFloat(h.totalCommission??h.commission??h.fee)||0,
    ts:new Date(h.filledAt||h.filledTime||h.tradeTime||h.orderTime||h.datetime||h.date||0).getTime()||0,
  })).filter(e=>e.sym&&e.qty>0&&(e.side==='BUY'||e.side==='SELL'));
  if(!ev.length)return null;
  ev.sort((a,b)=>a.ts-b.ts);
  const lots={}; let realized=0; let matched=false;
  for(const e of ev){
    if(!lots[e.sym])lots[e.sym]=[];
    if(e.side==='BUY'){lots[e.sym].push({qty:e.qty,price:e.price});realized-=e.fee;}
    else{
      let rem=e.qty;
      while(rem>0&&lots[e.sym].length){
        const lot=lots[e.sym][0];
        const m=Math.min(rem,lot.qty);
        realized+=(e.price-lot.price)*m; matched=true;
        lot.qty-=m; rem-=m;
        if(lot.qty<=1e-9)lots[e.sym].shift();
      }
      realized-=e.fee;
    }
  }
  return matched?realized:null;
}

/* ══ US Market Clock (NYSE/Nasdaq) ══════════════════════════════════════════
   Computed entirely client-side in true Eastern Time — a live open/closed clock
   shouldn't round-trip an API every second, and this keeps working even if the
   Webull token is expired. Holidays are a maintained static list. ── */
const TB_MKT_HOLIDAYS={
  '2026-01-01':"New Year's Day",'2026-01-19':'MLK Jr. Day','2026-02-16':"Presidents' Day",
  '2026-04-03':'Good Friday','2026-05-25':'Memorial Day','2026-06-19':'Juneteenth',
  '2026-07-03':'Independence Day','2026-09-07':'Labor Day','2026-11-26':'Thanksgiving Day',
  '2026-12-25':'Christmas Day',
  '2027-01-01':"New Year's Day",'2027-01-18':'MLK Jr. Day','2027-02-15':"Presidents' Day",
  '2027-03-26':'Good Friday','2027-05-31':'Memorial Day',
};
// Early closes — regular session ends 1:00 PM ET.
const TB_MKT_HALFDAYS={'2026-11-27':'Day after Thanksgiving','2026-12-24':'Christmas Eve'};

function tbMktDateAdd(s,n){const[Y,M,D]=s.split('-').map(Number);const d=new Date(Date.UTC(Y,M-1,D));d.setUTCDate(d.getUTCDate()+n);return d.toISOString().slice(0,10);}
function tbMktWeekday(s){const[Y,M,D]=s.split('-').map(Number);return new Date(Date.UTC(Y,M-1,D)).getUTCDay();} // 0=Sun..6=Sat
function tbMktIsTradingDay(s){const wd=tbMktWeekday(s);return wd!==0&&wd!==6&&!TB_MKT_HOLIDAYS[s];}
function tbMktNextTradingDay(s,incl){let d=incl?s:tbMktDateAdd(s,1);for(let i=0;i<14;i++){if(tbMktIsTradingDay(d))return d;d=tbMktDateAdd(d,1);}return d;}
// Wall-clock parts in America/New_York for a given Date.
function tbNyParts(date){const p=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}).formatToParts(date).reduce((a,x)=>{a[x.type]=x.value;return a},{});let hh=+p.hour;if(hh===24)hh=0;return{dateStr:`${p.year}-${p.month}-${p.day}`,hh,mm:+p.minute,ss:+p.second};}
// UTC ms timestamp for a given NY wall-clock date+time (DST-safe).
function tbNyTs(dateStr,hh,mm){const[Y,M,D]=dateStr.split('-').map(Number);const guess=Date.UTC(Y,M-1,D,hh,mm,0);const p=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).formatToParts(new Date(guess)).reduce((a,x)=>{a[x.type]=x.value;return a},{});let hr=+p.hour;if(hr===24)hr=0;const asTz=Date.UTC(+p.year,+p.month-1,+p.day,hr,+p.minute);return guess-(asTz-guess);}
function tbMktState(now){
  const {dateStr,hh,mm}=tbNyParts(now);
  const t=hh*60+mm;
  const wd=tbMktWeekday(dateStr);
  const tradable=wd!==0&&wd!==6&&!TB_MKT_HOLIDAYS[dateStr];
  const half=TB_MKT_HALFDAYS[dateStr]||null;
  const regClose=half?13*60:16*60;          // 1:00 or 4:00 PM ET
  const postEnd=half?17*60:20*60;            // extended session end
  let phase='closed';
  if(tradable){
    if(t<240)phase='closed';                 // before 4:00 AM
    else if(t<570)phase='pre';               // 4:00–9:30
    else if(t<regClose)phase='regular';      // 9:30–close
    else if(t<postEnd)phase='after';         // close–8:00 PM
    else phase='closed';
  }
  const nextOpenDate=(tradable&&t<570)?dateStr:tbMktNextTradingDay(dateStr,false);
  return {dateStr,t,phase,half,tradable,holiday:TB_MKT_HOLIDAYS[dateStr]||null,regClose,postEnd,
    regOpenTs:tbNyTs(dateStr,9,30),
    regCloseTs:tbNyTs(dateStr,Math.floor(regClose/60),regClose%60),
    postEndTs:tbNyTs(dateStr,Math.floor(postEnd/60),postEnd%60),
    nextOpenTs:tbNyTs(nextOpenDate,9,30),nextOpenDate};
}
function tbCountdown(ms){if(ms<0)ms=0;const s=Math.floor(ms/1000);const d=Math.floor(s/86400);const h=Math.floor(s%86400/3600);const m=Math.floor(s%3600/60);const ss=s%60;if(d>0)return `${d}d ${h}h ${m}m`;if(h>0)return `${h}h ${m}m ${ss}s`;return `${m}m ${ss}s`;}
function tbMktDayLabel(dateStr){return new Date(dateStr+'T12:00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});}

function TBMarketStatus({isMobile}){
  const [now,setNow]=useState(()=>new Date());
  useEffect(()=>{const id=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(id);},[]);
  const st=useMemo(()=>tbMktState(now),[now]);
  const PHASE={
    regular:{label:'OPEN',sub:'Regular Hours',tone:'#3fb950'},
    pre:    {label:'PRE-MARKET',sub:'Extended Hours',tone:'#d29922'},
    after:  {label:'AFTER HOURS',sub:'Extended Hours',tone:'#58a6ff'},
    closed: {label:'CLOSED',sub:st.holiday||(st.tradable?'Market Closed':'Weekend'),tone:'#8b949e'},
  }[st.phase];
  let cdLabel,cdTs;
  if(st.phase==='regular'){cdLabel='Closes in';cdTs=st.regCloseTs;}
  else if(st.phase==='pre'){cdLabel='Opens in';cdTs=st.regOpenTs;}
  else if(st.phase==='after'){cdLabel='Extended closes in';cdTs=st.postEndTs;}
  else {cdLabel='Opens in';cdTs=st.nextOpenTs;}
  const cd=tbCountdown(cdTs-now.getTime());
  const closeH=st.half?'1:00 PM':'4:00 PM';
  const hoursLine=st.tradable
    ? `Today · 9:30 AM – ${closeH} ET${st.half?' (early close)':''}`
    : `Opens ${tbMktDayLabel(st.nextOpenDate)} · 9:30 AM ET`;
  const upcoming=[
    ...Object.entries(TB_MKT_HOLIDAYS).map(([d,n])=>({d,n,half:false})),
    ...Object.entries(TB_MKT_HALFDAYS).map(([d,n])=>({d,n,half:true})),
  ].filter(x=>x.d>=st.dateStr).sort((a,b)=>a.d.localeCompare(b.d)).slice(0,3);

  return (<div className="tb-card" style={{padding:isMobile?'14px 16px':'16px 20px',borderLeft:`3px solid ${PHASE.tone}`}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
      <div style={{display:'flex',alignItems:'center',gap:11,minWidth:0}}>
        <span style={{width:11,height:11,borderRadius:'50%',background:PHASE.tone,flexShrink:0,boxShadow:`0 0 0 4px ${PHASE.tone}22`,animation:st.phase==='regular'?'tb-pulse 2s ease-in-out infinite':'none'}}/>
        <div style={{minWidth:0}}>
          <div style={{display:'flex',alignItems:'baseline',gap:8,flexWrap:'wrap'}}>
            <span style={{fontSize:18,fontWeight:900,letterSpacing:.5,color:PHASE.tone}}>{PHASE.label}</span>
            <span style={{fontSize:11,fontWeight:700,color:'var(--txm)',textTransform:'uppercase',letterSpacing:1}}>US Markets</span>
          </div>
          <div style={{fontSize:12,color:'var(--txm)',marginTop:1}}>{PHASE.sub}</div>
        </div>
      </div>
      <div style={{textAlign:isMobile?'left':'right'}}>
        <div style={{fontSize:10,fontWeight:800,color:'var(--txm)',textTransform:'uppercase',letterSpacing:1.2}}>{cdLabel}</div>
        <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:18,fontWeight:800,color:'var(--tx)'}}>{cd}</div>
      </div>
    </div>
    <div style={{fontSize:12,color:'var(--txd)',marginTop:10,paddingTop:10,borderTop:'1px solid var(--bd)'}}>{hoursLine}</div>
    {upcoming.length>0&&<div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:8}}>
      {upcoming.map(u=>(<div key={u.d} style={{display:'flex',alignItems:'center',gap:6,background:'var(--s2)',border:'1px solid var(--bd)',borderRadius:8,padding:'4px 9px'}}>
        <span style={{fontSize:11,fontWeight:800,color:'var(--txd)',fontFamily:'IBM Plex Mono,monospace'}}>{tbMktDayLabel(u.d)}</span>
        <span style={{fontSize:11,color:'var(--txm)'}}>{u.n}</span>
        <span style={{fontSize:8.5,fontWeight:800,letterSpacing:.3,textTransform:'uppercase',color:u.half?'#d29922':'#8b949e',background:(u.half?'#d29922':'#8b949e')+'1a',borderRadius:4,padding:'1px 5px'}}>{u.half?'½ day':'closed'}</span>
      </div>))}
    </div>}
  </div>);
}
