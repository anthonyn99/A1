function tbEtDate(offset){
  const d=new Date(Date.now()+(offset||0)*86400000);
  return new Intl.DateTimeFormat('en-CA',{timeZone:'America/Denver',year:'numeric',month:'2-digit',day:'2-digit'}).format(d);
}
// ISO instant for dateStr at hh:mm America/Denver (Mountain, DST-safe).
function tbZonedISO(dateStr,hh,mm){
  const [Y,M,D]=dateStr.split('-').map(Number);
  const utcGuess=Date.UTC(Y,M-1,D,hh,mm,0);
  const p=new Intl.DateTimeFormat('en-US',{timeZone:'America/Denver',hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).formatToParts(new Date(utcGuess)).reduce((a,x)=>{a[x.type]=x.value;return a},{});
  let hr=+p.hour; if(hr===24)hr=0;
  const asTz=Date.UTC(+p.year,+p.month-1,+p.day,hr,+p.minute);
  return new Date(utcGuess-(asTz-utcGuess)).toISOString();
}
const TB_CAT_COLORS={earnings:'#E0607A',inflation:'#d29922',fed:'#bc8cff',jobs:'#58a6d4',growth:'#56d364',macro:'#8b949e',rates:'#bc8cff',gdp:'#56d364',retail:'#56d364',housing:'#58d4a4',sentiment:'#d4a93a',trade:'#e07a6a',oil:'#d4843a'};
const tbCatColor=c=>TB_CAT_COLORS[String(c||'').toLowerCase()]||'#8b949e';
function tbFmtLocal(iso){ if(!iso) return ''; const d=new Date(iso); let h=d.getHours(); const m=d.getMinutes(); const ap=h<12?'AM':'PM'; h=h%12||12; return h+':'+(m<10?'0':'')+m+' '+ap; }


function TBCatalystsPage({watchlist=NH_DEFAULT_TICKERS}){
  const [events,setEvents]=useState([]);
  const [loading,setLoading]=useState(false);
  const [notice,setNotice]=useState('');
  const [lastSync,setLastSync]=useState(null);
  const eventsRef=useRef([]); const wlRef=useRef(watchlist); const pollRef=useRef(null); const didAuto=useRef(false);
  useEffect(()=>{eventsRef.current=events;},[events]);
  // Keep the ref in sync with the shared watchlist prop (used by refresh()).
  useEffect(()=>{wlRef.current=watchlist;},[watchlist]);

  const commit=useCallback(async(future)=>{
    // Stamp events for commit — no notifyAt/reminder fields needed anymore.
    const enriched=future.map(ev=>({...ev}));
    const sig=a=>a.map(e=>e.id+'@'+e.date).sort().join('|');
    if(sig(eventsRef.current||[])===sig(enriched)){ return; } // unchanged → no writes
    const oldIds=new Set((eventsRef.current||[]).map(e=>e.id));
    const newIds=new Set(enriched.map(e=>e.id));
    // Notifications removed: macros now show as TaskHub banners only (Tony + Veda),
    // no 6:30 AM push. Purge any catalyst reminder docs (old + new ids) so the
    // taskhub-reminders worker has nothing left to fire. No new reminder writes.
    if(window._fbDeleteReminder){const purge=new Set([...oldIds,...newIds]);for(const id of purge){try{await window._fbDeleteReminder(id);}catch(e){}}}
    const now=Date.now();
    setEvents(enriched); eventsRef.current=enriched;
    if(window._fbSaveMarketCal)window._fbSaveMarketCal({events:enriched,generatedAt:now,savedAt:now});
    setLastSync(now);
  },[]);

  const refresh=useCallback((force,wlOverride)=>{
    const wl=wlOverride||wlRef.current||NH_DEFAULT_TICKERS;
    setLoading(true);setNotice('');
    if(pollRef.current){clearTimeout(pollRef.current);pollRef.current=null;}
    const tq='tickers='+encodeURIComponent(wl.join(','))+'&days=30'+(force?'&fresh=1':'');
    const url=NH_WORKER_URL+'/calendar?'+tq;
    const poll=async(tries)=>{
      try{
        const r=await fetch(url);
        if(r.status===429){const j=await r.json().catch(()=>({}));setNotice(j.reason||'Rate limited — try later.');setLoading(false);return;}
        if(r.status===202){if(tries<20){pollRef.current=setTimeout(()=>poll(tries+1),3000);}else{setNotice('Build timed out.');setLoading(false);}return;}
        const j=await r.json();
        if(j&&j.status==='building'){if(tries<20){pollRef.current=setTimeout(()=>poll(tries+1),3000);}else{setNotice('Build timed out.');setLoading(false);}return;}
        const evs=Array.isArray(j.events)?j.events:[];
        const today=tbEtDate(0);
        // newshub provides ACCURATE, real-dated macro + earnings. Trust it.
        // Only fall back to the trade-dashboard COMPUTED calendar (approximate
        // dates) when newshub returns NO macro events at all — so the tab is
        // never empty, but accurate data always wins when present.
        let merged=evs;
        const hasMacro=evs.some(e=>e&&e.kind&&e.kind!=='earnings');
        if(!hasMacro){
          try{
            const tdq='tickers='+encodeURIComponent(wl.join(','))+'&days=30';
            const tdr=await fetch('https://trade-dashboard.av1.workers.dev/calendar?'+tdq);
            if(tdr.ok){
              const tdj=await tdr.json();
              const tdEvents=(Array.isArray(tdj.events)?tdj.events:[]).filter(e=>e&&e.kind!=='earnings');
              // add computed macro (earnings already covered by newshub)
              const seen=new Set(evs.map(e=>e&&((e.kind==='earnings'?'earn':'macro')+'|'+(e.category||e.kind||'')+'|'+e.date)));
              for(const e of tdEvents){const k='macro|'+(e.category||e.kind||'')+'|'+e.date;if(!seen.has(k)){seen.add(k);merged.push(e);}}
            }
          }catch(e){}
        }
        // de-dup earnings across any source by ticker+date
        const dseen=new Set();
        merged=merged.filter(e=>{if(!e)return false;const nm=(e.name||'');const tick=(nm.match(/^[A-Z]{1,5}\b/)||[])[0];const k=((e.kind==='earnings'||/earnings/i.test(nm))?'earn|'+(tick||nm):'ev|'+nm)+'|'+e.date;if(dseen.has(k))return false;dseen.add(k);return true;});
        const future=merged.filter(e=>e&&e.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
        const prevCount=(eventsRef.current||[]).filter(e=>e&&e.date>=today).length;
        // Guard: if the worker came back DEGRADED with fewer events than we already
        // have cached, it likely only returned partial (e.g. earnings but macro
        // source was empty). Keep the richer cached set instead of wiping it.
        if(j&&j.degraded&&future.length<prevCount){
          setLoading(false);
          setNotice('Sources partial right now — kept your last full calendar. Try Force again in a bit.');
          return;
        }
        await commit(future);
        setLoading(false);
        if(!future.length)setNotice(j&&j.degraded?'Sources empty right now — try Force in a bit.':'No catalysts in the next 30 days.');
      }catch(e){setNotice('Network error: '+e.message);setLoading(false);}
    };
    poll(0);
  },[commit]);

  useEffect(()=>{
    const doLoad=async()=>{
      try{
        if(window._fbLoadMarketCal){const d=await window._fbLoadMarketCal();if(d&&Array.isArray(d.events)){const today=tbEtDate(0);const fut=d.events.filter(e=>e&&e.date>=today);setEvents(fut);eventsRef.current=fut;setLastSync(d.generatedAt||d.savedAt||null);
          // One-time cleanup: nuke any catalyst reminder docs from the old push
          // flow (ids == event ids) so no 6:30 AM notification ever fires again.
          if(window._fbDeleteReminder){for(const e of (d.events||[])){if(e&&e.id){try{await window._fbDeleteReminder(e.id);}catch(_e){}}}}
        }}
      }catch(e){}
      // No auto-refresh on tab open — only load cached events from Firebase.
      // Fresh fetch happens ONLY when the user hits Refresh / Force.
      didAuto.current=true;
    };
    if(window._fbReady)doLoad();else{const h=()=>doLoad();window.addEventListener('fb-ready',h,{once:true});return()=>window.removeEventListener('fb-ready',h);}
  },[]);

  useEffect(()=>{
    const onCal=e=>{if(e.detail&&Array.isArray(e.detail.events)){const today=tbEtDate(0);const fut=e.detail.events.filter(x=>x&&x.date>=today);setEvents(fut);eventsRef.current=fut;setLastSync(e.detail.generatedAt||e.detail.savedAt||null);}};
    window.addEventListener('fb-tb-marketcal-remote',onCal);
    return()=>window.removeEventListener('fb-tb-marketcal-remote',onCal);
  },[]);

  const groups=useMemo(()=>{const g={};events.forEach(e=>{(g[e.date]=g[e.date]||[]).push(e);});return Object.keys(g).sort().map(d=>({date:d,items:g[d]}));},[events]);

  return (<div className="tb-fade-in" style={{maxWidth:1100,margin:'0 auto'}}>
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}>
      <div>
        <div style={{fontSize:20,fontWeight:800,color:'var(--tx)'}}>Catalysts</div>
        <div style={{fontSize:12,color:'var(--txm)',marginTop:2}}>Earnings + macro · next 30 days · {watchlist.length} tickers · auto-synced to TaskHub</div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>refresh(false)} disabled={loading} style={{padding:'8px 16px',borderRadius:100,border:'1px solid var(--bd)',background:'var(--s2)',color:'var(--tx)',fontSize:13,fontWeight:700,cursor:loading?'default':'pointer',opacity:loading?.5:1}}>{loading?'Loading…':'↻ Refresh'}</button>
        <button className="tb-btn-primary" onClick={()=>refresh(true)} disabled={loading}>Force</button>
      </div>
    </div>
    {notice&&<div className="tb-card" style={{marginBottom:12,fontSize:12,color:'var(--txm)'}}>{notice}</div>}
    {lastSync&&<div style={{fontSize:11,color:'var(--txm)',marginBottom:10}}>Last updated {new Date(lastSync).toLocaleString()}</div>}
    {groups.length===0&&!loading&&<div className="tb-card" style={{textAlign:'center',color:'var(--txm)',padding:'32px 16px'}}>No catalysts yet — hit Refresh.</div>}
    {groups.map(g=>(<div key={g.date} className="tb-card" style={{marginBottom:10,padding:'12px 16px'}}>
      <div style={{fontSize:12,fontWeight:700,color:'var(--txd)',marginBottom:6}}>{new Date(g.date+'T12:00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}</div>
      {g.items.map(ev=>(<div key={ev.id} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderTop:'1px solid var(--bd)'}}>
        <span style={{fontSize:9,fontWeight:800,letterSpacing:.4,textTransform:'uppercase',color:tbCatColor(ev.category||ev.kind),background:tbCatColor(ev.category||ev.kind)+'1a',border:'1px solid '+(tbCatColor(ev.category||ev.kind)+'33'),borderRadius:5,padding:'2px 7px',whiteSpace:'nowrap'}}>{ev.category||ev.kind}</span>
        <span style={{fontSize:13,color:'var(--tx)',flex:1}}>{ev.name}{ev.kind==='earnings'&&ev.when?(<span style={{color:'var(--txm)',fontSize:11}}> · {ev.when==='amc'?'after close':ev.when==='bmo'?'before open':ev.when}</span>):null}{ev.kind==='earnings'&&ev.confirmed===false?(<span title="Date not confirmed by a second source — may shift" style={{marginLeft:6,fontSize:9,fontWeight:700,letterSpacing:.3,color:'var(--txm)',border:'1px solid var(--bd)',borderRadius:4,padding:'1px 5px',verticalAlign:'middle'}}>EST</span>):null}</span>

      </div>))}
    </div>))}
  </div>);
}

  const [page,setPage]=useState('portfolio');
  const [tabLockManage,setTabLockManage]=useState(null);
  const [report,setReport]=useState(null);
  const [prompts,setPrompts]=useState(tbLoadPromptsLocal);
  const [analysisCfg,setAnalysisCfg]=useState(tbLoadAnalysisCfg);
  const [watchlist,setWatchlist]=useState(tbLoadWatchlistLocal);
  const [toast,setToast]=useState(null);
  const [fbLoaded,setFbLoaded]=useState(false);
  const [tbSyncStatus,setTbSyncStatus]=useState(''); // 'saving'|'saved'|'error'|''
  const [tbPortfolioOk,setTbPortfolioOk]=useState(false);
  const [tbIsDark,setTbIsDark]=useState(()=>{try{return JSON.parse(localStorage.getItem('td6_theme')||'true');}catch{return true;}});

  /* Sync theme with rest of Tony apps */
  useEffect(()=>{
    const root=document.getElementById('tradeboard-root');
    if(root)root.classList.toggle('tb-light',!tbIsDark);
  },[tbIsDark]);
  useEffect(()=>{
    window._tbSyncTheme=(isDark)=>setTbIsDark(isDark);
    return()=>{window._tbSyncTheme=null;};
  },[]);

  /* Sync state machine — matches Tony's TaskHub behavior exactly:
     idle→saving→saved (visible 2.5s)→live (hidden). error stays until next save. */
  useEffect(()=>{
    let lastSavedAt=0, errorTimer=null;
    const onSaved=()=>{ lastSavedAt=Date.now(); if(errorTimer){clearTimeout(errorTimer);errorTimer=null;} setTbSyncStatus('saved'); };
    const onSaving=()=>setTbSyncStatus('saving');
    // Defer showing an error briefly. If a 'saved' lands within the window (a
    // concurrent write that DID succeed — e.g. report saved while a prompt bump
    // raced), the error is suppressed. Only a real, unrescued failure shows.
    const onError=()=>{
      if(Date.now()-lastSavedAt<1500) return;            // a success just happened → ignore
      if(errorTimer)clearTimeout(errorTimer);
      errorTimer=setTimeout(()=>{
        if(Date.now()-lastSavedAt<1500) return;          // success arrived during the wait
        setTbSyncStatus('error');
      },1600);
    };
    window.addEventListener('fb-tb-journal-saved',onSaved);
    window.addEventListener('fb-tb-prompts-saved',onSaved);
    window.addEventListener('fb-tb-news-saved',onSaved);
    window.addEventListener('fb-tb-analysis-saved',onSaved);
    window.addEventListener('fb-tb-watchlist-saved',onSaved);
    window.addEventListener('fb-tb-dash-saved',onSaved);
    window.addEventListener('fb-tb-marketcal-saved',onSaved);
    window.addEventListener('fb-tb-journal-error',onError);
    window.addEventListener('fb-tb-prompts-error',onError);
    window.addEventListener('fb-tb-news-error',onError);
    window.addEventListener('fb-tb-analysis-error',onError);
    window.addEventListener('fb-tb-watchlist-error',onError);
    window.addEventListener('fb-tb-dash-error',onError);
    window.addEventListener('fb-tb-marketcal-error',onError);
    window.addEventListener('fb-tb-saving',onSaving);
    return()=>{
      if(errorTimer)clearTimeout(errorTimer);
      window.removeEventListener('fb-tb-journal-saved',onSaved);
      window.removeEventListener('fb-tb-prompts-saved',onSaved);
      window.removeEventListener('fb-tb-news-saved',onSaved);
      window.removeEventListener('fb-tb-analysis-saved',onSaved);
      window.removeEventListener('fb-tb-watchlist-saved',onSaved);
      window.removeEventListener('fb-tb-dash-saved',onSaved);
      window.removeEventListener('fb-tb-marketcal-saved',onSaved);
      window.removeEventListener('fb-tb-journal-error',onError);
      window.removeEventListener('fb-tb-prompts-error',onError);
      window.removeEventListener('fb-tb-news-error',onError);
      window.removeEventListener('fb-tb-analysis-error',onError);
      window.removeEventListener('fb-tb-watchlist-error',onError);
      window.removeEventListener('fb-tb-dash-error',onError);
      window.removeEventListener('fb-tb-marketcal-error',onError);
      window.removeEventListener('fb-tb-saving',onSaving);
    };
  },[]);
  /* Auto-fade 'saved' → 'live' (hidden) after 2500ms — same as TaskHub */
  useEffect(()=>{if(tbSyncStatus==='saved'){const t=setTimeout(()=>setTbSyncStatus('live'),2500);return()=>clearTimeout(t);}},[tbSyncStatus]);

  /* Portfolio connected check — set by TBPortfolioPage via window callback */
  useEffect(()=>{
    window._tbSetPortfolioOk=(ok)=>setTbPortfolioOk(!!ok);
    return()=>{window._tbSetPortfolioOk=null;};
  },[]);

  /* Load prompts + reports from Firebase on mount */
  useEffect(()=>{
    const doLoad=async()=>{
      if(window._fbLoadTBPrompts){
        const fp=await window._fbLoadTBPrompts();
        if(fp&&fp.length){setPrompts(fp);tbSavePromptsLocal(fp);}
      }
      if(window._fbLoadTBAnalysis){
        const fa=await window._fbLoadTBAnalysis();
        if(fa&&typeof fa==='object'){setAnalysisCfg(fa);try{localStorage.setItem(TB_ANALYSIS_KEY,JSON.stringify(fa));}catch{}}
      }
      if(window._fbLoadTBWatchlist){
        const fw=await window._fbLoadTBWatchlist();
        if(Array.isArray(fw)&&fw.length){setWatchlist(fw);tbSaveWatchlistLocal(fw);tbSetWatchlist(fw);}
      }
      /* One-time: force every device to the new canonical default watchlist. */
      try{
        const seed=parseInt(localStorage.getItem(TB_WATCHLIST_SEED_KEY)||'0',10);
        if(seed<TB_WATCHLIST_SEED){
          const def=[...TB_WATCHLIST];
          setWatchlist(def);tbSaveWatchlistLocal(def);tbSetWatchlist(def);
          if(window._fbSaveTBWatchlist)window._fbSaveTBWatchlist(def);
          localStorage.setItem(TB_WATCHLIST_SEED_KEY,String(TB_WATCHLIST_SEED));
        }
      }catch(e){}

      setFbLoaded(true);
    };
    if(window._fbReady)doLoad();
    else{const h=()=>doLoad();window.addEventListener('fb-ready',h,{once:true});return()=>window.removeEventListener('fb-ready',h);}
  },[]);

  /* Live sync: apply remote prompts from other devices */
  useEffect(()=>{
    const onRemote=(e)=>{if(e.detail&&Array.isArray(e.detail)){setPrompts(e.detail);tbSavePromptsLocal(e.detail);}};
    window.addEventListener('fb-tb-prompts-remote',onRemote);
    return()=>window.removeEventListener('fb-tb-prompts-remote',onRemote);
  },[]);

  /* Live sync: apply remote analysis cfg from other devices */
  useEffect(()=>{
    const onRemote=(e)=>{if(e.detail&&typeof e.detail==='object'){setAnalysisCfg(e.detail);try{localStorage.setItem(TB_ANALYSIS_KEY,JSON.stringify(e.detail));}catch{}}}
    window.addEventListener('fb-tb-analysis-remote',onRemote);
    return()=>window.removeEventListener('fb-tb-analysis-remote',onRemote);
  },[]);

  /* Live sync: apply remote watchlist from other devices */
  useEffect(()=>{
    const onRemote=(e)=>{if(Array.isArray(e.detail)&&e.detail.length){setWatchlist(e.detail);tbSaveWatchlistLocal(e.detail);tbSetWatchlist(e.detail);}}
    window.addEventListener('fb-tb-watchlist-remote',onRemote);
    return()=>window.removeEventListener('fb-tb-watchlist-remote',onRemote);
  },[]);

  /* Keep the parser's active watchlist in lockstep with state. */
  useEffect(()=>{tbSetWatchlist(watchlist);},[watchlist]);

  const showToast=(msg,icon='✓')=>{setToast({msg,icon,k:Date.now()});};

  const savePrompts=arr=>{setPrompts(arr);tbSavePromptsLocal(arr);};
  const saveAnalysisCfg=cfg=>{setAnalysisCfg(cfg);try{localStorage.setItem(TB_ANALYSIS_KEY,JSON.stringify(cfg));}catch{} if(window._fbSaveTBAnalysis)window._fbSaveTBAnalysis(cfg);};
  const saveWatchlist=arr=>{const wl=Array.isArray(arr)?arr:[];setWatchlist(wl);tbSaveWatchlistLocal(wl);tbSetWatchlist(wl);if(window._fbSaveTBWatchlist)window._fbSaveTBWatchlist(wl);};




  const toggleTbTheme=useCallback(()=>{
    const nd=!tbIsDark;setTbIsDark(nd);
    if(window._syncAllThemes)window._syncAllThemes(nd);
  },[tbIsDark]);

  // Keep the header lock-button icon in sync after React (re)renders.
  useEffect(()=>{ if(window._tbUpdateLockBtns) window._tbUpdateLockBtns(); });

  const pageMap={
    portfolio:<TBPortfolioPage/>,
    journal:  <TBJournalPage/>,
    news:     <TBNewsPage watchlist={watchlist}/>,
    catalysts:<TBCatalystsPage watchlist={watchlist}/>,
    prompt:   <TBControlPage prompts={prompts} onSavePrompts={savePrompts} onToast={showToast} watchlist={watchlist} onSaveWatchlist={saveWatchlist}/>,
    analysis: <TBAnalysisPage cfg={analysisCfg} onSave={saveAnalysisCfg} prompts={prompts} onGoToPrompts={()=>setPage('prompt')}/>,
    dashboard:<TBDashboardBoard prompts={prompts} boardPromptId={analysisCfg.boardPromptId} onSelectBoardPrompt={id=>saveAnalysisCfg({...analysisCfg,boardPromptId:id})} onGoToPrompts={()=>setPage('prompt')}/>,
  };
  const curNav=TB_NAV.find(n=>n.id===page)||TB_NAV[0];

  return(<div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden',background:'var(--bg)'}}>
    <TBHeader page={page} onNav={setPage} syncStatus={tbSyncStatus} portfolioConnected={tbPortfolioOk} isDark={tbIsDark} onToggleTheme={toggleTbTheme} onManageTabLock={setTabLockManage}/>
    <TBMobileHeader page={page} syncStatus={tbSyncStatus} portfolioConnected={tbPortfolioOk} onNav={setPage} isDark={tbIsDark} onToggleTheme={toggleTbTheme} onManageTabLock={setTabLockManage}/>
    <div style={{flex:1,overflowY:'auto',overflowX:'hidden',WebkitOverflowScrolling:'touch'}}>
      <div style={{maxWidth:2000,margin:'0 auto',width:'100%',padding:'18px clamp(12px,3vw,24px) calc(env(safe-area-inset-bottom,0px) + 60px)'}}>
        <TBTabGate tabId={page} tabLabel={curNav.label}>
          {pageMap[page]||pageMap.portfolio}
        </TBTabGate>
      </div>
    </div>
    {tabLockManage&&<TBTabLockManager tabId={tabLockManage.id} tabLabel={tabLockManage.label} onClose={()=>setTabLockManage(null)}/>}
    {toast&&<TBToast key={toast.k} message={toast.msg} icon={toast.icon} onClose={()=>setToast(null)}/>}
  </div>);
}

/* ── Mount to tradeboard-root ── */
const tbRoot=document.getElementById('tradeboard-root');
if(tbRoot){
  ReactDOM.createRoot(tbRoot).render(<TBApp/>);
}

})(); // end IIFE
</script>

<!-- ══════════════════════════════════════════════════════════════════════════
     App Lock — single-app gate for TradeHub. Mirrors index.html's applock:
       • Password stored in Cloudflare Worker KV (journal='applock', entryId='tony_tradehub_standalone')
       • Locked-state synced across ALL devices via Firebase (dashboards/applock)
       • Per-device unlock cached in localStorage (enter once per device)
       • Forgot password → emails hint to anthonypn99@gmail.com via Formspree
     entryId is DISTINCT from index.html's 'tony_tradehub' (the suite's TradeHub
     program-gate) so this standalone lock is independent: locking here does NOT
     lock the TradeHub entry in index's suite settings, and vice versa. Both still
     share the dashboards/applock doc but under separate keys, so each preserves
     the other's entry on write.
     ══════════════════════════════════════════════════════════════════════════ -->
<script>
(function(){
'use strict';

var AL_WORKER  = 'https://taskhub-reminders.av1.workers.dev';
var AL_JOURNAL = 'applock';
var AL_EMAIL   = 'anthonypn99@gmail.com';
var APPID      = 'tony_tradehub_standalone';
var AC         = '#E0607A';

function _el(id){ return document.getElementById(id); }

// ── STATE ──────────────────────────────────────────────────────────────────
var _alLocks = {};
try { _alLocks = JSON.parse(localStorage.getItem('al_locks') || '{}'); } catch(e) {}
var _alPendingPush = false;

function alIsLocked()   { return !!_alLocks[APPID]; }
function alLockVersion(){ var e=_alLocks[APPID]; return (e&&e.v)||0; }
function alIsUnlocked() {
  if(!alIsLocked()) return true;
  var v = alLockVersion();
  var got = parseInt(localStorage.getItem('al_unlockedv_' + APPID)||'0',10);
  if(v===0){ return localStorage.getItem('al_unlocked_' + APPID)==='1' || got>0; }
  return got===v;
}
function alMarkUnlocked(){
  try{
    var v = alLockVersion();
    localStorage.setItem('al_unlockedv_' + APPID, String(v||Date.now()));
    if(v===0) localStorage.setItem('al_unlocked_' + APPID, '1');
  }catch(e){}
}
function alMarkLocked()  { try { localStorage.removeItem('al_unlockedv_' + APPID); localStorage.removeItem('al_unlocked_' + APPID); } catch(e){} }
function alMustBlock()   { return alIsLocked() && !alIsUnlocked(); }

function alSaveLocks(){
  try { localStorage.setItem('al_locks', JSON.stringify(_alLocks)); } catch(e){}
  if (window._fbSaveAppLocks) { window._fbSaveAppLocks(_alLocks); _alPendingPush = false; }
  else { _alPendingPush = true; }
}
function alSetLock(version){ _alLocks[APPID] = { locked: true, v: version||Date.now() }; alSaveLocks(); }
function alRemoveLock(){ delete _alLocks[APPID]; alSaveLocks(); }

// Show / hide TradeHub content roots.
function alHideRoot(){ var r=_el('tradeboard-root'); if(r) r.style.display='none'; }
function alShowRoot(){ var r=_el('tradeboard-root'); if(r) r.style.display='flex'; }

// ── REMOTE LOCK CHANGES (from Firebase onSnapshot in the module above) ──────
// The shared dashboards/applock doc carries locks for EVERY app; we only care
// about TradeHub's entry but must preserve the rest so we never wipe them.
window._alApplyRemoteLocks = function(remoteLocks){
  remoteLocks = remoteLocks || {};
  var wasLocked = !!_alLocks[APPID];
  var oldV = alLockVersion();
  var nowLocked = !!remoteLocks[APPID];
  var newV = (remoteLocks[APPID] && remoteLocks[APPID].v) || 0;
  // Newly locked OR password changed (version bumped) elsewhere → require the
  // (possibly new) password again on this device.
  if ((nowLocked && !wasLocked) || (nowLocked && newV !== oldV)) { alMarkLocked(); }
  _alLocks = {};
  Object.keys(remoteLocks).forEach(function(id){ var r=remoteLocks[id]; _alLocks[id] = { locked: true, v:(r&&r.v)||0 }; });
  try { localStorage.setItem('al_locks', JSON.stringify(_alLocks)); } catch(e){}
  // SECURITY: if TradeHub just got locked remotely and isn't unlocked here, hide + prompt.
  if (alMustBlock()) { alHideRoot(); alShowOverlay('unlock'); }
  else if (!alIsLocked()) { alShowRoot(); if(_el('applock-overlay').style.display==='flex' && _alMode==='unlock'){ alHideOverlay(); } }
  alUpdateLockBtns();
};

// On Firebase ready: push any local lock set before init, then pull authoritative set.
function alOnFbReady(){
  if (!window._fbLoadAppLocks) return;
  if (_alPendingPush && window._fbSaveAppLocks) { window._fbSaveAppLocks(_alLocks); _alPendingPush=false; }
  window._fbLoadAppLocks().then(function(remote){
    if (remote) window._alApplyRemoteLocks(remote);
  });
}
window.addEventListener('fb-ready', alOnFbReady);
if (window._fbReady && window._fbLoadAppLocks) alOnFbReady();

// ── OVERLAY ─────────────────────────────────────────────────────────────────
var _alMode = 'unlock';
var _alAttempts = 0, _alCooldown = 0;

function alShake(){
  var box=_el('applock-box'); box.classList.remove('shake'); void box.offsetWidth;
  box.classList.add('shake'); setTimeout(function(){box.classList.remove('shake');},500);
}
function _alPwErr(msg){
  _el('applock-pw').classList.add('error'); _el('applock-pw').value='';
  _el('applock-err').textContent = _alAttempts>=5 ? 'Too many attempts. Wait 30s.' : msg;
  alShake(); setTimeout(function(){_el('applock-pw').classList.remove('error');},400);
}

function alShowOverlay(mode){
  _alMode = mode;
  _el('applock-err').textContent='';
  _el('applock-pw').value='';
  _el('applock-pw').classList.remove('error');
  _el('applock-title').textContent='TradeHub';
  _el('applock-title').style.color=AC;
  _el('applock-submit').style.background=AC;
  _el('applock-submit').style.display='';
  var m=_el('al-menu-btns'); if(m) m.remove();
  if (mode==='setpw'){
    _el('applock-icon').textContent='🔐';
    _el('applock-sub').textContent='Choose a password to lock TradeHub. Unlock once per device.';
    _el('applock-submit').textContent='Set Password';
    _el('applock-forgot').style.display='none'; _el('applock-cancel').style.display='';
  } else if (mode==='remove'){
    _el('applock-icon').textContent='🔓';
    _el('applock-sub').textContent='Enter password to remove the lock.';
    _el('applock-submit').textContent='Remove Lock';
    _el('applock-forgot').style.display=''; _el('applock-cancel').style.display='';
  } else if (mode==='changepw'){
    _el('applock-icon').textContent='🔑';
    _el('applock-sub').textContent='Enter your current password first.';
    _el('applock-submit').textContent='Verify & Continue';
    _el('applock-forgot').style.display=''; _el('applock-cancel').style.display='';
  } else {
    _el('applock-icon').textContent='🔒';
    _el('applock-sub').textContent='Enter your password to open TradeHub.';
    _el('applock-submit').textContent='Unlock';
    _el('applock-forgot').style.display='';
    // No cancel escape when content is gated — you must unlock to view TradeHub.
    _el('applock-cancel').style.display = alMustBlock() ? 'none' : '';
  }
  _el('applock-overlay').style.display='flex';
  setTimeout(function(){_el('applock-pw').focus();},80);
}
function alHideOverlay(){
  _el('applock-overlay').style.display='none';
  var m=_el('al-menu-btns'); if(m) m.remove();
}

// ── MANAGE MENU (triggered by the lock button) ──────────────────────────────
function alManage(){
  if (alIsLocked()) alShowManageMenu();
  else alShowOverlay('setpw');
}
window._tbManageLock = alManage;
window._tbAppIsLocked = function(){ try{ return alIsLocked(); }catch(e){ return false; } };

function alShowManageMenu(){
  var isUnlocked = alIsUnlocked();
  _el('applock-err').textContent='';
  _el('applock-pw').value='';
  _el('applock-pw').classList.remove('error');
  _el('applock-icon').textContent='🔒';
  _el('applock-title').textContent='TradeHub';
  _el('applock-title').style.color=AC;
  _el('applock-submit').style.display='none';
  _el('applock-forgot').style.display='none';
  _el('applock-cancel').style.display='';
  _el('applock-sub').textContent = isUnlocked ? 'TradeHub is locked. Manage:' : 'TradeHub is locked. Choose:';
  var existing=_el('al-menu-btns'); if(existing) existing.remove();
  var menu=document.createElement('div');
  menu.id='al-menu-btns';
  menu.style.cssText='display:flex;flex-direction:column;gap:8px;width:100%;';
  var s='border:none;border-radius:4px;padding:10px 0;font-size:13px;font-weight:700;cursor:pointer;font-family:\'Nunito\',sans-serif;width:100%;';
  if (!isUnlocked){
    var ub=document.createElement('button');
    ub.textContent='🔓  Unlock this device';
    ub.style.cssText=s+'background:'+AC+';color:#fff;';
    ub.onclick=function(){ menu.remove(); _el('applock-submit').style.display=''; alShowOverlay('unlock'); };
    menu.appendChild(ub);
  }
  var cb=document.createElement('button');
  cb.textContent='🔑  Change password';
  cb.style.cssText=s+'background:#252530;color:#ececf0;border:1px solid #323240;';
  cb.onclick=function(){ menu.remove(); _el('applock-submit').style.display=''; alShowOverlay('changepw'); };
  menu.appendChild(cb);
  var rb=document.createElement('button');
  rb.textContent='🗑  Remove lock';
  rb.style.cssText=s+'background:transparent;color:#d47a6a;border:1px solid #d47a6a;';
  rb.onclick=function(){ menu.remove(); _el('applock-submit').style.display=''; alShowOverlay('remove'); };
  menu.appendChild(rb);
  var cancelRow=_el('applock-cancel').parentNode;
  cancelRow.insertBefore(menu, cancelRow.lastElementChild);
  _el('applock-overlay').style.display='flex';
}

// ── SUBMIT ──────────────────────────────────────────────────────────────────
_el('applock-submit').addEventListener('click', async function(){
  var pw=_el('applock-pw').value.trim();
  if (!pw){ _el('applock-pw').classList.add('error'); _el('applock-err').textContent='Password required.'; return; }
  if (_alAttempts>=5){
    var wait=Math.ceil((_alCooldown-Date.now())/1000);
    if (wait>0){ _el('applock-err').textContent='Too many attempts. Wait '+wait+'s.'; return; }
    _alAttempts=0;
  }
  _el('applock-submit').disabled=true; _el('applock-submit').textContent='Checking…';
  try {
    if (_alMode==='setpw'){
      var hint=window.prompt('Optional: enter a password hint for recovery email. Leave blank to skip.')||'';
      var r1=await fetch(AL_WORKER+'/auth/journal/set-lock',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({journal:AL_JOURNAL,entryId:APPID,password:pw,hint:hint})});
      var d1=await r1.json();
      if (d1.ok){ alSetLock(); alMarkUnlocked(); alShowRoot(); alHideOverlay(); alUpdateLockBtns(); }
      else { _el('applock-err').textContent='Failed to set lock. Try again.'; }

    } else if (_alMode==='remove'){
      var r2=await fetch(AL_WORKER+'/auth/journal/remove-lock',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({journal:AL_JOURNAL,entryId:APPID,password:pw})});
      var d2=await r2.json();
      if (d2.ok){ alRemoveLock(); alMarkLocked(); alShowRoot(); alHideOverlay(); alUpdateLockBtns(); }
      else { _alAttempts++; if(_alAttempts>=5)_alCooldown=Date.now()+30000; _alPwErr('Wrong password.'); }

    } else if (_alMode==='changepw'){
      var r3=await fetch(AL_WORKER+'/auth/journal/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({journal:AL_JOURNAL,entryId:APPID,password:pw})});
      var d3=await r3.json();
      if (d3.ok){
        var np=window.prompt('Current password verified! Enter your NEW password:');
        if (!np||!np.trim()){ _el('applock-err').textContent='New password empty — not changed.'; }
        else {
          var nh=window.prompt('Optional: hint for new password (leave blank to skip).')||'';
          var rem=await fetch(AL_WORKER+'/auth/journal/remove-lock',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({journal:AL_JOURNAL,entryId:APPID,password:pw})});
          var remD=await rem.json();
          if (remD.ok){
            var set=await fetch(AL_WORKER+'/auth/journal/set-lock',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({journal:AL_JOURNAL,entryId:APPID,password:np.trim(),hint:nh})});
            var setD=await set.json();
            if (setD.ok){ alSetLock(); alMarkUnlocked(); alShowRoot(); alHideOverlay(); alUpdateLockBtns(); alert('Password changed!'); }
            else { _el('applock-err').textContent='Failed to set new password.'; }
          } else { _el('applock-err').textContent='Error removing old lock. Try again.'; }
        }
      } else { _alAttempts++; if(_alAttempts>=5)_alCooldown=Date.now()+30000; _alPwErr('Wrong password.'); }

    } else { // unlock
      var r4=await fetch(AL_WORKER+'/auth/journal/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({journal:AL_JOURNAL,entryId:APPID,password:pw})});
      var d4=await r4.json();
      if (d4.ok){ alMarkUnlocked(); _alAttempts=0; alShowRoot(); alHideOverlay(); alUpdateLockBtns(); }
      else { _alAttempts++; if(_alAttempts>=5)_alCooldown=Date.now()+30000; _alPwErr('Wrong password.'); }
    }
  } catch(e){ _el('applock-err').textContent='Network error. Try again.'; }
  _el('applock-submit').disabled=false;
  _el('applock-submit').textContent={setpw:'Set Password',remove:'Remove Lock',changepw:'Verify & Continue'}[_alMode]||'Unlock';
});

_el('applock-pw').addEventListener('keydown', function(e){
  if (e.key==='Enter') _el('applock-submit').click();
  if (e.key==='Escape'){ _el('applock-err').textContent=''; _el('applock-pw').classList.remove('error'); }
});

_el('applock-cancel').addEventListener('click', function(){
  var m=_el('al-menu-btns'); if(m) m.remove();
  _el('applock-submit').style.display='';
  var mode=_alMode;
  alHideOverlay();
  // Security: backing out of an UNLOCK while gated keeps content hidden.
  if (mode==='unlock' && alMustBlock()) alHideRoot();
});

_el('applock-forgot').addEventListener('click', async function(){
  _el('applock-forgot').textContent='Sending…'; _el('applock-forgot').disabled=true;
  try {
    var hr=await fetch(AL_WORKER+'/auth/journal/hint',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({journal:AL_JOURNAL,entryId:APPID})});
    var hd=await hr.json();
    if (hd.noLock){ _el('applock-err').textContent='No lock on server. Try re-locking.'; _el('applock-forgot').disabled=false; _el('applock-forgot').textContent='Forgot password?'; return; }
    var fp=await fetch('https://formspree.io/f/xeedkebo',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({email:AL_EMAIL,subject:'App Lock - Hint (TradeHub)',message:'Hint for "TradeHub":\n\n'+(hd.hint||'(none)')+'\n\n- TradeHub'})});
    if (fp.ok){ _el('applock-forgot').textContent='Hint sent!'; setTimeout(function(){_el('applock-forgot').textContent='Forgot password?';_el('applock-forgot').disabled=false;},3000); }
    else { _el('applock-forgot').textContent='Failed — try again'; _el('applock-forgot').disabled=false; }
  } catch(e){ _el('applock-forgot').textContent='Failed — try again'; _el('applock-forgot').disabled=false; }
});

// ── HEADER LOCK BUTTON STATE ────────────────────────────────────────────────
// The React headers render a button with id 'tb-lock-btn-desktop' / 'tb-lock-btn-mobile'.
function alUpdateLockBtns(){
  // React now renders the lock-icon emoji from window._tbAppIsLocked(); we only
  // notify React to re-render rather than setting textContent (which React would
  // overwrite, causing wrong state on mobile re-renders).
  try { if (typeof tabNotify === 'function') tabNotify(); } catch(e){}
}
window._tbUpdateLockBtns = alUpdateLockBtns;

// ── LOAD-TIME ENFORCEMENT ───────────────────────────────────────────────────
// If locked & not unlocked on this device, keep root hidden and prompt.
function alEnforce(){
  if (alMustBlock()){ alHideRoot(); if(_el('applock-overlay').style.display!=='flex') alShowOverlay('unlock'); }
  else { alShowRoot(); }
  alUpdateLockBtns();
}
// React mounts async; sweep a few times to catch the button + enforce the gate.
alEnforce();
setTimeout(alEnforce, 300);
setTimeout(function(){ alUpdateLockBtns(); alEnforce(); }, 800);
setTimeout(function(){ alUpdateLockBtns(); }, 2000);

// ════════════════════════════════════════════════════════════════════════════
// PER-TAB LOCKS — same password system (worker KV + Firebase + localStorage),
// just a different entryId per tab: 'tony_tradehub_tab_<tabId>'. Lets you lock
// individual tabs even when the whole program is unlocked. Exposed to React via
// window._tbTabLock so the TBTabGate component can gate page content.
// ════════════════════════════════════════════════════════════════════════════
var TAB_PREFIX = 'tony_tradehub_tab_';
function tabAppId(tabId){ return TAB_PREFIX + tabId; }
var _tabLockSubs = [];
function tabNotify(){ _tabLockSubs.forEach(function(cb){ try{cb();}catch(e){} }); }

function tabIsLocked(tabId){ return !!_alLocks[tabAppId(tabId)]; }
function tabLockVersion(tabId){ var e=_alLocks[tabAppId(tabId)]; return (e&&e.v)||0; }
function tabIsUnlocked(tabId){
  if(!tabIsLocked(tabId)) return true;
  var v = tabLockVersion(tabId);
  var got = parseInt(localStorage.getItem('al_unlockedv_' + tabAppId(tabId))||'0',10);
  if(v===0){
    // Legacy lock with no version → unlock with the simple flag (or any recorded unlock).
    return localStorage.getItem('al_unlocked_' + tabAppId(tabId))==='1' || got>0;
  }
  return got===v;
}
function tabMustBlock(tabId){ return tabIsLocked(tabId) && !tabIsUnlocked(tabId); }
function tabMarkUnlocked(tabId){
  try{
    var v = tabLockVersion(tabId);
    localStorage.setItem('al_unlockedv_' + tabAppId(tabId), String(v||Date.now()));
    if(v===0) localStorage.setItem('al_unlocked_' + tabAppId(tabId), '1'); // legacy flag too
  }catch(e){}
}
function tabMarkLocked(tabId){ try{ localStorage.removeItem('al_unlockedv_' + tabAppId(tabId)); localStorage.removeItem('al_unlocked_' + tabAppId(tabId)); }catch(e){} }

function tabSaveLocks(){
  try { localStorage.setItem('al_locks', JSON.stringify(_alLocks)); } catch(e){}
  if (window._fbSaveAppLocks) window._fbSaveAppLocks(_alLocks);
}
function tabSetLock(tabId, version){ _alLocks[tabAppId(tabId)] = { locked: true, v: version||Date.now() }; tabSaveLocks(); tabNotify(); }
function tabRemoveLock(tabId){ delete _alLocks[tabAppId(tabId)]; tabSaveLocks(); tabNotify(); }

// Worker calls for a given tab's password (mirror the whole-app flow exactly).
function tabVerify(tabId, pw){
  return fetch(AL_WORKER+'/auth/journal/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({journal:AL_JOURNAL,entryId:tabAppId(tabId),password:pw})}).then(function(r){return r.json();});
}
function tabSetPw(tabId, pw, hint){
  return fetch(AL_WORKER+'/auth/journal/set-lock',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({journal:AL_JOURNAL,entryId:tabAppId(tabId),password:pw,hint:hint||''})}).then(function(r){return r.json();});
}
function tabRemovePw(tabId, pw){
  return fetch(AL_WORKER+'/auth/journal/remove-lock',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({journal:AL_JOURNAL,entryId:tabAppId(tabId),password:pw})}).then(function(r){return r.json();});
}
function tabSendHint(tabId, tabLabel){
  return fetch(AL_WORKER+'/auth/journal/hint',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({journal:AL_JOURNAL,entryId:tabAppId(tabId)})}).then(function(r){return r.json();}).then(function(hd){
    if (hd.noLock) return { noLock:true };
    return fetch('https://formspree.io/f/xeedkebo',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({email:AL_EMAIL,subject:'App Lock - Hint (TradeHub: '+tabLabel+')',message:'Hint for TradeHub tab "'+tabLabel+'":\n\n'+(hd.hint||'(none)')+'\n\n- TradeHub'})}).then(function(fp){ return { sent: fp.ok }; });
  });
}

// When remote locks change, refresh React tab gates too.
var _origApply = window._alApplyRemoteLocks;
window._alApplyRemoteLocks = function(remoteLocks){
  // Detect tabs newly locked OR password-changed (version bumped) remotely →
  // require the (possibly new) password again on this device.
  remoteLocks = remoteLocks || {};
  Object.keys(remoteLocks).forEach(function(id){
    if (id.indexOf(TAB_PREFIX)===0) {
      var tabId = id.slice(TAB_PREFIX.length);
      var newV = (remoteLocks[id] && remoteLocks[id].v) || 0;
      var oldV = tabLockVersion(tabId);
      if (!_alLocks[id] || newV !== oldV) { tabMarkLocked(tabId); }
    }
  });
  if (_origApply) _origApply(remoteLocks);
  tabNotify();
};

window._tbTabLock = {
  isLocked: tabIsLocked,
  isUnlocked: tabIsUnlocked,
  mustBlock: tabMustBlock,
  markUnlocked: tabMarkUnlocked,
  markLocked: tabMarkLocked,
  setLock: tabSetLock,
  removeLock: tabRemoveLock,
  verify: tabVerify,
  setPw: tabSetPw,
  removePw: tabRemovePw,
  sendHint: tabSendHint,
  onChange: function(cb){ _tabLockSubs.push(cb); return function(){ _tabLockSubs = _tabLockSubs.filter(function(f){return f!==cb;}); }; },
};

})();
</script>
